            <button class="btn-ghost" data-action="cancel-edit">✕</button>
          </div>
          <input type="text" id="inline-edit-subtitle" class="small" placeholder="Sous-titre (optionnel)" value="${escapeHtml(sec.subtitle || '')}" style="width:100%; background: var(--surface); border:1px solid var(--line); border-radius:4px; padding:6px 10px; font-size:13px; outline:none; margin-top:6px;">
        ` : `
          <div class="section-title-row">
            <span class="section-title serif" data-action="edit-section" data-id="${sec.id}" title="Cliquer pour renommer">${escapeHtml(sec.title)}</span>
            <span class="section-edit-actions">
              <button data-action="edit-section" data-id="${sec.id}" title="Renommer / changer emoji">${ICO.edit}</button>
              <button data-action="open-tab-menu" data-id="${sec.id}" title="Plus d'options">⋯</button>
            </span>
          </div>
          ${sec.subtitle ? `<div class="section-subtitle">${escapeHtml(sec.subtitle)}</div>` : ''}
          ${sec.id === 'mamad' ? `
            <button class="mamad-alert-trigger" data-action="open-mamad-alert" title="Vue épurée à utiliser quand la sirène sonne" aria-label="Ouvrir le mode alerte Mamad">🚨 Mode Alerte (sirène)</button>
          ` : ''}
        `}
      </div>
      <div class="section-stats">
        <div class="pct">${s.pct}<span style="font-size:12px;opacity:0.5;font-family:'DM Sans',sans-serif;">%</span></div>
        <div style="font-size:11px;opacity:0.6;">${s.done} / ${s.total}</div>
        ${sTotal > 0 ? `<div class="section-total">${formatPrice(sTotal)}</div>` : ''}
      </div>
    </div>
  `;
}

function renderToolbar() {
  const allLocs = getAllLocations();
  return `
    <div class="toolbar">
      <div class="search-box">
        ${ICO.search}
        <input type="text" id="search-input" placeholder="Rechercher…" value="${escapeHtml(state.search)}">
        ${state.search ? '<button class="clear-search" data-action="clear-search">'+ICO.x+'</button>' : ''}
      </div>
      <select data-action="set-filter">
        <option value="all"${state.filter==='all'?' selected':''}>Toutes</option>
        <option value="todo"${state.filter==='todo'?' selected':''}>À faire</option>
        <option value="done"${state.filter==='done'?' selected':''}>Terminées</option>
      </select>
      <select data-action="set-prio-filter">
        <option value="all"${state.priorityFilter==='all'?' selected':''}>Priorités</option>
        <option value="critical"${state.priorityFilter==='critical'?' selected':''}>Critique</option>
        <option value="high"${state.priorityFilter==='high'?' selected':''}>Haute</option>
        <option value="medium"${state.priorityFilter==='medium'?' selected':''}>Moyenne</option>
        <option value="low"${state.priorityFilter==='low'?' selected':''}>Basse</option>
      </select>
      ${allLocs.length > 0 ? `
      <select data-action="set-location-filter" title="Filtrer par lieu (sur tout le projet)">
        <option value=""${!state.locationFilter ? ' selected' : ''}>Tous lieux</option>
        ${allLocs.map(l => `<option value="${escapeHtml(l.name)}"${state.locationFilter === l.name ? ' selected' : ''}>📍 ${escapeHtml(l.name)}</option>`).join('')}
      </select>
      ` : ''}
    </div>
  `;
}

function renderSectionBody(sec) {
  let html = '';
  const sectionItems = filterItems(sec.items);
  const hasSub = sec.subsections.length > 0;

  if (sectionItems.length > 0 || !hasSub) {
    html += `<div class="items-list">`;
    if (sectionItems.length > 0) html += sectionItems.map(i => renderItem(i)).join('');
    else if (sec.items.length === 0 && !hasSub) html += `<div class="empty-state">Aucune tâche dans cette section.</div>`;
    html += `</div>`;

    const adding = state.adding && state.adding.type === 'item' && state.adding.parentType === 'section';
    html += adding ? renderAddItemForm('section', null) : `<button class="add-btn" data-action="start-add-item" data-parent-type="section">${ICO.plus} Ajouter une tâche</button>`;
  }

  sec.subsections.forEach(sub => { html += renderSubsection(sub); });

  const addSub = state.adding && state.adding.type === 'subsection';
  html += addSub ? `
    <div class="add-form" style="margin-top:16px;">
      <input type="text" id="new-subsection-title" placeholder="Nom de la sous-section…" autofocus>
      <div class="row">
        <button class="btn-primary" data-action="confirm-add-subsection">Créer</button>
        <button class="btn-ghost" data-action="cancel-add">Annuler</button>
      </div>
    </div>
  ` : `<button class="add-subsection-btn" data-action="start-add-subsection">${ICO.plus} Ajouter une sous-section</button>`;

  return html;
}

function renderSubsection(sub) {
  const isEditing = state.editing && state.editing.type === 'subsection' && state.editing.id === sub.id;
  const items = filterItems(sub.items);
  const doneCount = sub.items.filter(i => itemEffectiveDone(i)).length;
  const adding = state.adding && state.adding.type === 'item' && state.adding.parentType === 'subsection' && state.adding.parentId === sub.id;
  const dragging = state.draggedType === 'subsection' && state.draggedId === sub.id ? ' dragging' : '';
  const dropTarget = state.draggedType === 'subsection' && state.dropTargetId === sub.id && state.draggedId !== sub.id ? ' drop-target' : '';
  const subTotal = computeSubsectionTotal(sub);

  return `
    <div class="subsection${dragging}${dropTarget}" draggable="true" data-drag-type="subsection" data-id="${sub.id}">
      <div class="subsection-header">
        <button class="subsection-toggle" data-action="toggle-subsection" data-id="${sub.id}" title="${sub.collapsed ? 'Déplier' : 'Replier'}">
          ${sub.collapsed ? ICO.chevronR : ICO.chevronD}
        </button>
        <span class="subsection-grip" title="Glisser pour réorganiser">${ICO.grip}</span>
        ${isEditing ? `
          <div class="inline-edit">
            <input type="text" id="inline-edit-subsection-${sub.id}" class="small" value="${escapeHtml(state.editing.value)}" autofocus>
            <button class="btn-primary" data-action="save-subsection-edit" data-id="${sub.id}">OK</button>
            <button class="btn-ghost" data-action="cancel-edit">✕</button>
          </div>
        ` : `
          <span class="subsection-title" data-action="edit-subsection" data-id="${sub.id}">${escapeHtml(sub.title)}</span>
          <span class="subsection-count">${doneCount}/${sub.items.length}</span>
          ${subTotal > 0 ? `<span class="subsection-total">${formatPrice(subTotal)}</span>` : ''}
          <span class="subsection-actions">
            <button data-action="move-subsection-up" data-id="${sub.id}" title="Monter">${ICO.up}</button>
            <button data-action="move-subsection-down" data-id="${sub.id}" title="Descendre">${ICO.down}</button>
            <button data-action="edit-subsection" data-id="${sub.id}" title="Renommer">${ICO.edit}</button>
            <button data-action="delete-subsection" data-id="${sub.id}" class="danger" title="Supprimer">${ICO.trash}</button>
          </span>
        `}
      </div>
      ${!sub.collapsed ? `
        <div class="items-list">
          ${items.length === 0
            ? (sub.items.length === 0 ? '<div class="empty-state" style="padding:16px 0;">Sous-section vide.</div>' : '<div class="empty-state" style="padding:12px 0;">Aucune tâche ne correspond aux filtres.</div>')
            : items.map(i => renderItem(i)).join('')}
        </div>
        ${adding ? renderAddItemForm('subsection', sub.id) : `<button class="add-btn small" data-action="start-add-item" data-parent-type="subsection" data-parent-id="${sub.id}">${ICO.plusSm} Ajouter une tâche</button>`}
      ` : ''}
    </div>
  `;
}

function renderItem(item) {
  const isEditing = state.editing && state.editing.type === 'item' && state.editing.id === item.id;
  const notesOpen = state.expandedNotes[item.id];
  const locationOpen = state.expandedLocation[item.id];
  const isDragged = state.draggedType === 'item' && state.draggedId === item.id;
  const isDropTarget = state.draggedType === 'item' && state.dropTargetId === item.id && state.draggedId !== item.id;
  const prio = item.priority || 'medium';
  const dotColors = { critical: 'var(--crit-dot)', high: 'var(--high-dot)', medium: 'var(--med-dot)', low: 'var(--low-dot)' };
  const hasSubtasks = item.subtasks && item.subtasks.length > 0;
  const progress = itemProgress(item);
  const effectiveDone = itemEffectiveDone(item);
  const hasLink = !!item.link;
  const hasLocation = !!item.location;
  const hasImage = !!item.image;
  const hasOwnPrice = item.price && item.price > 0;
  const itemTotal = computeItemTotal(item);
  const showTotal = itemTotal > 0;

  // When location filter is active and parent doesn't itself match, auto-expand subtasks
  // (so user can see the matching subtasks)
  const matchingSubtasksForFilter = state.locationFilter && hasSubtasks
    ? item.subtasks.some(st => locationMatchesFilter(st.location, state.locationFilter))
    : false;
  const subtasksOpen = state.expandedSubtasks[item.id] || (matchingSubtasksForFilter && !locationMatchesFilter(item.location, state.locationFilter));

  if (isEditing) {
    return `
      <div class="item" data-id="${item.id}">
        <div class="item-prio-bar" style="background:${dotColors[prio]};"></div>
        <div class="item-row">
          <div style="padding-top:2px;">${effectiveDone ? ICO.checkFull : ICO.circle}</div>
          <div class="item-content">
            <input type="text" style="width:100%; background: var(--surface); border:1px solid var(--line); border-radius:4px; padding:6px 10px; font-size:14px; outline:none;" id="inline-edit-item-${item.id}" value="${escapeHtml(state.editing.value)}">
            <div style="display:flex; gap:8px; margin-top:8px;">
              <button class="btn-primary" data-action="save-item-edit" data-id="${item.id}">Enregistrer</button>
              <button class="btn-ghost" data-action="cancel-edit">Annuler</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  const cls = 'item' + (isDragged ? ' dragging' : '') + (isDropTarget ? ' drop-target' : '');
  const checkIcon = hasSubtasks
    ? (effectiveDone ? ICO.checkFull : (progress.done > 0 ? ICO.checkPartial : ICO.circle))
    : (item.done ? ICO.checkFull : ICO.circle);

  let priceDisplay = '';
  if (showTotal) {
    const isComputed = hasSubtasks && !hasOwnPrice;
    const tooltip = isComputed ? 'Total calculé depuis les sous-tâches' : 'Cliquer pour modifier';
    priceDisplay = `<span class="price-pill${isComputed ? ' computed' : ''}" data-action="manage-item-price" data-id="${item.id}" title="${tooltip}">${formatPrice(itemTotal)}</span>`;
  }

  // Badge échéance (deadline manuelle prioritaire, sinon dérivée du périssable)
  let deadlineBadge = '';
  const effDeadline = effectiveDeadline(item);
  if (effDeadline && !effectiveDone) {
    const status = deadlineStatus(effDeadline);
    if (status.kind !== 'none') {
      const fromPerish = !item.deadline && item.perishable;
      const icon = status.kind === 'overdue' ? '🔴' : status.kind === 'urgent' ? '⚠️' : '📅';
      const cls = 'deadline-pill deadline-' + status.kind + (fromPerish ? ' deadline-from-perishable' : '');
      const title = fromPerish
        ? 'Rotation périssable prévue le ' + formatDate(effDeadline) + ' (tous les ' + item.perishable.intervalMonths + ' mois)'
        : 'Échéance : ' + formatDate(effDeadline);
      deadlineBadge = `<span class="${cls}" data-action="manage-item-deadline" data-id="${item.id}" title="${escapeHtml(title)}">${icon} ${escapeHtml(status.label)}</span>`;
    }
  }
  // Badge périssable jamais initialisé
  let perishableInitBadge = '';
  if (item.perishable && !item.perishable.lastRotation && !item.deadline) {
    perishableInitBadge = `<span class="deadline-pill deadline-init" data-action="manage-item-deadline" data-id="${item.id}" title="Périssable : noter la dernière rotation pour suivre les renouvellements (tous les ${item.perishable.intervalMonths} mois)">♻️ À initialiser</span>`;
  }
  // Badge alerte critique (mode Mamad)
  const criticalBadge = item.criticalAlert ? `<span class="critical-alert-badge" title="Action critique en cas d'alerte (sirène)">🚨</span>` : '';

  return `
    <div class="${cls}" data-id="${item.id}" draggable="true" data-drag-type="item">
      <div class="item-prio-bar" style="background:${dotColors[prio]};"></div>
      <div class="item-row">
        <div class="grip" role="button" tabindex="0" aria-label="Maintenir et faire glisser pour réorganiser">${ICO.grip}</div>
        <div class="move-buttons" role="group" aria-label="Réorganiser la tâche">
          <button data-action="move-item-up" data-id="${item.id}" aria-label="Monter cette tâche">${ICO.up}</button>
          <button data-action="move-item-down" data-id="${item.id}" aria-label="Descendre cette tâche">${ICO.down}</button>
        </div>
        <button class="checkbox-btn" data-action="toggle-item" data-id="${item.id}" role="checkbox" aria-checked="${effectiveDone}" aria-label="${effectiveDone ? 'Marquer comme non fait' : 'Marquer comme fait'} : ${escapeHtml(item.text)}">${checkIcon}</button>
        <div class="item-content">
          <div class="item-text-row">
            ${hasImage ? `<button class="image-thumb" data-action="open-lightbox-item" data-id="${item.id}" title="Voir l'image"><img src="${item.image}" alt=""></button>` : ''}
            ${criticalBadge}
            <span class="item-text${effectiveDone ? ' done' : ''}">${escapeHtml(item.text)}</span>
            ${hasLink ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer" class="link-inline" title="${escapeHtml(item.link)}">${ICO.linkSm}</a>` : ''}
            ${hasLocation ? `<span class="location-pill" style="background:${escapeHtml(item.location.color)};" data-action="filter-by-location" data-location="${escapeHtml(item.location.name)}" title="Cliquer pour filtrer par « ${escapeHtml(item.location.name)} »">${escapeHtml(item.location.name)}</span>` : ''}
            ${priceDisplay}
            ${deadlineBadge}
            ${perishableInitBadge}
            ${hasSubtasks ? `<span class="subtask-badge${effectiveDone ? ' all-done' : ''}" data-action="toggle-subtasks-display" data-id="${item.id}">
              ${subtasksOpen ? ICO.chevronD : ICO.chevronR} ${progress.done}/${progress.total}
            </span>` : ''}
            <select class="prio-select prio-${prio}" data-action="change-prio" data-id="${item.id}">
              ${Object.entries(PRIORITIES).map(([k,v]) => `<option value="${k}"${k===prio?' selected':''}>${v}</option>`).join('')}
            </select>
          </div>
          ${notesOpen ? `
            <textarea class="notes-textarea" data-action="update-notes" data-id="${item.id}" placeholder="Notes, liens, contacts, références…">${escapeHtml(item.notes || '')}</textarea>
          ` : (item.notes ? `
            <div class="notes-preview" data-action="toggle-notes-display" data-id="${item.id}">
              ${ICO.note}<span>${escapeHtml(item.notes.slice(0, 80))}${item.notes.length > 80 ? '…' : ''}</span>
            </div>
          ` : '')}
          ${locationOpen ? renderLocationEditor(item, 'item') : ''}
        </div>
        <div class="item-actions" role="toolbar" aria-label="Actions sur la tâche">
          ${!hasSubtasks ? `<button data-action="toggle-subtasks-display" data-id="${item.id}" title="Sous-tâches" aria-label="Afficher les sous-tâches">${ICO.chevronR}</button>` : ''}
          <button data-action="manage-item-image" data-id="${item.id}" title="${hasImage ? 'Voir ou gérer l’image' : 'Ajouter une image'}" aria-label="${hasImage ? 'Voir ou modifier l’image' : 'Ajouter une image'}"${hasImage ? ' class="has-data"' : ''}>${ICO.image}</button>
          <button data-action="toggle-location-editor" data-key="${item.id}" title="${hasLocation ? 'Modifier lieu' : 'Ajouter un lieu'}" aria-label="${hasLocation ? 'Modifier le lieu' : 'Ajouter un lieu'}"${hasLocation ? ' class="has-data"' : ''}>${ICO.tag}</button>
          <button data-action="manage-item-price" data-id="${item.id}" title="${hasOwnPrice ? 'Modifier le prix' : 'Ajouter un prix'}" aria-label="${hasOwnPrice ? 'Modifier le prix' : 'Ajouter un prix'}"${hasOwnPrice ? ' class="has-data"' : ''}>${ICO.euro}</button>
          <button data-action="manage-item-link" data-id="${item.id}" title="${hasLink ? 'Modifier le lien' : 'Ajouter un lien'}" aria-label="${hasLink ? 'Modifier le lien' : 'Ajouter un lien'}"${hasLink ? ' class="has-data"' : ''}>${ICO.link}</button>
          <button data-action="manage-item-deadline" data-id="${item.id}" title="${item.deadline ? 'Modifier l’échéance' : 'Ajouter une échéance'}" aria-label="${item.deadline ? 'Modifier l’échéance' : 'Ajouter une échéance'}"${item.deadline ? ' class="has-data"' : ''}>📅</button>
          <button data-action="manage-item-perishable" data-id="${item.id}" title="${item.perishable ? 'Gérer le rappel de rotation (périssable)' : 'Marquer comme périssable avec rappel de rotation'}" aria-label="${item.perishable ? 'Gérer rotation périssable' : 'Marquer périssable'}"${item.perishable ? ' class="has-data"' : ''}>♻️</button>
          <button data-action="toggle-notes-display" data-id="${item.id}" title="Notes" aria-label="${item.notes ? 'Voir ou modifier les notes' : 'Ajouter des notes'}"${item.notes?' class="has-data"':''}>${ICO.note}</button>
          <button data-action="edit-item" data-id="${item.id}" title="Modifier" aria-label="Modifier le texte de la tâche">${ICO.edit}</button>
          <button data-action="delete-item" data-id="${item.id}" class="delete" title="Supprimer" aria-label="Supprimer la tâche">${ICO.trash}</button>
        </div>
      </div>
      ${subtasksOpen ? renderSubtasks(item) : ''}
    </div>
  `;
}

function renderLocationEditor(item, kind, parentItemId) {
  // kind = 'item' or 'subtask'
  const key = kind === 'item' ? item.id : 'st:' + item.id;
  const current = item.location || { name: '', color: COLOR_PALETTE[0] };
  const editorId = kind === 'item' ? `loc-editor-${item.id}` : `loc-editor-st-${item.id}`;
  const dataAttr = kind === 'item'
    ? `data-item-id="${item.id}"`
    : `data-parent-id="${parentItemId}" data-subtask-id="${item.id}"`;
  return `
    <div class="${kind === 'item' ? 'location-editor' : 'subtask-location-editor'}" id="${editorId}">
      <input type="text" data-role="loc-name" ${dataAttr} placeholder="Magasin / Lieu (ex: IKEA, Amazon, Fnac)" value="${escapeHtml(current.name || '')}" autofocus>
      <div class="color-swatches" ${dataAttr}>
        ${COLOR_PALETTE.map(c => `<div class="color-swatch${c === current.color ? ' selected' : ''}" data-role="loc-color" data-color="${c}" style="background:${c};"></div>`).join('')}
      </div>
      <div class="row">
        <button class="btn-primary" data-action="save-location" data-kind="${kind}" data-key="${key}" data-item-id="${kind === 'item' ? item.id : parentItemId}" data-subtask-id="${kind === 'subtask' ? item.id : ''}">Enregistrer</button>
        ${current.name ? `<button class="btn-danger" data-action="remove-location" data-kind="${kind}" data-key="${key}" data-item-id="${kind === 'item' ? item.id : parentItemId}" data-subtask-id="${kind === 'subtask' ? item.id : ''}">Retirer</button>` : ''}
        <button class="btn-ghost" data-action="cancel-location-editor" data-key="${key}">Annuler</button>
      </div>
    </div>
  `;
}

function renderSubtasks(item) {
  const adding = state.adding && state.adding.type === 'subtask' && state.adding.parentId === item.id;
  const visibleSt = visibleSubtasks(item);
  const filteringHidesSome = state.locationFilter && visibleSt.length < (item.subtasks || []).length;
  let html = '<div class="subtasks-container">';
  if (filteringHidesSome) {
    html += `<div style="font-size:11px;opacity:0.55;font-style:italic;padding:2px 4px;">Affichage filtré : ${visibleSt.length}/${item.subtasks.length} sous-tâches (lieu « ${escapeHtml(state.locationFilter)} »)</div>`;
  }
  visibleSt.forEach(st => {
    const editingSt = state.editing && state.editing.type === 'subtask' && state.editing.id === st.id;
    const hasLink = !!st.link;
    const hasLocation = !!st.location;
    const hasPrice = st.price && st.price > 0;
    const hasImage = !!st.image;
    const locKey = 'st:' + st.id;
    const locOpen = state.expandedLocation[locKey];
    if (editingSt) {
      html += `
        <div class="subtask-row">
          <input type="text" style="flex:1; background: var(--surface); border:1px solid var(--line); border-radius:3px; padding:4px 8px; font-size:13px; outline:none;" id="inline-edit-subtask-${st.id}" value="${escapeHtml(state.editing.value)}">
          <button class="btn-primary" style="padding:4px 10px;" data-action="save-subtask-edit" data-id="${st.id}" data-item-id="${item.id}">OK</button>
          <button class="btn-ghost" style="padding:4px 8px;" data-action="cancel-edit">✕</button>
        </div>
      `;
    } else {
      html += `
        <div class="subtask-row">
          <button class="subtask-checkbox" data-action="toggle-subtask" data-item-id="${item.id}" data-id="${st.id}" role="checkbox" aria-checked="${!!st.done}" aria-label="${st.done ? 'Marquer comme non fait' : 'Marquer comme fait'} : ${escapeHtml(st.text)}">
            ${st.done ? ICO.checkSm : ICO.circleSm}
          </button>
          ${hasImage ? `<button class="image-thumb" style="width:22px;height:22px;" data-action="open-lightbox-subtask" data-item-id="${item.id}" data-id="${st.id}" title="Voir l'image"><img src="${st.image}" alt=""></button>` : ''}
          <span class="subtask-text${st.done?' done':''}">${escapeHtml(st.text)}</span>
          ${hasLink ? `<a href="${escapeHtml(st.link)}" target="_blank" rel="noopener noreferrer" class="link-inline" title="${escapeHtml(st.link)}">${ICO.linkSm}</a>` : ''}
          ${hasLocation ? `<span class="location-pill" style="background:${escapeHtml(st.location.color)};" data-action="filter-by-location" data-location="${escapeHtml(st.location.name)}" title="Cliquer pour filtrer par « ${escapeHtml(st.location.name)} »">${escapeHtml(st.location.name)}</span>` : ''}
          ${hasPrice ? `<span class="price-pill" data-action="manage-subtask-price" data-item-id="${item.id}" data-id="${st.id}">${formatPrice(st.price)}</span>` : ''}
          <span class="subtask-actions" role="toolbar" aria-label="Actions sur la sous-tâche">
            <button data-action="manage-subtask-image" data-item-id="${item.id}" data-id="${st.id}" title="${hasImage ? 'Voir ou gérer l’image' : 'Ajouter image'}" aria-label="${hasImage ? 'Voir ou modifier image de la sous-tâche' : 'Ajouter image à la sous-tâche'}"${hasImage ? ' class="has-data"' : ''}>${ICO.image}</button>
            <button data-action="toggle-location-editor" data-key="${locKey}" title="${hasLocation ? 'Modifier lieu' : 'Ajouter lieu'}" aria-label="${hasLocation ? 'Modifier lieu de la sous-tâche' : 'Ajouter lieu à la sous-tâche'}"${hasLocation ? ' class="has-data"' : ''}>${ICO.tag}</button>
            <button data-action="manage-subtask-price" data-item-id="${item.id}" data-id="${st.id}" title="${hasPrice ? 'Modifier prix' : 'Ajouter prix'}" aria-label="${hasPrice ? 'Modifier prix de la sous-tâche' : 'Ajouter prix à la sous-tâche'}"${hasPrice ? ' class="has-data"' : ''}>${ICO.euro}</button>
            <button data-action="manage-subtask-link" data-item-id="${item.id}" data-id="${st.id}" title="${hasLink ? 'Modifier lien' : 'Ajouter lien'}" aria-label="${hasLink ? 'Modifier lien de la sous-tâche' : 'Ajouter lien à la sous-tâche'}"${hasLink ? ' class="has-data"' : ''}>${ICO.link}</button>
            <button data-action="move-subtask-up" data-item-id="${item.id}" data-id="${st.id}" aria-label="Monter la sous-tâche">${ICO.up}</button>
            <button data-action="move-subtask-down" data-item-id="${item.id}" data-id="${st.id}" aria-label="Descendre la sous-tâche">${ICO.down}</button>
            <button data-action="edit-subtask" data-item-id="${item.id}" data-id="${st.id}" aria-label="Modifier le texte de la sous-tâche">${ICO.edit}</button>
            <button data-action="delete-subtask" data-item-id="${item.id}" data-id="${st.id}" class="danger" aria-label="Supprimer la sous-tâche">${ICO.trash}</button>
          </span>
          ${locOpen ? renderLocationEditor(st, 'subtask', item.id) : ''}
        </div>
      `;
    }
  });
  if (adding) {
    html += `
      <div class="subtask-row" style="gap:8px;">
        <input type="text" id="new-subtask-text" placeholder="Sous-tâche…" autofocus style="flex:1; background: var(--surface); border:1px solid var(--line); border-radius:3px; padding:4px 8px; font-size:13px; outline:none;">
        <button class="btn-primary" style="padding:4px 10px;" data-action="confirm-add-subtask" data-id="${item.id}">+</button>
        <button class="btn-ghost" style="padding:4px 8px;" data-action="cancel-add">✕</button>
      </div>
    `;
  } else if (!state.locationFilter) {
    // Don't show "add subtask" button when in filter mode (could be confusing)
    html += `<button class="add-subtask-btn" data-action="start-add-subtask" data-id="${item.id}">${ICO.plusSm} Ajouter une sous-tâche</button>`;
  }
  html += '</div>';
  return html;
}

function renderAddItemForm(parentType, parentId) {
  const prio = (state.adding && state.adding.priority) || 'medium';
  return `
    <div class="add-form">
      <input type="text" id="new-item-text" placeholder="Nouvelle tâche…" autofocus value="${escapeHtml((state.adding && state.adding.text) || '')}">
      <div class="row">
        <select id="new-item-prio">
          ${Object.entries(PRIORITIES).map(([k,v]) => `<option value="${k}"${k===prio?' selected':''}>${v}</option>`).join('')}
        </select>
        <button class="btn-primary" data-action="confirm-add-item" data-parent-type="${parentType}" data-parent-id="${parentId || ''}">Ajouter</button>
        <button class="btn-ghost" data-action="cancel-add">Annuler</button>
      </div>
    </div>
  `;
}

// ==============================================
// Event delegation
// ==============================================
function handleClick(e) {
  const el = e.target.closest('[data-action]');

  // Lightbox overlay click (outside content) closes
  const overlay = e.target.closest('[data-role="lightbox-overlay"]');
  if (overlay && e.target === overlay) {
    closeLightbox();
    return;
  }

  // Color swatch click
  const sw = e.target.closest('[data-role="loc-color"]');
  if (sw) {
    // Mark as selected visually
    const container = sw.parentElement;
    container.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
    sw.classList.add('selected');
    return;
  }

  if (!el) {
    // Close context menu on random click
    if (state.contextMenu) closeContextMenu();
    return;
  }

  const a = el.dataset.action;
  const id = el.dataset.id;

  switch (a) {
    case 'toggle-sync': activateSync(); break;
    case 'undo': performUndo(); break;
    case 'redo': performRedo(); break;
    case 'open-agenda': openAgendaView(); break;
    case 'open-settings': openSettingsView(); break;
    case 'agenda-goto': {
      const sectionId = el.dataset.sectionId;
      if (sectionId && state.data.sections.find(s => s.id === sectionId)) {
        state.currentSectionId = sectionId;
        // Fermer la modale agenda
        const modal = document.getElementById('custom-modal');
        if (modal) modal.remove();
        render();
        // Faire défiler jusqu'à l'élément après le render
        setTimeout(() => {
          const target = document.querySelector('[data-id="' + id + '"]');
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.classList.add('agenda-highlight');
            setTimeout(() => target.classList.remove('agenda-highlight'), 1800);
          }
        }, 80);
      }
      break;
    }
    case 'open-mamad-alert': openMamadAlertView(); break;
    case 'mark-rotated': markPerishableRotated(id); break;
    case 'select-section': {
      if (state.draggedType) return;
      state.currentSectionId = id;
      state.search = '';
      state.editing = null;
      state.adding = null;
      state.expandedNotes = {};
      state.expandedSubtasks = {};
      state.expandedLocation = {};
      render();
      break;
    }
    case 'add-section': {
      addSectionInteractive();
      break;
    }
    case 'edit-section': {
      const sec = state.data.sections.find(s => s.id === id); if (!sec) return;
      state.editing = { type: 'section', id, value: sec.title };
      render();
      setTimeout(() => document.getElementById('inline-edit-title')?.focus(), 30);
      break;
    }
    case 'save-section-edit': {
      const title = document.getElementById('inline-edit-title').value;
      const subtitle = document.getElementById('inline-edit-subtitle').value;
      const emoji = document.getElementById('inline-edit-emoji').value;
      state.editing = null;
      updateSectionTitle(state.currentSectionId, title, subtitle, emoji);
      break;
    }
    case 'open-tab-menu': {
      const rect = el.getBoundingClientRect();
      openTabContextMenu(id, rect.left, rect.bottom + 4);
      break;
    }
    case 'close-context-menu': closeContextMenu(); break;
    case 'ctx-rename-tab': ctxRenameTab(id); break;
    case 'ctx-emoji-tab': ctxChangeEmojiTab(id); break;
    case 'ctx-subtitle-tab': ctxEditSubtitleTab(id); break;
    case 'ctx-delete-tab': ctxDeleteTab(id); break;

    case 'clear-search': state.search = ''; render(); break;

    case 'start-add-item': {
      state.adding = { type: 'item', parentType: el.dataset.parentType, parentId: el.dataset.parentId || null, text: '', priority: 'medium' };
      render();
      setTimeout(() => document.getElementById('new-item-text')?.focus(), 30);
      break;
    }
    case 'confirm-add-item': {
      const text = document.getElementById('new-item-text').value;
      const prio = document.getElementById('new-item-prio').value;
      const parentType = el.dataset.parentType;
      const parentId = el.dataset.parentId || null;
      state.adding = null;
      addItem(parentType, parentId, text, prio);
      break;
    }
    case 'cancel-add': state.adding = null; render(); break;

    case 'start-add-subsection': {
      state.adding = { type: 'subsection' };
      render();
      setTimeout(() => document.getElementById('new-subsection-title')?.focus(), 30);
      break;
    }
    case 'confirm-add-subsection': {
      const title = document.getElementById('new-subsection-title').value;
      state.adding = null;
      addSubsection(title);
      break;
    }
    case 'edit-subsection': {
      const sec = currentSection();
      const sub = sec.subsections.find(s => s.id === id); if (!sub) return;
      state.editing = { type: 'subsection', id, value: sub.title };
      render();
      setTimeout(() => document.getElementById('inline-edit-subsection-' + id)?.focus(), 30);
      break;
    }
    case 'save-subsection-edit': {
      const val = document.getElementById('inline-edit-subsection-' + id).value;
      state.editing = null;
      updateSubsectionTitle(id, val);
      break;
    }
    case 'delete-subsection': deleteSubsection(id); break;
    case 'toggle-subsection': toggleSubsection(id); break;
    case 'move-subsection-up': moveSubsection(id, 'up'); break;
    case 'move-subsection-down': moveSubsection(id, 'down'); break;

    case 'toggle-item': toggleItemDone(id); break;
    case 'change-prio': break;
    case 'edit-item': {
      const item = findItem(id); if (!item) return;
      state.editing = { type: 'item', id, value: item.text };
      render();
      setTimeout(() => document.getElementById('inline-edit-item-' + id)?.focus(), 30);
      break;
    }
    case 'save-item-edit': {
      const val = document.getElementById('inline-edit-item-' + id).value;
      state.editing = null;
      updateItemText(id, val);
      break;
    }
    case 'cancel-edit': state.editing = null; render(); break;
    case 'delete-item': deleteItem(id); break;
    case 'move-item-up': moveItem(id, 'up'); break;
    case 'move-item-down': moveItem(id, 'down'); break;
    case 'toggle-notes-display': state.expandedNotes[id] = !state.expandedNotes[id]; render(); break;
    case 'toggle-subtasks-display': state.expandedSubtasks[id] = !state.expandedSubtasks[id]; render(); break;
    case 'manage-item-link': manageItemLink(id); break;
    case 'manage-item-price': manageItemPrice(id); break;
    case 'manage-item-deadline': manageItemDeadline(id); break;
    case 'manage-item-perishable': manageItemPerishable(id); break;

    case 'toggle-location-editor': {
      const key = el.dataset.key;
      toggleLocationEditor(key);
      break;
    }
    case 'cancel-location-editor': {
      const key = el.dataset.key;
      state.expandedLocation[key] = false;
      render();
      break;
    }
    case 'save-location': {
      const kind = el.dataset.kind;
      const key = el.dataset.key;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      const editorId = kind === 'item' ? `loc-editor-${itemId}` : `loc-editor-st-${subtaskId}`;
      const editor = document.getElementById(editorId);
      const nameInput = editor.querySelector('[data-role="loc-name"]');
      const selectedSwatch = editor.querySelector('.color-swatch.selected');
      const name = nameInput.value;
      const color = selectedSwatch ? selectedSwatch.dataset.color : COLOR_PALETTE[0];
      state.expandedLocation[key] = false;
      if (kind === 'item') updateItemLocation(itemId, name, color);
      else updateSubtaskLocation(itemId, subtaskId, name, color);
      break;
    }
    case 'remove-location': {
      const kind = el.dataset.kind;
      const key = el.dataset.key;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      state.expandedLocation[key] = false;
      if (kind === 'item') updateItemLocation(itemId, '', '');
      else updateSubtaskLocation(itemId, subtaskId, '', '');
      break;
    }

    case 'manage-subtask-link': manageSubtaskLink(el.dataset.itemId, id); break;
    case 'manage-subtask-price': manageSubtaskPrice(el.dataset.itemId, id); break;
    case 'toggle-subtask': toggleSubtaskDone(el.dataset.itemId, id); break;

    // Image actions
    case 'manage-item-image': manageItemImage(id); break;
    case 'manage-subtask-image': manageSubtaskImage(el.dataset.itemId, id); break;
    case 'open-lightbox-item': openLightboxItem(id); break;
    case 'open-lightbox-subtask': openLightboxSubtask(el.dataset.itemId, id); break;
    case 'close-lightbox': closeLightbox(); break;
    case 'replace-image': {
      const kind = el.dataset.kind;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      // Close lightbox first
      state.lightbox = null;
      render();
      // Then pick a new image
      pickImage((dataUrl) => {
        if (kind === 'item') updateItemImage(itemId, dataUrl);
        else updateSubtaskImage(itemId, subtaskId, dataUrl);
      });
      break;
    }
    case 'remove-image': {
      const kind = el.dataset.kind;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      confirmDialog('Supprimer l\'image attachée ?', { title: 'Supprimer l\'image', okLabel: 'Supprimer', danger: true })
        .then(ok => {
          if (!ok) return;
          state.lightbox = null;
          if (kind === 'item') updateItemImage(itemId, '');
          else updateSubtaskImage(itemId, subtaskId, '');
          showToast('Image supprimée.');
        });
      break;
    }

    // Location filter actions
    case 'filter-by-location': {
      const locName = el.dataset.location;
      // Toggle: if same filter is active, clear it
      if (state.locationFilter === locName) {
        state.locationFilter = null;
      } else {
        state.locationFilter = locName;
      }
      render();
      break;
    }
    case 'clear-location-filter': {
      state.locationFilter = null;
      render();
      break;
    }

    case 'start-add-subtask': {
      state.adding = { type: 'subtask', parentId: id };
      state.expandedSubtasks[id] = true;
      render();
      setTimeout(() => document.getElementById('new-subtask-text')?.focus(), 30);
      break;
    }
    case 'confirm-add-subtask': {
      const text = document.getElementById('new-subtask-text').value;
      state.adding = null;
      addSubtask(id, text);
      break;
    }
    case 'edit-subtask': {
      const itemId = el.dataset.itemId;
      const item = findItem(itemId); if (!item) return;
      const st = item.subtasks.find(s => s.id === id); if (!st) return;
      state.editing = { type: 'subtask', id, parentId: itemId, value: st.text };
      render();
      setTimeout(() => document.getElementById('inline-edit-subtask-' + id)?.focus(), 30);
      break;
    }
    case 'save-subtask-edit': {
      const itemId = el.dataset.itemId;
      const val = document.getElementById('inline-edit-subtask-' + id).value;
      state.editing = null;
      updateSubtaskText(itemId, id, val);
      break;
    }
    case 'delete-subtask': deleteSubtask(el.dataset.itemId, id); break;
    case 'move-subtask-up': moveSubtask(el.dataset.itemId, id, 'up'); break;
    case 'move-subtask-down': moveSubtask(el.dataset.itemId, id, 'down'); break;
  }
}

function handleChange(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action; const id = el.dataset.id;
  if (a === 'change-prio') changeItemPriority(id, e.target.value);
  if (a === 'set-filter') { state.filter = e.target.value; render(); }
  if (a === 'set-prio-filter') { state.priorityFilter = e.target.value; render(); }
  if (a === 'set-location-filter') { state.locationFilter = e.target.value || null; render(); }
}

// Debounce de la recherche : on ne re-render qu'après 250ms d'inactivité de frappe
// Évite 9 renders sur "passeport" → 1 seul render à la fin
let searchDebounceTimer = null;

function handleInput(e) {
  const el = e.target;
  if (el.id === 'search-input') {
    // Mise à jour optimiste : on stocke la nouvelle valeur immédiatement
    // mais on diffère le render pour éviter de re-rendre toute l'app à chaque frappe
    state.search = el.value;
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      // Avant de re-render, on capture la position du curseur
      const inp = document.getElementById('search-input');
      const cursor = inp ? inp.selectionStart : null;
      render();
      const ni = document.getElementById('search-input');
      if (ni && cursor !== null) { ni.focus(); ni.setSelectionRange(cursor, cursor); }
    }, 250);
    return;
  }
  const ae = el.closest('[data-action]');
  if (ae && ae.dataset.action === 'update-notes') updateItemNotes(ae.dataset.id, el.value);
}

// ==============================================
// Raccourcis clavier globaux (Ctrl+Z, Ctrl+Shift+Z, Ctrl+Y)
// ==============================================
function handleGlobalKeydown(e) {
  // On ignore le raccourci si l'utilisateur est en train de saisir du texte
  // (input/textarea/contenteditable) — laisser le Ctrl+Z natif faire son travail dans le champ.
  const ae = document.activeElement;
  if (ae) {
    const tag = ae.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || ae.isContentEditable) return;
  }
  // Ctrl+Z (ou ⌘+Z sur Mac) sans Shift = Undo
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    performUndo();
    return;
  }
  // Ctrl+Shift+Z (ou ⌘+Shift+Z) ou Ctrl+Y = Redo
  if (((e.ctrlKey || e.metaKey) && e.shiftKey && !e.altKey && e.key.toLowerCase() === 'z')
   || ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'y')) {
    e.preventDefault();
    performRedo();
    return;
  }
}

function handleKeydown(e) {
  const el = e.target;
  if (e.key === 'Enter' && !e.shiftKey) {
    if (el.id === 'inline-edit-title') { document.querySelector('[data-action="save-section-edit"]')?.click(); e.preventDefault(); }
    if (el.id?.startsWith('inline-edit-subsection-')) { document.querySelector(`[data-action="save-subsection-edit"][data-id="${el.id.replace('inline-edit-subsection-','')}"]`)?.click(); e.preventDefault(); }
    if (el.id?.startsWith('inline-edit-item-')) { document.querySelector(`[data-action="save-item-edit"][data-id="${el.id.replace('inline-edit-item-','')}"]`)?.click(); e.preventDefault(); }
    if (el.id?.startsWith('inline-edit-subtask-')) { document.querySelector(`[data-action="save-subtask-edit"][data-id="${el.id.replace('inline-edit-subtask-','')}"]`)?.click(); e.preventDefault(); }
    if (el.id === 'new-item-text') { document.querySelector('[data-action="confirm-add-item"]')?.click(); e.preventDefault(); }
    if (el.id === 'new-subsection-title') { document.querySelector('[data-action="confirm-add-subsection"]')?.click(); e.preventDefault(); }
    if (el.id === 'new-subtask-text') { document.querySelector('[data-action="confirm-add-subtask"]')?.click(); e.preventDefault(); }
  }
  if (e.key === 'Escape') {
    if (state.lightbox) { closeLightbox(); return; }
    if (state.contextMenu) { closeContextMenu(); return; }
    if (state.editing) { state.editing = null; render(); }
    else if (state.adding) { state.adding = null; render(); }
  }
  // Navigation clavier dans le tablist (pattern ARIA standard) :
  // Flèche gauche/droite = onglet précédent/suivant, Home/End = premier/dernier
  if (el.getAttribute && el.getAttribute('role') === 'tab') {
    const tabs = Array.from(document.querySelectorAll('[role="tab"]'));
    const i = tabs.indexOf(el);
    if (i < 0) return;
    let next = -1;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = (i + 1) % tabs.length;
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = (i - 1 + tabs.length) % tabs.length;
    else if (e.key === 'Home') next = 0;
    else if (e.key === 'End') next = tabs.length - 1;
    if (next >= 0) {
      e.preventDefault();
      tabs[next].focus();
      // Activer l'onglet (changer de section) — comportement "automatic activation"
      const sectionId = tabs[next].dataset.id;
      if (sectionId && state.data.sections.find(s => s.id === sectionId)) {
        state.currentSectionId = sectionId;
        render();
        // Restaurer le focus sur l'onglet après render (le DOM a été reconstruit)
        setTimeout(() => {
          const newTab = document.querySelector('[role="tab"][data-id="' + sectionId + '"]');
          if (newTab) newTab.focus();
        }, 30);
      }
    }
  }
}

// ==============================================
// Context menu triggers (right-click, dblclick, long-press)
// ==============================================
function handleContextMenu(e) {
  const tab = e.target.closest('.tab[data-drag-type="tab"]');
  if (!tab) return;
  e.preventDefault();
  openTabContextMenu(tab.dataset.id, e.clientX, e.clientY);
}
function handleDblClick(e) {
  const tab = e.target.closest('.tab[data-drag-type="tab"]');
  if (!tab) return;
  e.preventDefault();
  ctxRenameTab(tab.dataset.id);
}

let longPressTimer = null;
let longPressFired = false;

// === Drag tactile ===
// HTML5 drag-and-drop ne fonctionne pas sur mobile. On implémente un système
// similaire basé sur touch : appui long (500 ms) sur un élément draggable lance le drag,
// touchmove met à jour la cible, touchend valide la dépose.
let touchDragState = {
  active: false,
  startX: 0, startY: 0,
  draggedType: null, draggedId: null,
  triggerTimer: null,
  ghost: null,
};

function findDraggableFromTouch(touch) {
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (!el) return null;
  return el.closest('[data-drag-type]');
}

function startTouchDrag(el, touch) {
  touchDragState.active = true;
  touchDragState.draggedType = el.dataset.dragType;
  touchDragState.draggedId = el.dataset.id;
  state.draggedType = el.dataset.dragType;
  state.draggedId = el.dataset.id;
  document.body.classList.add('touch-dragging');
  if (navigator.vibrate) try { navigator.vibrate(20); } catch (e) { console.warn('[touch] vibrate failed:', e); }
  // Crée un fantôme visuel suivant le doigt
  const rect = el.getBoundingClientRect();
  const ghost = el.cloneNode(true);
  ghost.style.position = 'fixed';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  ghost.style.width = rect.width + 'px';
  ghost.style.pointerEvents = 'none';
  ghost.style.opacity = '0.85';
  ghost.style.transform = 'scale(1.04)';
  ghost.style.boxShadow = '0 12px 32px rgba(0,0,0,0.25)';
  ghost.style.zIndex = '9998';
  ghost.style.borderRadius = '6px';
  ghost.classList.add('touch-drag-ghost');
  document.body.appendChild(ghost);
  touchDragState.ghost = ghost;
  touchDragState.ghostOffsetX = touch.clientX - rect.left;
  touchDragState.ghostOffsetY = touch.clientY - rect.top;
  render();
}

function updateTouchDrag(touch) {
  if (!touchDragState.active) return;
  // Déplace le fantôme
  if (touchDragState.ghost) {
    touchDragState.ghost.style.left = (touch.clientX - touchDragState.ghostOffsetX) + 'px';
    touchDragState.ghost.style.top = (touch.clientY - touchDragState.ghostOffsetY) + 'px';
  }
  // Trouve l'élément cible sous le doigt
  // (cacher temporairement le fantôme pour qu'il ne soit pas détecté comme cible)
  if (touchDragState.ghost) touchDragState.ghost.style.display = 'none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (touchDragState.ghost) touchDragState.ghost.style.display = '';
  if (!el) return;
  let target = null;
  if (touchDragState.draggedType === 'item') target = el.closest('.item[data-drag-type="item"]');
  else if (touchDragState.draggedType === 'subsection') target = el.closest('.subsection[data-drag-type="subsection"]');
  else if (touchDragState.draggedType === 'tab') target = el.closest('.tab[data-drag-type="tab"]');
  if (target && target.dataset.id !== touchDragState.draggedId) {
    if (state.dropTargetId !== target.dataset.id) {
      // Optim : au lieu d'un full render() à chaque mouvement de doigt (60 fps potentiel),
      // on applique/retire la classe 'drop-target' directement dans le DOM.
      // Le state reste cohérent pour le drop final.
      const prevTargetId = state.dropTargetId;
      state.dropTargetId = target.dataset.id;
      // Retirer drop-target de l'ancien
      if (prevTargetId) {
        const sel = touchDragState.draggedType === 'item' ? '.item[data-id="' + prevTargetId + '"]'
                  : touchDragState.draggedType === 'subsection' ? '.subsection[data-id="' + prevTargetId + '"]'
                  : '.tab[data-id="' + prevTargetId + '"]';
        const prev = document.querySelector(sel);
        if (prev) prev.classList.remove('drop-target', 'drop-target-touch');
      }
      // Appliquer drop-target sur le nouveau (avec classe spéciale tactile pour halo plus marqué)
      target.classList.add('drop-target', 'drop-target-touch');
    }
  }
  // Auto-scroll quand on approche du bord vertical
  const margin = 80;
  const speed = 12;
  if (touch.clientY < margin) window.scrollBy(0, -speed);
  else if (touch.clientY > window.innerHeight - margin) window.scrollBy(0, speed);
}

function endTouchDrag() {
  if (!touchDragState.active) return;
  document.body.classList.remove('touch-dragging');
  // Récupère la cible finale et applique le drop
  const dId = state.draggedId;
  const tId = state.dropTargetId;
  const type = state.draggedType;
  // Cleanup du fantôme
  if (touchDragState.ghost) { touchDragState.ghost.remove(); touchDragState.ghost = null; }
  // Cleanup des classes drop-target ajoutées en mode tactile
  document.querySelectorAll('.drop-target-touch').forEach(el => el.classList.remove('drop-target', 'drop-target-touch'));
  state.draggedType = null; state.draggedId = null; state.dropTargetId = null;
  touchDragState.active = false;
  touchDragState.draggedType = null; touchDragState.draggedId = null;
  if (tId && dId && tId !== dId && type) {
    if (type === 'item') dropReorderItem(dId, tId);
    else if (type === 'subsection') dropReorderSubsection(dId, tId);
    else if (type === 'tab') dropReorderTab(dId, tId);
  } else {
    render();
  }
}

function cancelTouchDrag() {
  if (touchDragState.triggerTimer) { clearTimeout(touchDragState.triggerTimer); touchDragState.triggerTimer = null; }
  if (touchDragState.active) endTouchDrag();
}

function handleTouchStart(e) {
  // Cas 1 : appui long sur tab → menu contextuel (comportement existant préservé)
  const tab = e.target.closest('.tab[data-drag-type="tab"]');
  if (tab) {
    longPressFired = false;
    longPressTimer = setTimeout(() => {
      const rect = tab.getBoundingClientRect();
      longPressFired = true;
      if (navigator.vibrate) try { navigator.vibrate(15); } catch (e) { console.warn('[touch] vibrate context menu failed:', e); }
      openTabContextMenu(tab.dataset.id, rect.left + rect.width/2 - 100, rect.bottom + 6);
    }, 500);
  }
  // Cas 2 : appui long sur la grip d'un item → drag tactile
  const t = e.touches[0];
  if (!t) return;
  const grip = e.target.closest('.grip');
  const draggable = grip ? grip.closest('[data-drag-type]') : null;
  if (draggable && draggable.dataset.dragType === 'item') {
    touchDragState.startX = t.clientX;
    touchDragState.startY = t.clientY;
    touchDragState.triggerTimer = setTimeout(() => {
      startTouchDrag(draggable, t);
    }, 350);
  }
}

function handleTouchMove(e) {
  // Si le doigt bouge avant le déclenchement du drag → annuler le déclencheur
  if (touchDragState.triggerTimer && !touchDragState.active) {
    const t = e.touches[0];
    if (t) {
      const dx = Math.abs(t.clientX - touchDragState.startX);
      const dy = Math.abs(t.clientY - touchDragState.startY);
      if (dx > 8 || dy > 8) {
        clearTimeout(touchDragState.triggerTimer);
        touchDragState.triggerTimer = null;
      }
    }
  }
  // Si le drag est actif, met à jour la position
  if (touchDragState.active) {
    e.preventDefault();
    const t = e.touches[0];
    if (t) updateTouchDrag(t);
  } else {
    clearLongPress();
  }
}

function clearLongPress() { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } }
function handleTouchEnd(e) {
  clearLongPress();
  if (touchDragState.triggerTimer) { clearTimeout(touchDragState.triggerTimer); touchDragState.triggerTimer = null; }
  if (touchDragState.active) {
    e.preventDefault();
    endTouchDrag();
  }
  if (longPressFired) { e.preventDefault(); longPressFired = false; }
}

// ==============================================
// Drag & Drop
// ==============================================
function handleDragStart(e) {
  const d = e.target.closest('[data-drag-type]');
  if (!d) return;
  state.draggedType = d.dataset.dragType;
  state.draggedId = d.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', d.dataset.id); } catch (err) { console.warn('[drag] dataTransfer.setData failed:', err); }
  d.classList.add('dragging');
}
function handleDragOver(e) {
  if (!state.draggedType || !state.draggedId) return;
  let t;
  if (state.draggedType === 'item') t = e.target.closest('.item[data-drag-type="item"]');
  else if (state.draggedType === 'subsection') t = e.target.closest('.subsection[data-drag-type="subsection"]');
  else if (state.draggedType === 'tab') t = e.target.closest('.tab[data-drag-type="tab"]');
  if (!t) return;
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  const id = t.dataset.id;
  if (id !== state.draggedId && state.dropTargetId !== id) {
    state.dropTargetId = id;
    document.querySelectorAll('.drop-target').forEach(x => x.classList.remove('drop-target'));
    t.classList.add('drop-target');
  }
}
function handleDrop(e) {
  if (!state.draggedType || !state.draggedId) return;
  let t;
  if (state.draggedType === 'item') t = e.target.closest('.item[data-drag-type="item"]');
  else if (state.draggedType === 'subsection') t = e.target.closest('.subsection[data-drag-type="subsection"]');
  else if (state.draggedType === 'tab') t = e.target.closest('.tab[data-drag-type="tab"]');
  if (!t) { handleDragEnd(); return; }
  e.preventDefault();
  const tId = t.dataset.id; const dId = state.draggedId; const type = state.draggedType;
  state.draggedType = null; state.draggedId = null; state.dropTargetId = null;
  if (type === 'item') dropReorderItem(dId, tId);
  else if (type === 'subsection') dropReorderSubsection(dId, tId);
  else if (type === 'tab') dropReorderTab(dId, tId);
}
function handleDragEnd() {
  state.draggedType = null; state.draggedId = null; state.dropTargetId = null;
  document.querySelectorAll('.dragging, .drop-target').forEach(x => { x.classList.remove('dragging'); x.classList.remove('drop-target'); });
}

// ==============================================
// Init
// ==============================================
(async function init() {
  let loaded = await loadData();
  if (!loaded) { loaded = JSON.parse(JSON.stringify(DEFAULT_DATA)); await saveData(loaded); }
  state.data = loaded;

  const app = document.getElementById('app');
  app.addEventListener('click', handleClick);
  app.addEventListener('change', handleChange);
  app.addEventListener('input', handleInput);
  app.addEventListener('keydown', handleKeydown);
  app.addEventListener('dragstart', handleDragStart);
  app.addEventListener('dragover', handleDragOver);
  app.addEventListener('drop', handleDrop);
  app.addEventListener('dragend', handleDragEnd);
  app.addEventListener('contextmenu', handleContextMenu);
  app.addEventListener('dblclick', handleDblClick);
  app.addEventListener('touchstart', handleTouchStart, { passive: true });
  app.addEventListener('touchend', handleTouchEnd);
  app.addEventListener('touchmove', handleTouchMove, { passive: false });
  app.addEventListener('touchcancel', (e) => { clearLongPress(); cancelTouchDrag(); });

  // Raccourcis clavier globaux (Ctrl+Z / Ctrl+Shift+Z / Ctrl+Y)
  window.addEventListener('keydown', handleGlobalKeydown);

  render();

  // Initialiser l'indicateur Undo (désactivé tant qu'aucune action n'a été faite)
  updateUndoIndicator();

  // Rappel au démarrage : toast si des tâches sont en retard
  // Attendu 1.5s pour ne pas saturer l'utilisateur dès l'arrivée + délai au cas où
  // un pull de sync arriverait juste après et changerait les compteurs
  setTimeout(() => {
    try {
      const tasks = collectDeadlineTasks(false);
      const overdue = tasks.filter(t => t.status.kind === 'overdue').length;
      const urgent = tasks.filter(t => t.status.kind === 'urgent').length;
      if (overdue > 0) {
        const msg = overdue + ' tâche' + (overdue > 1 ? 's' : '')
          + ' en retard' + (urgent > 0 ? ' et ' + urgent + ' urgente' + (urgent > 1 ? 's' : '') : '')
          + '. Voir l\'agenda 📅';
        showToast('🔴 ' + msg, 5000);
      } else if (urgent > 0) {
        showToast('⚠️ ' + urgent + ' tâche' + (urgent > 1 ? 's' : '') + ' urgente' + (urgent > 1 ? 's' : '') + ' (≤ 3 jours). Voir l\'agenda 📅', 4000);
      }
    } catch(e) { console.warn('[boot] overdue reminder failed:', e); }
  }, 1500);

  // Démarrer la synchronisation cross-device si activée par URL fragment
  updateSyncIndicator();
  if (syncState.enabled) {
    startSyncPolling();
    startSyncFreshnessTicker(); // mise à jour "il y a Xs" toutes les 10s
    // Pull immédiat pour récupérer la version la plus récente
    pollAndMerge();
  }

  // Rappel "X tâches en retard" au boot (option 32a + 32c).
  // On attend 1.2s pour laisser le pull initial terminer s'il y en a un, et pour ne pas
  // lancer le toast pile au moment où l'utilisateur regarde l'écran de chargement.
  setTimeout(() => {
    try {
      const tasks = collectDeadlineTasks(false);
      const overdue = tasks.filter(t => t.status.kind === 'overdue').length;
      const urgent = tasks.filter(t => t.status.kind === 'urgent').length;
      if (overdue > 0) {
        const msg = overdue + ' tâche' + (overdue > 1 ? 's' : '') + ' en retard'
                  + (urgent > 0 ? ' • ' + urgent + ' urgente' + (urgent > 1 ? 's' : '') : '')
                  + ' — voir l\'agenda';
        showToast(msg, 4500, 'error');
      } else if (urgent > 0) {
        showToast(urgent + ' tâche' + (urgent > 1 ? 's' : '') + ' urgente' + (urgent > 1 ? 's' : '') + ' (≤ 3 jours) — voir l\'agenda', 3500);
      }
    } catch(e) { console.warn('[boot] overdue check failed:', e); }
  }, 1200);
})();
</script>
