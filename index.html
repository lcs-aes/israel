<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Expatriation Sydney → Tel Aviv</title>
 <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/d/d4/Flag_of_Israel.svg">

<style>
  /* === Mobile : éviter le zoom auto iOS === */
  /* Sur iOS, un input avec font-size < 16px déclenche un zoom au focus, ce qui est gênant.
     On force 16px minimum sur tous les champs sur mobile. */
  @media (max-width: 768px) {
    input[type="text"],
    input[type="url"],
    input[type="email"],
    input[type="tel"],
    input[type="number"],
    input[type="date"],
    input[type="search"],
    textarea,
    select {
      font-size: 16px !important;
    }
  }

  /* Note : on n'applique PAS `overscroll-behavior-y: contain` ici.
     Cette propriété, prévue pour désactiver le pull-to-refresh sur mobile,
     casse le scroll molette sur certains navigateurs desktop (Chrome notamment).
     Le risque d'un rechargement involontaire sur mobile est mineur (la sync
     conserve les données entre rechargements) — beaucoup moins grave qu'une
     molette qui ne fonctionne plus sur PC. */

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  /* === Accessibilité === */
  /* Pour les libellés visuellement masqués mais lus par les lecteurs d'écran */
  .sr-only {
    position: absolute !important;
    width: 1px !important; height: 1px !important;
    padding: 0 !important; margin: -1px !important;
    overflow: hidden !important; clip: rect(0,0,0,0) !important;
    white-space: nowrap !important; border: 0 !important;
  }
  /* Skip link : invisible jusqu'à ce qu'il prenne le focus (Tab depuis le haut de la page).
     Permet aux utilisateurs clavier de sauter directement au contenu principal. */
  .skip-link {
    position: absolute;
    top: -40px; left: 8px;
    background: var(--ink); color: var(--bg);
    padding: 8px 16px; border-radius: 4px;
    text-decoration: none;
    font-size: 14px; font-weight: 500;
    z-index: 10001;
    transition: top 0.2s;
  }
  .skip-link:focus {
    top: 8px;
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  /* Focus visible amélioré (pour navigation clavier) */
  :focus { outline: none; }
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 3px;
  }
  /* Respect des préférences utilisateur réduction des animations */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
  /* Cible tactile minimale (recommandation WCAG : 44x44px) */
  button, [role="button"], a, input, select, textarea {
    min-height: 24px;
  }

  :root {
    --bg: #FAF7F2;
    --ink: #1E1A17;
    --ink-soft: #4A4540;
    --line: rgba(30, 26, 23, 0.1);
    --line-soft: rgba(30, 26, 23, 0.05);
    --surface: rgba(255, 255, 255, 0.75);
    --surface-soft: rgba(255, 255, 255, 0.55);
    --surface-hover: #ffffff;
    --accent: #C2410C;
    --accent-blue: #0E2A47;
    --green: #65A30D;
    /* Badges priorité — fonds plus saturés (+12%) et textes plus sombres pour contraste WCAG AA */
    --crit-bg: #FECACA; --crit-fg: #7F1D1D; --crit-dot: #B91C1C;
    --high-bg: #FED7AA; --high-fg: #7C2D12; --high-dot: #C2410C;
    --med-bg:  #FDE68A; --med-fg:  #713F12; --med-dot:  #A16207;
    --low-bg:  #E2E8F0; --low-fg:  #334155; --low-dot:  #64748B;
  }
  html, body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(201, 94, 43, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(14, 42, 71, 0.04) 0%, transparent 40%);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh; /* fallback navigateurs anciens */
    min-height: 100dvh; /* viewport dynamique : tient compte de la barre URL mobile qui s'ouvre/ferme */
    overflow-x: hidden;
  }
  body {
    padding-bottom: max(60px, env(safe-area-inset-bottom, 60px));
    padding-top: env(safe-area-inset-top, 0);
  }
  .wrap {
    max-width: 960px; margin: 0 auto;
    padding: 0 max(14px, env(safe-area-inset-left, 14px)) 0 max(14px, env(safe-area-inset-right, 14px));
  }
  @media (min-width: 640px) { .wrap { padding-left: max(24px, env(safe-area-inset-left, 24px)); padding-right: max(24px, env(safe-area-inset-right, 24px)); } }
  @media (min-width: 900px) { .wrap { padding-left: max(32px, env(safe-area-inset-left, 32px)); padding-right: max(32px, env(safe-area-inset-right, 32px)); } }

  .serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01", "ss02"; }
  button { font-family: inherit; font-size: inherit; background: none; border: none; cursor: pointer; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  select { cursor: pointer; }
  a { color: inherit; }

  /* Header */
  header { padding: 20px 0 14px; border-bottom: 1px solid var(--line); }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  h1 { font-family: 'Fraunces', Georgia, serif; font-size: 28px; font-weight: 400; line-height: 1.05; letter-spacing: -0.01em; }
  h1 em { font-style: italic; color: var(--accent); }
  @media (min-width: 640px) { h1 { font-size: 40px; } }
  @media (min-width: 900px) { h1 { font-size: 48px; } }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .save-indicator { font-size: 11px; opacity: 0.6; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  .save-indicator.saving { opacity: 1; color: var(--accent); }
  .refresh-btn { font-size: 11px; opacity: 0.6; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; }
  .refresh-btn:hover { opacity: 1; }
  /* Bouton Annuler — pulse subtile quand devient actif après une action */
  #undo-btn:not(:disabled) { transition: opacity 0.2s, color 0.2s; }
  #undo-btn:not(:disabled):hover { color: var(--accent); }

  .progress-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; gap:10px; flex-wrap:wrap; }
  .progress-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; }
  @media (min-width: 640px) { .progress-label { font-size: 11px; } }
  .progress-value { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; }
  @media (min-width: 640px) { .progress-value { font-size: 26px; } }
  .progress-value .pct-sign { font-size: 12px; opacity: 0.5; font-family: 'DM Sans', sans-serif; }
  .progress-bar { height: 5px; background: rgba(30, 26, 23, 0.1); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent) 100%); transition: width 0.6s ease; }

  /* Tooltip détail progression par section */
  .progress-bar-wrapper {
    position: relative;
    cursor: help;
    padding: 6px 0;
    margin: -6px 0;
  }
  .progress-bar-wrapper:focus { outline: none; }
  .progress-bar-wrapper:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 4px; }
  .progress-tooltip {
    position: absolute;
    left: 0; right: 0; top: calc(100% + 6px);
    background: var(--ink);
    color: var(--bg);
    padding: 12px 14px;
    border-radius: 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    z-index: 50;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
    font-size: 12px;
    max-height: 60vh;
    overflow-y: auto;
  }
  .progress-bar-wrapper:hover .progress-tooltip,
  .progress-bar-wrapper:focus .progress-tooltip,
  .progress-bar-wrapper:focus-within .progress-tooltip { opacity: 1; transform: translateY(0); }
  .progress-tooltip-title {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    opacity: 0.85;
  }
  .progress-tooltip-row {
    display: grid;
    grid-template-columns: 18px 1fr 80px 50px;
    gap: 8px;
    align-items: center;
    padding: 3px 0;
  }
  .progress-tooltip-emoji { font-size: 13px; line-height: 1; text-align: center; }
  .progress-tooltip-name { font-size: 12px; opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progress-tooltip-mini-bar {
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
    display: block;
  }
  .progress-tooltip-mini-fill {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #FBBF24, #34D399);
    transition: width 0.6s ease;
  }
  .progress-tooltip-pct {
    font-family: 'Fraunces', serif;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    opacity: 0.8;
  }
  @media (max-width: 600px) {
    .progress-tooltip { font-size: 11px; padding: 10px; }
    .progress-tooltip-row { grid-template-columns: 16px 1fr 60px 44px; gap: 6px; }
  }
  .progress-count { font-size: 11px; opacity: 0.6; margin-top: 4px; display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap; }
  .global-total { font-family: 'Fraunces', serif; font-style: italic; color: var(--accent); font-size: 13px; font-weight: 500; }

  /* TABS */
  .tabs-outer { position: relative; border-bottom: 1px solid var(--line); }
  .tabs-scroll { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: thin; padding: 12px 0; }
  .tabs-scroll::-webkit-scrollbar { height: 4px; }
  .tabs-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  .tabs-inner { display: inline-flex; gap: 6px; padding: 0 14px; min-width: 100%; }
  .tabs-outer::after { content: ''; position: absolute; right: 0; top: 0; bottom: 1px; width: 30px; background: linear-gradient(to right, transparent, var(--bg)); pointer-events: none; opacity: 0.9; }
  @media (min-width: 700px) {
    .tabs-scroll { overflow: visible; padding: 10px 0; }
    .tabs-inner { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 24px; }
    .tabs-outer::after { display: none; }
  }
  @media (min-width: 900px) { .tabs-inner { padding: 0 32px; } }
  .tab { display: inline-flex; align-items: center; gap: 6px; padding: 7px 11px; border-radius: 6px; background: var(--surface); border: 1px solid var(--line-soft); font-size: 13px; font-weight: 500; white-space: nowrap; transition: background 0.15s, box-shadow 0.15s; flex-shrink: 0; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .tab:hover { background: var(--surface-hover); }
  .tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .tab .count { font-size: 11px; padding: 1px 6px; background: rgba(30, 26, 23, 0.07); border-radius: 3px; }
  .tab.active .count { background: rgba(255, 255, 255, 0.15); }
  .tab.dragging { opacity: 0.35; }
  .tab.drop-target { box-shadow: 0 0 0 2px var(--accent); }
  .tab-add { display: inline-flex; align-items: center; justify-content: center; width: 34px; padding: 0; background: transparent; border: 1px dashed rgba(30, 26, 23, 0.25); border-radius: 6px; opacity: 0.7; flex-shrink: 0; cursor: pointer; }
  .tab-add:hover { opacity: 1; background: var(--surface); }

  main { padding: 20px 0; }

  .section-header { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
  @media (min-width: 700px) { .section-header { flex-direction: row; align-items: flex-start; justify-content: space-between; gap: 16px; } }
  .section-header-left { flex: 1; min-width: 0; }
  .section-title-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.5; margin-bottom: 2px; }
  .section-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .section-title { font-family: 'Fraunces', Georgia, serif; font-size: 24px; font-weight: 400; line-height: 1.15; cursor: pointer; }
  .section-title:hover { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
  @media (min-width: 640px) { .section-title { font-size: 30px; } }
  .section-edit-actions { display: inline-flex; gap: 2px; opacity: 0.7; }
  .section-edit-actions:hover { opacity: 1; }
  .section-edit-actions button { padding: 6px; border-radius: 4px; display: flex; }
  .section-edit-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .section-edit-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }
  .section-subtitle { font-size: 12px; opacity: 0.65; font-style: italic; margin-top: 4px; }
  @media (min-width: 640px) { .section-subtitle { font-size: 13px; } }
  .section-stats { text-align: right; flex-shrink: 0; }
  .section-stats .pct { font-family: 'Fraunces', serif; font-size: 26px; }
  @media (min-width: 640px) { .section-stats .pct { font-size: 30px; } }
  .section-total { font-family: 'Fraunces', serif; font-style: italic; color: var(--accent); font-size: 13px; font-weight: 500; margin-top: 2px; }

  .inline-edit { display: flex; gap: 6px; align-items: center; flex: 1; min-width: 0; flex-wrap: wrap; }
  .inline-edit input { background: var(--surface); border: 1px solid var(--line); border-radius: 4px; padding: 6px 10px; font-size: 18px; font-family: 'Fraunces', serif; outline: none; flex: 1; min-width: 0; }
  .inline-edit input.small { font-size: 14px; font-family: inherit; }
  .inline-edit input.emoji { width: 56px; flex: 0 0 auto; text-align: center; font-family: inherit; font-size: 20px; }
  .inline-edit .btn-primary, .inline-edit .btn-ghost { flex-shrink: 0; }

  .toolbar { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .search-box { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--line-soft); border-radius: 6px; padding: 7px 10px; }
  .search-box input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; min-width: 0; }
  .search-box .clear-search { opacity: 0.4; display: flex; align-items: center; padding: 2px; }
  .search-box .clear-search:hover { opacity: 1; }
  .toolbar select { background: var(--surface); border: 1px solid var(--line-soft); border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }

  .subsection { margin-top: 20px; border-radius: 6px; transition: box-shadow 0.15s; }
  .subsection.dragging { opacity: 0.35; }
  .subsection.drop-target { box-shadow: 0 0 0 2px var(--accent); background: rgba(194, 65, 12, 0.04); }
  .subsection-header { display: flex; align-items: center; gap: 4px; padding: 8px 4px 6px; border-bottom: 1px dashed var(--line); margin-bottom: 8px; flex-wrap: wrap; }
  .subsection-toggle { display: flex; align-items: center; padding: 4px; opacity: 0.6; flex-shrink: 0; }
  .subsection-toggle:hover { opacity: 1; }
  .subsection-grip { display: none; cursor: grab; opacity: 0.3; padding: 4px 2px; flex-shrink: 0; }
  .subsection-grip:active { cursor: grabbing; }
  .subsection:hover .subsection-grip { opacity: 0.6; }
  @media (min-width: 700px) { .subsection-grip { display: inline-flex; } }
  .subsection-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; flex: 1; min-width: 0; cursor: pointer; }
  .subsection-title:hover { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
  @media (min-width: 640px) { .subsection-title { font-size: 18px; } }
  .subsection-count { font-size: 11px; opacity: 0.5; flex-shrink: 0; }
  .subsection-total { font-size: 12px; font-style: italic; color: var(--accent); flex-shrink: 0; font-family: 'Fraunces', serif; }
  .subsection-actions { display: inline-flex; gap: 2px; opacity: 0.7; flex-shrink: 0; }
  .subsection-actions:hover { opacity: 1; }
  .subsection-actions button { padding: 5px; border-radius: 4px; display: flex; }
  .subsection-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .subsection-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }

  .items-list { display: flex; flex-direction: column; gap: 5px; }
  .item { background: var(--surface); border: 1px solid var(--line-soft); border-radius: 6px; transition: all 0.15s; position: relative; overflow: hidden; }
  .item.dragging { opacity: 0.35; }
  .item.drop-target { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  /* Halo tactile renforcé (mobile) : plus visible, animé pour aimanter l'œil */
  .drop-target-touch {
    box-shadow: 0 0 0 3px var(--accent), 0 0 12px rgba(194, 65, 12, 0.35) !important;
    background: rgba(194, 65, 12, 0.08) !important;
    transition: box-shadow 0.12s ease, background 0.12s ease;
    position: relative;
  }
  .drop-target-touch::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 2px dashed var(--accent);
    border-radius: 8px;
    pointer-events: none;
    animation: dropTargetPulse 1.1s ease-in-out infinite;
  }
  @keyframes dropTargetPulse {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50% { opacity: 0.95; transform: scale(1.012); }
  }
  @media (prefers-reduced-motion: reduce) {
    .drop-target-touch::after { animation: none; opacity: 0.8; }
  }
  .item-row { display: flex; align-items: flex-start; gap: 6px; padding: 10px 10px 10px 12px; }
  @media (min-width: 640px) { .item-row { gap: 8px; padding: 10px 12px; } }
  .item-prio-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .grip { display: flex; cursor: grab; opacity: 0.2; padding: 2px 6px; touch-action: none; align-items: center; min-height: 28px; }
  .item:hover .grip { opacity: 0.7; }
  /* Sur mobile, grip plus visible et plus large pour le drag tactile */
  @media (max-width: 699px) {
    .grip { opacity: 0.35; padding: 4px 8px; min-width: 28px; }
  }
  /* Empêcher la sélection de texte pendant le drag tactile */
  body.touch-dragging { user-select: none; -webkit-user-select: none; }
  body.touch-dragging * { cursor: grabbing !important; }
  .grip:active { cursor: grabbing; }
  @media (min-width: 700px) { .grip { padding-left: 4px; } }
  .move-buttons { display: flex; flex-direction: column; gap: 1px; padding-top: 0; }
  @media (min-width: 700px) { .move-buttons { display: none; } }
  .move-buttons button { opacity: 0.35; padding: 4px 2px; display: flex; }
  .move-buttons button:active { opacity: 1; }

  .checkbox-btn { flex-shrink: 0; padding: 2px 0 0; display: flex; align-items: center; }
  .item-content { flex: 1; min-width: 0; }
  .item-text-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .item-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
  .item-text.done { text-decoration: line-through; opacity: 0.5; }
  .subtask-badge { font-size: 11px; padding: 1px 6px; border-radius: 999px; background: rgba(30, 26, 23, 0.06); opacity: 0.7; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; }
  .subtask-badge:hover { opacity: 1; background: rgba(30, 26, 23, 0.1); }
  .subtask-badge.all-done { background: #DCFCE7; color: #14532D; opacity: 1; }

  .link-inline { display: inline-flex; align-items: center; color: var(--accent); text-decoration: none; padding: 2px 6px; border-radius: 3px; background: var(--high-bg); opacity: 0.85; flex-shrink: 0; transition: opacity 0.15s; font-size: 11px; }
  .link-inline:hover { opacity: 1; }

  .location-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.15s; }
  .location-pill:hover { opacity: 0.85; }

  .price-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: rgba(14, 42, 71, 0.08); color: var(--accent-blue); cursor: pointer; font-family: 'Fraunces', serif; font-variant-numeric: tabular-nums; }
  .price-pill:hover { background: rgba(14, 42, 71, 0.14); }
  .price-pill.computed { background: transparent; border: 1px dashed rgba(14, 42, 71, 0.25); font-style: italic; }

  /* Badge échéance */
  .deadline-pill {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
    cursor: pointer; font-variant-numeric: tabular-nums;
    background: rgba(0,0,0,0.04);
    transition: background 0.15s;
  }
  .deadline-pill:hover { background: rgba(0,0,0,0.08); }
  .deadline-overdue { background: var(--crit-bg); color: var(--crit-fg); animation: deadlinePulse 2.4s ease-in-out infinite; }
  .deadline-urgent { background: var(--crit-bg); color: var(--crit-fg); }

  /* === Mode Alerte Mamad === */
  .mamad-alert-trigger {
    margin-top: 10px;
    padding: 10px 16px;

    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    align-self: flex-start;
  }
  .mamad-alert-trigger:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(220, 38, 38, 0.4);
  }
  .mamad-alert-content { font-size: 14px; }
  .mamad-alert-intro {
    background: rgba(220, 38, 38, 0.08);

  .mamad-alert-procedure {
    list-style: none;

    padding: 0;
    margin-bottom: 22px;
  }
  .mamad-alert-procedure li {
    counter-increment: alert-step;
    padding: 12px 14px 12px 50px;

    border: 1px solid var(--line);

    position: absolute;
    left: 12px; top: 50%;

    background: #DC2626;
    color: white;
    border-radius: 50%;

    font-family: 'Fraunces', serif;

  .mamad-alert-number {

  .prio-select { font-size: 11px; padding: 2px 20px 2px 8px; border-radius: 999px; font-weight: 500; cursor: pointer; border: none; outline: none; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat: no-repeat; background-position: right 6px center; }

// Migration
// ==============================================
function migrate(data) {
  if (!data || !data.sections) return null;
  const fromVersion = data.version || 0;
  data.version = 6;
  const fixItem = (i) => {
    if (!Array.isArray(i.subtasks)) i.subtasks = [];
    if (typeof i.link !== 'string') i.link = '';
    if (typeof i.price !== 'number') i.price = 0;
    if (!i.location || typeof i.location !== 'object') i.location = null;
    if (typeof i.image !== 'string') i.image = '';
    // v6 : champs date d'échéance, périssable, alerte critique
    if (typeof i.deadline !== 'string') i.deadline = '';        // ISO YYYY-MM-DD ou ''
    if (typeof i.perishable !== 'object' || !i.perishable) i.perishable = null;
    // perishable structure : { intervalMonths: 6, lastRotation: '2026-04-28' }
    if (typeof i.criticalAlert !== 'boolean') i.criticalAlert = false; // pour mode Alerte Mamad
    i.subtasks.forEach(st => {
      if (typeof st.link !== 'string') st.link = '';
      if (typeof st.price !== 'number') st.price = 0;
      if (!st.location || typeof st.location !== 'object') st.location = null;
      if (typeof st.image !== 'string') st.image = '';
      if (typeof st.deadline !== 'string') st.deadline = '';
    });
  };
  data.sections.forEach(s => {
    if (!Array.isArray(s.items)) s.items = [];
    if (!Array.isArray(s.subsections)) s.subsections = [];
    s.items.forEach(fixItem);
    s.subsections.forEach(sub => {
      if (typeof sub.collapsed !== 'boolean') sub.collapsed = false;
      if (!Array.isArray(sub.items)) sub.items = [];
      sub.items.forEach(fixItem);
    });
  });
  // v5 : injection de la section Mamad si absente (uniquement à la première migration vers v5,
  // ce qui permet à l'utilisateur de la supprimer ensuite sans qu'elle ne réapparaisse)
  if (fromVersion < 5 && !data.sections.find(s => s.id === 'mamad')) {
    data.sections.push(MAMAD_SECTION());
  }
  // Top-up : ajouter toute section DEFAULT manquante (pour les appareils ouverts pour la 1re fois,
  // ou les caches navigateurs avec des versions anciennes du fichier).
  // ⚠️ Effet de bord : si l'utilisateur supprime une section qui figure dans DEFAULT_DATA,
  // elle réapparaîtra au prochain reload. Pour la supprimer définitivement, il faut aussi
  // la retirer de DEFAULT_DATA.
  try {
    if (typeof DEFAULT_DATA !== 'undefined' && DEFAULT_DATA && Array.isArray(DEFAULT_DATA.sections)) {
      const existingIds = new Set(data.sections.map(s => s.id));
      for (const defaultSection of DEFAULT_DATA.sections) {
        if (!existingIds.has(defaultSection.id)) {
          data.sections.push(JSON.parse(JSON.stringify(defaultSection)));
        }
      }
    }
  } catch(e) { console.warn('Top-up defaults failed:', e); }
  return data;
}

// ==============================================
// State
// ==============================================
let state = {
  data: null,
  currentSectionId: 'status',
  search: '',
  filter: 'all',
  priorityFilter: 'all',
  locationFilter: null,        // string (location name) or null
  expandedNotes: {},
  expandedSubtasks: {},
  expandedLocation: {},        // itemId or 'st:subtaskId' -> bool
  editing: null,
  adding: null,
  draggedType: null,
  draggedId: null,
  dropTargetId: null,
  saving: false,
  contextMenu: null,           // { type: 'tab', id, x, y }
  lightbox: null,              // { src, caption, kind, itemId, subtaskId }
  // === Vue Agenda ===
  agendaFilter: 'all',         // 'all' | 'overdue' | 'urgent' | 'perishable'
  agendaIncludeDone: false,    // toggle pour inclure les tâches terminées
};
let saveTimeout = null;

// ==============================================
// Storage
// ==============================================
const hasWindowStorage = typeof window !== 'undefined' && typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';

// ==============================================
// Synchronisation cross-device via jsonblob.com
// Pas de compte, pas de clé : un blob anonyme + URL fragment comme identifiant partagé
// ==============================================
const SYNC_HASH_PREFIX = '#sync=';
const JSONBLOB_BASE = 'https://jsonblob.com/api/jsonBlob';
const SYNC_POLL_INTERVAL = 15000; // 15s

const syncState = {
  enabled: false,
  blobId: null,
  lastRemoteHash: null,
  lastError: null,
  pollHandle: null,
  pushTimeout: null,
  isPushing: false,
  isPulling: false,
};

(function detectSyncFromUrl() {
  try {
    const h = window.location.hash || '';
    if (h.startsWith(SYNC_HASH_PREFIX)) {
      const id = h.slice(SYNC_HASH_PREFIX.length).trim();
      if (id) {
        syncState.enabled = true;
        syncState.blobId = id;
      }
    }
  } catch(e) { console.warn('[sync] URL fragment parse failed:', e); }
})();

async function fetchRemoteData() {
  if (!syncState.enabled || !syncState.blobId) return null;
  syncState.isPulling = true;
  updateSyncIndicator();
  try {
    const resp = await fetch(JSONBLOB_BASE + '/' + syncState.blobId, {
      headers: { 'Accept': 'application/json' },
      cache: 'no-store'
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    syncState.lastError = null;
    return data;
  } catch(e) {
    console.warn('[sync] pull failed:', e);
    syncState.lastError = e.message;
    return null;
  } finally {
    syncState.isPulling = false;
    updateSyncIndicator();
  }
}

async function pushRemoteData(data) {
  if (!syncState.enabled || !syncState.blobId) return false;
  syncState.isPushing = true;
  updateSyncIndicator();
  try {
    const json = JSON.stringify(data);
    const resp = await fetch(JSONBLOB_BASE + '/' + syncState.blobId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: json
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    syncState.lastRemoteHash = json;
    syncState.lastError = null;
    syncState.lastSyncSuccessAt = Date.now();
    syncState.consecutiveFailures = 0;
    // Si on était en erreur récente, signaler la reprise
    if (syncState.wasInError) {
      showToast('✓ Synchronisation rétablie');
      syncState.wasInError = false;
    }
    return true;
  } catch(e) {
    console.warn('[sync] push failed:', e);
    syncState.lastError = e.message;
    syncState.consecutiveFailures = (syncState.consecutiveFailures || 0) + 1;
    // Premier échec : avertir l'utilisateur (sinon il croit que c'est synchronisé)
    if (!syncState.wasInError) {
      syncState.wasInError = true;
      showToast('⚠️ Échec de synchronisation — modifications gardées en local, retry dans 30s', 4500, 'error');
    }
    // Retry automatique avec backoff exponentiel : 30s, 60s, 120s, 240s, max 300s
    const retryDelay = Math.min(30000 * Math.pow(2, Math.min(syncState.consecutiveFailures - 1, 4)), 300000);
    if (syncState.retryHandle) clearTimeout(syncState.retryHandle);
    syncState.retryHandle = setTimeout(() => {
      if (syncState.enabled && state.data) pushRemoteData(state.data);
    }, retryDelay);
    return false;
  } finally {
    syncState.isPushing = false;
    updateSyncIndicator();
  }
}

function debouncedPushRemote(data) {
  if (!syncState.enabled) return;
  clearTimeout(syncState.pushTimeout);
  syncState.pushTimeout = setTimeout(() => { pushRemoteData(data); }, 1500);
}

async function pollAndMerge() {
  if (!syncState.enabled) return;
  if (typeof state === 'undefined' || !state.data) return;
  if (syncState.isPushing) return;
  const remote = await fetchRemoteData();
  if (!remote) return;
  const remoteJson = JSON.stringify(remote);
  const localJson = JSON.stringify(state.data);
  if (remoteJson === localJson) {
    syncState.lastRemoteHash = remoteJson;
    return;
  }
  if (remoteJson === syncState.lastRemoteHash) {
    // Pas de changement, mais on a tout de même réussi à fetch : marque la fraîcheur
    syncState.lastSyncSuccessAt = Date.now();
    return;
  }
  const migrated = migrate(remote);
  if (!migrated) return;
  state.data = migrated;
  syncState.lastRemoteHash = JSON.stringify(migrated);
  syncState.lastSyncSuccessAt = Date.now();
  // Données distantes reçues : on vide la pile undo locale (Q3 — l'undo n'annule
  // que les actions locales, pas celles d'autres devices). Sinon Ctrl+Z restaurerait
  // un état qui ne correspondrait plus à ce que voit Préma.
  if (typeof undoStack !== 'undefined') {
    undoStack.length = 0;
    redoStack.length = 0;
    if (typeof updateUndoIndicator === 'function') updateUndoIndicator();
  }
  try {
    const json = JSON.stringify(migrated);
    if (hasWindowStorage) await window.storage.set(STORAGE_KEY, json, true);
    else localStorage.setItem(STORAGE_KEY, json);
  } catch(e) { console.warn('[sync] local persist after pull failed:', e); }
  if (typeof render === 'function') render();
}

function startSyncPolling() {
  if (!syncState.enabled) return;
  if (syncState.pollHandle) clearInterval(syncState.pollHandle);
  syncState.pollHandle = setInterval(pollAndMerge, SYNC_POLL_INTERVAL);
}

async function activateSync() {
  if (syncState.enabled) {
    showMagicLinkModal();
    return;
  }
  if (typeof state === 'undefined' || !state.data) {
    showToast('Données pas encore chargées, attends une seconde…');
    return;
  }
  const btn = document.getElementById('sync-indicator');
  if (btn) { btn.textContent = 'Création…'; btn.disabled = true; }
  try {
    const resp = await fetch(JSONBLOB_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(state.data)
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const location = resp.headers.get('Location') || '';
    const id = location.split('/').filter(Boolean).pop();
    if (!id) throw new Error('ID non récupéré');
    syncState.blobId = id;
    syncState.enabled = true;
    syncState.lastRemoteHash = JSON.stringify(state.data);
    syncState.lastSyncSuccessAt = Date.now();
    history.replaceState(null, '', window.location.pathname + window.location.search + SYNC_HASH_PREFIX + id);
    startSyncPolling();
    startSyncFreshnessTicker();
    if (btn) btn.disabled = false;
    showMagicLinkModal();
    updateSyncIndicator();
  } catch(e) {
    alertDialog('Échec de l\'activation de la sync : ' + e.message + '\n\nVérifie ta connexion et réessaie.', { title: 'Erreur de synchronisation' });
    if (btn) btn.disabled = false;
    updateSyncIndicator();
  }
}

    + '<div role="textbox" aria-readonly="true" aria-label="Lien magique de synchronisation" tabindex="0" style="background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:14px; font-family:monospace; font-size:12px; word-break:break-all; margin-bottom:18px; user-select:all; line-height:1.4;">' + url + '</div>'
    + '<div style="display:flex; gap:8px; justify-content:flex-end; margin-bottom:14px;">'
    + '<button id="magic-copy-btn" style="padding:9px 16px; background:var(--ink); color:var(--bg); border-radius:6px; font-weight:500; border:none; cursor:pointer;">Copier le lien</button>'
    + '<button id="magic-close-btn" style="padding:9px 16px; background:transparent; border:1px solid var(--line); border-radius:6px; cursor:pointer;">Fermer</button>'
    + '</div>'

    + '</div>';
  document.body.appendChild(modal);

  const closeModal = () => {
    modal.remove();
    document.removeEventListener('keydown', handleKey);
    if (previouslyFocused && typeof previouslyFocused.focus === 'function') {
      try { previouslyFocused.focus(); } catch(e) { console.warn('[a11y] restore focus magic-link failed:', e); }
    }
  };
  const focusables = modal.querySelectorAll('button, [tabindex="0"]');
  const first = focusables[0], last = focusables[focusables.length - 1];
  const handleKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
    if (e.key === 'Tab' && focusables.length > 0) {
      // Focus trap
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  };
  document.addEventListener('keydown', handleKey);

  document.getElementById('magic-copy-btn').onclick = async () => {
    try {
      await navigator.clipboard.writeText(url);
      const b = document.getElementById('magic-copy-btn');

  document.getElementById('magic-close-btn').onclick = closeModal;
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
  // Focus initial sur le bouton "Copier"
  setTimeout(() => { const b = document.getElementById('magic-copy-btn'); if (b) b.focus(); }, 50);
}

// Toast notification pour feedback non-intrusif
// type: 'info' (défaut), 'error', 'success'
// Les toasts d'erreur utilisent aria-live="assertive" pour interrompre les lecteurs d'écran
function showToast(message, duration, type) {
  duration = duration || 2200;
  type = type || 'info';
  const existing = document.getElementById('app-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'app-toast';
  toast.setAttribute('role', type === 'error' ? 'alert' : 'status');
  toast.setAttribute('aria-live', type === 'error' ? 'assertive' : 'polite');
  // Couleur selon type
  const bgColor = type === 'error' ? 'var(--crit-fg)' : (type === 'success' ? 'var(--green)' : 'var(--ink)');
  toast.style.cssText = 'position:fixed; bottom:max(20px, env(safe-area-inset-bottom, 20px)); left:50%; transform:translateX(-50%) translateY(100px); background:' + bgColor + '; color:var(--bg); padding:10px 18px; border-radius:6px; font-size:13px; z-index:10000; box-shadow:0 8px 28px rgba(0,0,0,0.3); opacity:0; transition:opacity 0.2s, transform 0.3s ease; max-width:calc(100vw - 40px); text-align:center;';
  toast.textContent = message;
  document.body.appendChild(toast);
  requestAnimationFrame(() => {
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
  });
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// Annonce un message aux lecteurs d'écran via les live regions ARIA cachées.
// Utile pour signaler les changements de contexte qui ne sont pas visibles autrement
// (ex: filtre agenda changé, modale ouverte, action effectuée silencieusement).
// 'polite' (défaut) : attend une pause dans la lecture courante
// 'assertive' : interrompt immédiatement (erreurs, alertes critiques)
function announceToScreenReader(message, urgency) {
  const region = document.getElementById('aria-live-' + (urgency === 'assertive' ? 'assertive' : 'polite'));
  if (!region) return;
  // Hack classique : vider puis remplir pour forcer le re-déclenchement même si le texte est identique
  region.textContent = '';
  setTimeout(() => { region.textContent = message; }, 50);
  // Auto-clean après quelques secondes pour ne pas polluer le DOM
  setTimeout(() => { region.textContent = ''; }, 4000);
}

// =================================================================
// Vue agenda — toutes les tâches avec échéance triées par date
// =================================================================
// Cache léger pour la collecte des tâches à échéance.
// Invalidé automatiquement quand state.data change (via un petit hash de chaîne).
let _deadlineCache = { hash: null, dayKey: null, result: null };

// Hash très simple type "djb2" — suffisant pour invalider un cache (collisions extrêmement rares
// pour des objets JSON courants). Beaucoup plus robuste que la longueur seule.
function _shallowStringHash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return h;
}

function collectDeadlineTasks(includeDone) {
  // Retourne un tableau plat [{ item, sectionTitle, sectionEmoji, sectionId, deadline, status, fromPerishable, done }]
  if (!state.data) return [];

  // Hash de l'état pour détecter modifications. On ne hash que les champs pertinents
  // pour les échéances (deadline, perishable, done, text minimal pour debug) afin de garder
  // le calcul rapide même avec beaucoup de tâches.
  const hashSource = JSON.stringify(state.data);
  const hash = _shallowStringHash(hashSource) + (includeDone ? '_d' : '_n');
  // Le statut de deadline dépend du jour : on invalide le cache à chaque changement de jour
  const dayKey = todayISO();

  if (_deadlineCache.hash === hash && _deadlineCache.dayKey === dayKey && _deadlineCache.result) {
    return _deadlineCache.result;
  }

  const out = [];
  state.data.sections.forEach(sec => {
    const proc = (item) => {
      const isDone = itemEffectiveDone(item);
      if (isDone && !includeDone) return; // par défaut on n'affiche que les non finies
      const eff = effectiveDeadline(item);
      if (!eff) return;
      const status = deadlineStatus(eff);
      const fromPerishable = !item.deadline && !!item.perishable;
      out.push({
        item, sectionTitle: sec.title, sectionEmoji: sec.emoji, sectionId: sec.id,
        deadline: eff, status, fromPerishable, done: isDone,
      });
    };
    sec.items.forEach(proc);
    sec.subsections.forEach(sub => sub.items.forEach(proc));
  });
  // Tri par date croissante (les dépassées en premier, puis les plus proches)
  out.sort((a, b) => a.deadline.localeCompare(b.deadline));

  // Mémoriser dans le cache
  _deadlineCache = { hash, dayKey, result: out };
  return out;
}

// Construit le HTML du contenu de l'agenda. Séparé d'openAgendaView pour permettre
// le re-rendu en place lors d'un changement de filtre/toggle (sans clignotement).
function buildAgendaBody() {
  const includeDone = !!state.agendaIncludeDone;
  const allTasks = collectDeadlineTasks(includeDone);
  // Filtre par catégorie
  const filter = state.agendaFilter || 'all';
  let tasks;
  if (filter === 'overdue') tasks = allTasks.filter(t => t.status.kind === 'overdue');
  else if (filter === 'urgent') tasks = allTasks.filter(t => t.status.kind === 'urgent' || t.status.kind === 'overdue');
  else if (filter === 'perishable') tasks = allTasks.filter(t => t.fromPerishable);
  else tasks = allTasks;

  // Stats pour les boutons de filtre (sur l'ensemble, pas filtré)
  const counts = {
    all: allTasks.length,
    overdue: allTasks.filter(t => t.status.kind === 'overdue').length,
    urgent: allTasks.filter(t => t.status.kind === 'urgent' || t.status.kind === 'overdue').length,
    perishable: allTasks.filter(t => t.fromPerishable).length,
  };

  // Regroupements
  const groups = {
    overdue: { label: '🔴 En retard', items: [] },
    urgent: { label: '⚠️ Urgent (≤ 3 jours)', items: [] },
    soon: { label: '📅 Cette semaine ou la suivante', items: [] },
    later: { label: '🗓️ Ce mois et le suivant', items: [] },
    far: { label: '🕒 Plus tard', items: [] },
  };
  const doneGroup = { label: '✓ Terminées (avec échéance dépassée ou prochaine)', items: [] };
  tasks.forEach(t => {
    if (t.done) {
      doneGroup.items.push(t);
      return;
    }
    const k = t.status.kind;
    if (k === 'overdue') groups.overdue.items.push(t);
    else if (k === 'urgent') groups.urgent.items.push(t);
    else if (k === 'soon') groups.soon.items.push(t);
    else if (k === 'later') groups.later.items.push(t);
    else groups.far.items.push(t);
  });

  // Barre de filtres
  let body = '<div class="agenda-filters" role="toolbar" aria-label="Filtres de l\'agenda">';
  const mkBtn = (key, label, count) => {
    const active = filter === key ? ' active' : '';
    return '<button class="agenda-filter-btn' + active + '" data-action="agenda-set-filter" data-filter="' + key + '">' + label + ' <span class="agenda-filter-count">' + count + '</span></button>';
  };
  body += mkBtn('all', 'Toutes', counts.all);
  body += mkBtn('overdue', '🔴 En retard', counts.overdue);
  body += mkBtn('urgent', '⚠️ Urgent', counts.urgent);
  body += mkBtn('perishable', '♻️ Périssables', counts.perishable);
  body += '</div>';

  // Toggle inclure terminées
  body += '<div class="agenda-toggle-row">';
  body += '<label class="agenda-toggle-label">';
  body += '<input type="checkbox" data-action="agenda-toggle-done" ' + (includeDone ? 'checked' : '') + '>';
  body += '<span>Inclure les tâches terminées</span>';
  body += '</label>';
  body += '</div>';

  if (tasks.length === 0) {
    body += '<div style="text-align:center; padding:40px 20px; opacity:0.6;">'
      + '<div style="font-size:48px; margin-bottom:12px;">📭</div>'
      + '<p style="font-size:14px; line-height:1.6;">';
    if (filter === 'all') {
      body += 'Aucune tâche avec échéance pour le moment.<br>Ajoute une date sur tes tâches via le bouton 📅 ou marque tes consommables comme périssables via ♻️.';
    } else {
      body += 'Aucune tâche dans ce filtre.<br>Essaie « Toutes » pour voir l\'ensemble.';
    }
    body += '</p></div>';
  } else {
    body += '<p style="font-size:13px; opacity:0.7; margin-bottom:18px;">' + tasks.length + ' tâche' + (tasks.length > 1 ? 's' : '') + ' affichée' + (tasks.length > 1 ? 's' : '') + (filter !== 'all' ? ' (filtre actif)' : '') + '.</p>';
    const renderGroup = (key, g) => {
      if (g.items.length === 0) return '';
      let s = '<div class="agenda-group agenda-group-' + key + '">';
      s += '<h3 class="agenda-group-title">' + g.label + ' <span class="agenda-group-count">' + g.items.length + '</span></h3>';
      s += '<div class="agenda-group-items">';
      g.items.forEach(t => {
        const item = t.item;
        const prio = item.priority || 'medium';
        const doneCls = t.done ? ' agenda-task-done' : '';
        s += '<div class="agenda-task agenda-prio-' + prio + doneCls + '" data-action="agenda-goto" data-section-id="' + escapeHtml(t.sectionId) + '" data-id="' + escapeHtml(item.id) + '" tabindex="0" role="button">';
        s += '<div class="agenda-task-date" style="color:' + t.status.color + ';">' + escapeHtml(t.status.label) + '<span class="agenda-task-iso">' + formatDate(t.deadline) + '</span></div>';
        s += '<div class="agenda-task-text">' + (t.fromPerishable ? '♻️ ' : '') + (item.criticalAlert ? '🚨 ' : '') + (t.done ? '✓ ' : '') + escapeHtml(item.text) + '</div>';
        s += '<div class="agenda-task-section">' + (t.sectionEmoji || '') + ' ' + escapeHtml(t.sectionTitle) + '</div>';
        if (t.fromPerishable && !t.done) {
          s += '<button class="agenda-rotate-btn" data-action="mark-rotated" data-id="' + escapeHtml(item.id) + '" title="Enregistrer la rotation à aujourd\'hui">✓ Rotation faite</button>';
        }
        s += '</div>';
      });
      s += '</div></div>';
      return s;
    };
    Object.entries(groups).forEach(([key, g]) => { body += renderGroup(key, g); });
    if (includeDone && doneGroup.items.length > 0) {
      body += renderGroup('done', doneGroup);
    }
  }

  return '<div class="agenda-content">' + body + '</div>';
}

// Met à jour le contenu de la modale agenda en place (sans la fermer/rouvrir).
// Conserve le scroll, l'animation, et évite le flash visuel désagréable.
function refreshAgendaInPlace() {
  const modal = document.getElementById('custom-modal');
  if (!modal) return;
  const bodyEl = modal.querySelector('.custom-modal-body');
  if (!bodyEl) return;
  // Conserver la position de scroll de la modale
  const box = modal.querySelector('.custom-modal-box');
  const scrollTop = box ? box.scrollTop : 0;
  // Remplacer juste le contenu interne
  bodyEl.innerHTML = buildAgendaBody();
  // Ré-attacher les listeners sur les nouveaux éléments
  attachAgendaListeners(modal);
  // Restaurer le scroll
  if (box) box.scrollTop = scrollTop;
  // Annoncer le changement aux lecteurs d'écran (étape D-3 : live region)
  announceToScreenReader('Agenda mis à jour avec le nouveau filtre');
}

// Branche les listeners filtres + toggle dans une modale agenda
function attachAgendaListeners(modal) {
  modal.querySelectorAll('[data-action="agenda-set-filter"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.agendaFilter = btn.dataset.filter;
      refreshAgendaInPlace();
    });
  });
  const toggle = modal.querySelector('[data-action="agenda-toggle-done"]');
  if (toggle) {
    toggle.addEventListener('change', (e) => {
      state.agendaIncludeDone = !!e.target.checked;
      refreshAgendaInPlace();
    });
  }
}

function exportDataAsJson() {
  // Génère et télécharge un fichier JSON avec toutes les données
  try {
    const json = JSON.stringify(state.data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = todayISO();
    a.href = url;
    a.download = 'expat-tracker-' + dateStr + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
    showToast('Sauvegarde téléchargée (' + (json.length > 1024 ? Math.round(json.length / 1024) + ' KB' : json.length + ' B') + ')', 2500, 'success');
  } catch(e) {
    console.warn('[export] failed:', e);
    showToast('Erreur lors de l\'export : ' + e.message, 4000, 'error');
  }
}

async function importDataFromJson(file) {
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!parsed || !Array.isArray(parsed.sections)) {
      throw new Error('Le fichier ne ressemble pas à une sauvegarde valide (pas de sections).');
    }
    const sectionCount = parsed.sections.length;
    let taskCount = 0;
    parsed.sections.forEach(s => {
      if (Array.isArray(s.items)) taskCount += s.items.length;
      if (Array.isArray(s.subsections)) s.subsections.forEach(sub => { if (Array.isArray(sub.items)) taskCount += sub.items.length; });
    });
    const ok = await confirmDialog(
      '⚠️ Cela va REMPLACER toutes tes données actuelles.\n\nFichier détecté : ' + sectionCount + ' section(s), ~' + taskCount + ' tâche(s).\n\nUne sauvegarde de ton état actuel a été créée dans ton localStorage avant l\'import (récupérable via la console).\n\nContinuer ?',
      { title: 'Importer une sauvegarde', okLabel: 'Importer et remplacer', danger: true }
    );
    if (!ok) return;
    // Backup sécurité avant remplacement
    try {
      const backup = JSON.stringify(state.data);
      localStorage.setItem('expat-tracker-pre-import-' + Date.now(), backup);
    } catch(e) { console.warn('[import] backup failed:', e); }
    const migrated = migrate(parsed);
    if (!migrated) throw new Error('Migration impossible.');
    mutate(() => { state.data = migrated; }, 'Import depuis fichier JSON');
    showToast('Import réussi : ' + sectionCount + ' section(s) chargée(s)', 3000, 'success');
  } catch(e) {
    console.warn('[import] failed:', e);
    alertDialog('Erreur lors de l\'import : ' + e.message, { title: 'Import impossible' });
  }
}

function updateSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (!syncState.enabled) {
    el.innerHTML = '🛰️ Activer la sync';
    el.title = 'Activer la synchronisation entre tous tes appareils';
    el.style.color = '';
    return;
  }
  if (syncState.lastError && syncState.wasInError) {
    el.innerHTML = '⚠️ Sync (erreur)';
    el.title = 'Erreur sync : ' + syncState.lastError + ' — retry automatique en cours. Clic pour voir le lien magique.';
    el.style.color = 'var(--crit-fg)';
    return;
  }
  if (syncState.isPushing) {
    el.innerHTML = '⇈ Sync…';
    el.title = 'Envoi en cours';
    el.style.color = '';
    return;
  }
  if (syncState.isPulling) {
    el.innerHTML = '⇊ Sync…';
    el.title = 'Réception en cours';
    el.style.color = '';
    return;
  }
  // Indicateur de fraîcheur : "Synchronisé il y a Xs"
  if (syncState.lastSyncSuccessAt) {
    const ageMs = Date.now() - syncState.lastSyncSuccessAt;
    const ageS = Math.floor(ageMs / 1000);
    let label, color = '';
    if (ageS < 60) label = '🛰️ Sync (' + ageS + 's)';
    else if (ageS < 3600) {
      label = '🛰️ Sync (' + Math.floor(ageS / 60) + ' min)';
      if (ageS > 120) color = 'var(--high-fg)'; // dégrade après 2 min sans sync
    } else {
      label = '🛰️ Sync (' + Math.floor(ageS / 3600) + ' h)';
      color = 'var(--crit-fg)';
    }
    el.innerHTML = label;
    el.title = 'Dernière synchronisation réussie : il y a ' + ageS + ' s. Clic pour voir le lien magique.';
    el.style.color = color;
    return;
  }
  el.innerHTML = '🛰️ Sync active';
  el.title = 'Synchronisation active — clique pour voir le lien magique';
  el.style.color = '';
}

// Met à jour l'indicateur de fraîcheur toutes les 10 secondes
// (sinon "5s" reste affiché alors qu'en réalité 30 secondes ont passé)
let _syncFreshnessTimer = null;
function startSyncFreshnessTicker() {
  if (_syncFreshnessTimer) clearInterval(_syncFreshnessTimer);
  _syncFreshnessTimer = setInterval(() => {
    if (syncState.enabled && !syncState.isPushing && !syncState.isPulling) {
      updateSyncIndicator();
    }
  }, 10000);
}

async function loadData() {
  // Si sync activée via URL fragment, on essaie d'abord le remote
  if (syncState.enabled) {
    const remote = await fetchRemoteData();
    if (remote) {
      const migrated = migrate(remote);
      if (migrated) {
        syncState.lastRemoteHash = JSON.stringify(migrated);
        syncState.lastSyncSuccessAt = Date.now();
        // Sauvegarder localement aussi pour fallback offline
        try {
          const json = JSON.stringify(migrated);
          if (hasWindowStorage) await window.storage.set(STORAGE_KEY, json, true);
          else localStorage.setItem(STORAGE_KEY, json);
        } catch(e) { console.warn('[load] cache after sync pull failed:', e); }
        return migrated;
      }
    }
    // Si remote KO, fallback sur localStorage
  }
  try {
    if (hasWindowStorage) {
      try { const r = await window.storage.get(STORAGE_KEY, true); if (r && r.value) return migrate(JSON.parse(r.value)); } catch (e) { console.warn('[load] window.storage v2 failed:', e); }
      try { const r1 = await window.storage.get(STORAGE_KEY_V1, true); if (r1 && r1.value) return migrate(JSON.parse(r1.value)); } catch (e) { console.warn('[load] window.storage v1 failed:', e); }
    } else {
      const raw2 = localStorage.getItem(STORAGE_KEY); if (raw2) return migrate(JSON.parse(raw2));
      const raw1 = localStorage.getItem(STORAGE_KEY_V1); if (raw1) return migrate(JSON.parse(raw1));
    }
  } catch (e) { console.error('Load error', e); }
  return null;
}
async function saveData(data) {
  try {
    const json = JSON.stringify(data);
    if (hasWindowStorage) await window.storage.set(STORAGE_KEY, json, true);
    else localStorage.setItem(STORAGE_KEY, json);
    // Pousser vers remote (debounced) si sync active
    if (syncState.enabled) debouncedPushRemote(data);
  } catch (e) { console.error('Save error', e); }
}
