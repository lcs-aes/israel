<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet">

<title>Expatriation Sydney → Tel Aviv</title>
 <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/d/d4/Flag_of_Israel.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAF7F2;
    --ink: #1E1A17;
    --ink-soft: #4A4540;
    --line: rgba(30, 26, 23, 0.1);
    --line-soft: rgba(30, 26, 23, 0.05);
    --surface: rgba(255, 255, 255, 0.75);
    --surface-soft: rgba(255, 255, 255, 0.55);
    --surface-hover: #ffffff;
    --accent: #C2410C;
    --accent-blue: #0E2A47;
    --green: #65A30D;
    --crit-bg: #FEE2E2; --crit-fg: #7F1D1D; --crit-dot: #B91C1C;
    --high-bg: #FFEDD5; --high-fg: #7C2D12; --high-dot: #C2410C;
    --med-bg:  #FEF3C7; --med-fg:  #713F12; --med-dot:  #A16207;
    --low-bg:  #F1F5F9; --low-fg:  #334155; --low-dot:  #64748B;
  }
  html, body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(201, 94, 43, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(14, 42, 71, 0.04) 0%, transparent 40%);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { padding-bottom: 60px; }
  .serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01", "ss02"; }
  button { font-family: inherit; font-size: inherit; background: none; border: none; cursor: pointer; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  select { cursor: pointer; }
  a { color: inherit; }

  .wrap { max-width: 960px; margin: 0 auto; padding: 0 14px; }
  @media (min-width: 640px) { .wrap { padding: 0 24px; } }
  @media (min-width: 900px) { .wrap { padding: 0 32px; } }

  /* Header */
  header { padding: 20px 0 14px; border-bottom: 1px solid var(--line); }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  h1 { font-family: 'Fraunces', Georgia, serif; font-size: 28px; font-weight: 400; line-height: 1.05; letter-spacing: -0.01em; }
  h1 em { font-style: italic; color: var(--accent); }
  @media (min-width: 640px) { h1 { font-size: 40px; } }
  @media (min-width: 900px) { h1 { font-size: 48px; } }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .save-indicator { font-size: 11px; opacity: 0.6; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  .save-indicator.saving { opacity: 1; color: var(--accent); }
  .refresh-btn { font-size: 11px; opacity: 0.6; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; }
  .refresh-btn:hover { opacity: 1; }

  .progress-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; gap:10px; flex-wrap:wrap; }
  .progress-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; }
  @media (min-width: 640px) { .progress-label { font-size: 11px; } }
  .progress-value { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; }
  @media (min-width: 640px) { .progress-value { font-size: 26px; } }
  .progress-value .pct-sign { font-size: 12px; opacity: 0.5; font-family: 'DM Sans', sans-serif; }
  .progress-bar { height: 5px; background: rgba(30, 26, 23, 0.1); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent) 100%); transition: width 0.6s ease; }
  .progress-count { font-size: 11px; opacity: 0.6; margin-top: 4px; display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap; }
  .global-total { font-family: 'Fraunces', serif; font-style: italic; color: var(--accent); font-size: 13px; font-weight: 500; }

  /* TABS */
  .tabs-outer { position: relative; border-bottom: 1px solid var(--line); }
  .tabs-scroll { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: thin; padding: 12px 0; }
  .tabs-scroll::-webkit-scrollbar { height: 4px; }
  .tabs-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  .tabs-inner { display: inline-flex; gap: 6px; padding: 0 14px; min-width: 100%; }
  .tabs-outer::after { content: ''; position: absolute; right: 0; top: 0; bottom: 1px; width: 30px; background: linear-gradient(to right, transparent, var(--bg)); pointer-events: none; opacity: 0.9; }
  @media (min-width: 700px) {
    .tabs-scroll { overflow: visible; padding: 10px 0; }
    .tabs-inner { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 24px; }
    .tabs-outer::after { display: none; }
  }
  @media (min-width: 900px) { .tabs-inner { padding: 0 32px; } }
  .tab { display: inline-flex; align-items: center; gap: 6px; padding: 7px 11px; border-radius: 6px; background: var(--surface); border: 1px solid var(--line-soft); font-size: 13px; font-weight: 500; white-space: nowrap; transition: background 0.15s, box-shadow 0.15s; flex-shrink: 0; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .tab:hover { background: var(--surface-hover); }
  .tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .tab .count { font-size: 11px; padding: 1px 6px; background: rgba(30, 26, 23, 0.07); border-radius: 3px; }
  .tab.active .count { background: rgba(255, 255, 255, 0.15); }
  .tab.dragging { opacity: 0.35; }
  .tab.drop-target { box-shadow: 0 0 0 2px var(--accent); }
  .tab-add { display: inline-flex; align-items: center; justify-content: center; width: 34px; padding: 0; background: transparent; border: 1px dashed rgba(30, 26, 23, 0.25); border-radius: 6px; opacity: 0.7; flex-shrink: 0; cursor: pointer; }
  .tab-add:hover { opacity: 1; background: var(--surface); }

  main { padding: 20px 0; }

  .section-header { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
  @media (min-width: 700px) { .section-header { flex-direction: row; align-items: flex-start; justify-content: space-between; gap: 16px; } }
  .section-header-left { flex: 1; min-width: 0; }
  .section-title-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.5; margin-bottom: 2px; }
  .section-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .section-title { font-family: 'Fraunces', Georgia, serif; font-size: 24px; font-weight: 400; line-height: 1.15; cursor: pointer; }
  .section-title:hover { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
  @media (min-width: 640px) { .section-title { font-size: 30px; } }
  .section-edit-actions { display: inline-flex; gap: 2px; opacity: 0.7; }
  .section-edit-actions:hover { opacity: 1; }
  .section-edit-actions button { padding: 6px; border-radius: 4px; display: flex; }
  .section-edit-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .section-edit-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }
  .section-subtitle { font-size: 12px; opacity: 0.65; font-style: italic; margin-top: 4px; }
  @media (min-width: 640px) { .section-subtitle { font-size: 13px; } }
  .section-stats { text-align: right; flex-shrink: 0; }
  .section-stats .pct { font-family: 'Fraunces', serif; font-size: 26px; }
  @media (min-width: 640px) { .section-stats .pct { font-size: 30px; } }
  .section-total { font-family: 'Fraunces', serif; font-style: italic; color: var(--accent); font-size: 13px; font-weight: 500; margin-top: 2px; }

  .inline-edit { display: flex; gap: 6px; align-items: center; flex: 1; min-width: 0; flex-wrap: wrap; }
  .inline-edit input { background: var(--surface); border: 1px solid var(--line); border-radius: 4px; padding: 6px 10px; font-size: 18px; font-family: 'Fraunces', serif; outline: none; flex: 1; min-width: 0; }
  .inline-edit input.small { font-size: 14px; font-family: inherit; }
  .inline-edit input.emoji { width: 56px; flex: 0 0 auto; text-align: center; font-family: inherit; font-size: 20px; }
  .inline-edit .btn-primary, .inline-edit .btn-ghost { flex-shrink: 0; }

  .toolbar { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .search-box { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--line-soft); border-radius: 6px; padding: 7px 10px; }
  .search-box input { flex: 1; background: transparent; border: none; outline: none; font-size: 14px; min-width: 0; }
  .search-box .clear-search { opacity: 0.4; display: flex; align-items: center; padding: 2px; }
  .search-box .clear-search:hover { opacity: 1; }
  .toolbar select { background: var(--surface); border: 1px solid var(--line-soft); border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }

  .subsection { margin-top: 20px; border-radius: 6px; transition: box-shadow 0.15s; }
  .subsection.dragging { opacity: 0.35; }
  .subsection.drop-target { box-shadow: 0 0 0 2px var(--accent); background: rgba(194, 65, 12, 0.04); }
  .subsection-header { display: flex; align-items: center; gap: 4px; padding: 8px 4px 6px; border-bottom: 1px dashed var(--line); margin-bottom: 8px; flex-wrap: wrap; }
  .subsection-toggle { display: flex; align-items: center; padding: 4px; opacity: 0.6; flex-shrink: 0; }
  .subsection-toggle:hover { opacity: 1; }
  .subsection-grip { display: none; cursor: grab; opacity: 0.3; padding: 4px 2px; flex-shrink: 0; }
  .subsection-grip:active { cursor: grabbing; }
  .subsection:hover .subsection-grip { opacity: 0.6; }
  @media (min-width: 700px) { .subsection-grip { display: inline-flex; } }
  .subsection-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; flex: 1; min-width: 0; cursor: pointer; }
  .subsection-title:hover { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
  @media (min-width: 640px) { .subsection-title { font-size: 18px; } }
  .subsection-count { font-size: 11px; opacity: 0.5; flex-shrink: 0; }
  .subsection-total { font-size: 12px; font-style: italic; color: var(--accent); flex-shrink: 0; font-family: 'Fraunces', serif; }
  .subsection-actions { display: inline-flex; gap: 2px; opacity: 0.7; flex-shrink: 0; }
  .subsection-actions:hover { opacity: 1; }
  .subsection-actions button { padding: 5px; border-radius: 4px; display: flex; }
  .subsection-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .subsection-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }

  .items-list { display: flex; flex-direction: column; gap: 5px; }
  .item { background: var(--surface); border: 1px solid var(--line-soft); border-radius: 6px; transition: all 0.15s; position: relative; overflow: hidden; }
  .item.dragging { opacity: 0.35; }
  .item.drop-target { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .item-row { display: flex; align-items: flex-start; gap: 6px; padding: 10px 10px 10px 12px; }
  @media (min-width: 640px) { .item-row { gap: 8px; padding: 10px 12px; } }
  .item-prio-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .grip { display: none; cursor: grab; opacity: 0.2; padding-top: 2px; }
  .item:hover .grip { opacity: 0.7; }
  .grip:active { cursor: grabbing; }
  @media (min-width: 700px) { .grip { display: flex; } }
  .move-buttons { display: flex; flex-direction: column; gap: 1px; padding-top: 0; }
  @media (min-width: 700px) { .move-buttons { display: none; } }
  .move-buttons button { opacity: 0.35; padding: 4px 2px; display: flex; }
  .move-buttons button:active { opacity: 1; }

  .checkbox-btn { flex-shrink: 0; padding: 2px 0 0; display: flex; align-items: center; }
  .item-content { flex: 1; min-width: 0; }
  .item-text-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .item-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
  .item-text.done { text-decoration: line-through; opacity: 0.5; }
  .subtask-badge { font-size: 11px; padding: 1px 6px; border-radius: 999px; background: rgba(30, 26, 23, 0.06); opacity: 0.7; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; }
  .subtask-badge:hover { opacity: 1; background: rgba(30, 26, 23, 0.1); }
  .subtask-badge.all-done { background: #DCFCE7; color: #14532D; opacity: 1; }

  .link-inline { display: inline-flex; align-items: center; color: var(--accent); text-decoration: none; padding: 2px 6px; border-radius: 3px; background: var(--high-bg); opacity: 0.85; flex-shrink: 0; transition: opacity 0.15s; font-size: 11px; }
  .link-inline:hover { opacity: 1; }

  .location-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.15s; }
  .location-pill:hover { opacity: 0.85; }

  .price-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: rgba(14, 42, 71, 0.08); color: var(--accent-blue); cursor: pointer; font-family: 'Fraunces', serif; font-variant-numeric: tabular-nums; }
  .price-pill:hover { background: rgba(14, 42, 71, 0.14); }
  .price-pill.computed { background: transparent; border: 1px dashed rgba(14, 42, 71, 0.25); font-style: italic; }

  .prio-select { font-size: 11px; padding: 2px 20px 2px 8px; border-radius: 999px; font-weight: 500; cursor: pointer; border: none; outline: none; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat: no-repeat; background-position: right 6px center; }
  .prio-critical { background-color: var(--crit-bg); color: var(--crit-fg); }
  .prio-high { background-color: var(--high-bg); color: var(--high-fg); }
  .prio-medium { background-color: var(--med-bg); color: var(--med-fg); }
  .prio-low { background-color: var(--low-bg); color: var(--low-fg); }

  .notes-preview { margin-top: 4px; font-size: 12px; opacity: 0.6; font-style: italic; display: flex; align-items: flex-start; gap: 4px; cursor: pointer; word-break: break-word; }
  .notes-preview:hover { opacity: 1; }
  .notes-textarea { margin-top: 6px; width: 100%; background: rgba(245, 242, 237, 0.8); border: 1px solid var(--line-soft); border-radius: 4px; padding: 8px; font-size: 13px; outline: none; resize: vertical; min-height: 60px; font-family: inherit; }

  /* Location editor inline */
  .location-editor { margin-top: 8px; padding: 10px; background: rgba(245, 242, 237, 0.8); border: 1px solid var(--line-soft); border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
  .location-editor input { width: 100%; background: white; border: 1px solid var(--line); border-radius: 4px; padding: 6px 10px; font-size: 13px; outline: none; }
  .color-swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: var(--ink); transform: scale(1.1); }
  .location-editor .row { display: flex; gap: 8px; flex-wrap: wrap; }

  .item-actions { display: flex; align-items: center; gap: 0; opacity: 0.55; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; max-width: 140px; }
  @media (min-width: 700px) { .item-actions { max-width: none; } }
  .item:hover .item-actions { opacity: 1; }
  .item-actions button { padding: 6px; border-radius: 4px; display: flex; align-items: center; }
  .item-actions button:hover { background: rgba(30, 26, 23, 0.05); }
  .item-actions button.has-data { color: var(--accent); opacity: 1; }
  .item-actions button.delete:hover { background: var(--crit-bg); color: var(--crit-fg); }
  @media (max-width: 639px) { .item-actions button { padding: 5px; } }

  .subtasks-container { margin: 0 10px 10px 34px; padding: 6px 0 0 10px; border-left: 2px solid var(--line); display: flex; flex-direction: column; gap: 3px; }
  .subtask-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; font-size: 13px; flex-wrap: wrap; }
  .subtask-row:hover { background: rgba(255, 255, 255, 0.5); }
  .subtask-checkbox { flex-shrink: 0; display: flex; }
  .subtask-text { flex: 1; min-width: 100px; word-break: break-word; }
  .subtask-text.done { text-decoration: line-through; opacity: 0.5; }
  .subtask-actions { display: inline-flex; gap: 0; opacity: 0.4; flex-shrink: 0; flex-wrap: wrap; }
  .subtask-row:hover .subtask-actions { opacity: 1; }
  .subtask-actions button { padding: 3px; border-radius: 3px; display: flex; }
  .subtask-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .subtask-actions button.has-data { color: var(--accent); opacity: 1; }
  .subtask-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }
  .add-subtask-btn { align-self: flex-start; padding: 3px 8px; margin-top: 2px; font-size: 12px; opacity: 0.6; border-radius: 3px; display: inline-flex; align-items: center; gap: 3px; }
  .add-subtask-btn:hover { opacity: 1; background: rgba(30, 26, 23, 0.05); }

  .subtask-location-editor { width: 100%; margin-top: 4px; padding: 8px; background: rgba(245, 242, 237, 0.8); border: 1px solid var(--line-soft); border-radius: 4px; display: flex; flex-direction: column; gap: 6px; }
  .subtask-location-editor input { width: 100%; background: white; border: 1px solid var(--line); border-radius: 3px; padding: 5px 8px; font-size: 12px; outline: none; }

  .add-btn { width: 100%; padding: 11px; border: 2px dashed rgba(30, 26, 23, 0.18); border-radius: 6px; font-size: 13px; opacity: 0.7; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; margin-top: 8px; cursor: pointer; }
  .add-btn:hover { border-color: rgba(30, 26, 23, 0.4); opacity: 1; background: var(--surface-soft); }
  .add-btn.small { padding: 7px; font-size: 12px; }
  .add-subsection-btn { margin-top: 16px; padding: 10px; border: 2px dashed rgba(30, 26, 23, 0.18); border-radius: 6px; font-size: 13px; font-family: 'Fraunces', serif; font-style: italic; opacity: 0.7; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; transition: all 0.15s; cursor: pointer; }
  .add-subsection-btn:hover { opacity: 1; border-color: rgba(30, 26, 23, 0.35); background: var(--surface-soft); }

  .add-form { background: var(--surface); border: 1px solid var(--line-soft); border-radius: 6px; padding: 10px; margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
  .add-form input[type="text"] { width: 100%; background: rgba(245, 242, 237, 0.8); border: 1px solid var(--line); border-radius: 4px; padding: 8px 10px; font-size: 14px; outline: none; }
  .add-form .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .add-form select { background: white; border: 1px solid var(--line); border-radius: 4px; padding: 6px 10px; font-size: 13px; }

  .btn-primary { padding: 7px 14px; background: var(--ink); color: var(--bg); border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: var(--accent-blue); }
  .btn-ghost { padding: 7px 12px; border-radius: 4px; font-size: 13px; opacity: 0.6; cursor: pointer; }
  .btn-ghost:hover { opacity: 1; }
  .btn-danger { padding: 7px 14px; background: var(--crit-fg); color: white; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .btn-danger:hover { background: #991B1B; }

  .empty-state { padding: 36px 0; text-align: center; opacity: 0.5; font-style: italic; font-family: 'Fraunces', serif; font-size: 14px; }

  .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--line); text-align: center; font-size: 11px; opacity: 0.55; }
  .footer .quote { font-family: 'Fraunces', serif; font-style: italic; }

  .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .ico { width: 14px; height: 14px; flex-shrink: 0; }
  .ico-md { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-sm { width: 12px; height: 12px; flex-shrink: 0; }
  .ico-lg { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-check { color: var(--green); }
  .ico-partial { color: var(--accent); }
  .ico-circle { opacity: 0.4; }

  /* CONTEXT MENU */
  .ctx-backdrop { position: fixed; inset: 0; z-index: 100; background: transparent; }
  .ctx-menu {
    position: fixed;
    z-index: 101;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);

// ==============================================
// Migration
// ==============================================
function migrate(data) {
  if (!data || !data.sections) return null;
  data.version = 4;
  const fixItem = (i) => {
    if (!Array.isArray(i.subtasks)) i.subtasks = [];
    if (typeof i.link !== 'string') i.link = '';
    if (typeof i.price !== 'number') i.price = 0;
    if (!i.location || typeof i.location !== 'object') i.location = null;
    if (typeof i.image !== 'string') i.image = '';
    i.subtasks.forEach(st => {
      if (typeof st.link !== 'string') st.link = '';
      if (typeof st.price !== 'number') st.price = 0;
      if (!st.location || typeof st.location !== 'object') st.location = null;
      if (typeof st.image !== 'string') st.image = '';
    });
  };
  data.sections.forEach(s => {
    if (!Array.isArray(s.items)) s.items = [];
    if (!Array.isArray(s.subsections)) s.subsections = [];
    s.items.forEach(fixItem);
    s.subsections.forEach(sub => {
      if (typeof sub.collapsed !== 'boolean') sub.collapsed = false;
      if (!Array.isArray(sub.items)) sub.items = [];
      sub.items.forEach(fixItem);
    });
  });
  return data;
}

// ==============================================
// Storage
// ==============================================
const hasWindowStorage = typeof window !== 'undefined' && typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';

async function loadData() {
  try {
    if (hasWindowStorage) {
      try { const r = await window.storage.get(STORAGE_KEY, true); if (r && r.value) return migrate(JSON.parse(r.value)); } catch (e) {}
      try { const r1 = await window.storage.get(STORAGE_KEY_V1, true); if (r1 && r1.value) return migrate(JSON.parse(r1.value)); } catch (e) {}
    } else {
      const raw2 = localStorage.getItem(STORAGE_KEY); if (raw2) return migrate(JSON.parse(raw2));
      const raw1 = localStorage.getItem(STORAGE_KEY_V1); if (raw1) return migrate(JSON.parse(raw1));
    }
  } catch (e) { console.error('Load error', e); }
  return null;
}
async function saveData(data) {
  try {
    const json = JSON.stringify(data);
    if (hasWindowStorage) await window.storage.set(STORAGE_KEY, json, true);
    else localStorage.setItem(STORAGE_KEY, json);
  } catch (e) { console.error('Save error', e); }
}
function scheduleSave() {
  if (saveTimeout) clearTimeout(saveTimeout);
  state.saving = true;
  updateSaveIndicator();
  saveTimeout = setTimeout(async () => {
    await saveData(state.data);
    state.saving = false;
    updateSaveIndicator();
  }, 400);
}
function updateSaveIndicator() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.innerHTML = state.saving ? ICO.save + ' Sauvegarde…' : ICO.checkSm + ' Synchronisé';
  el.className = 'save-indicator' + (state.saving ? ' saving' : '');
}

// ==============================================
// Helpers
// ==============================================
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeUrl(url) {
  if (!url) return '';
  url = url.trim();
  if (!url) return '';
  if (/^(https?:|mailto:|tel:|ftp:|file:)/i.test(url)) return url;
  return 'https://' + url;
}
function parsePrice(str) {
  if (str === null || str === undefined) return 0;
  str = String(str).trim();
  if (!str) return 0;
  str = str.replace(/[€$£¥\s]/g, '');
  if (str.includes(',') && str.includes('.')) {
    str = str.replace(/\./g, '').replace(',', '.');
  } else if (str.includes(',')) {
    str = str.replace(',', '.');
  }
  const n = parseFloat(str);
  return isNaN(n) ? 0 : Math.max(0, n);
}
function formatPrice(n) {
  if (!n || n === 0) return '';
  const hasDecimal = n % 1 !== 0;
  return new Intl.NumberFormat('fr-FR', {
    style: 'currency', currency: 'EUR',
    minimumFractionDigits: hasDecimal ? 2 : 0,
    maximumFractionDigits: 2
  }).format(n);
}
function currentSection() {
  return state.data.sections.find(s => s.id === state.currentSectionId) || state.data.sections[0];
}
function findItemContainer(itemId) {
  const sec = currentSection();
  if (sec.items.find(i => i.id === itemId)) return sec.items;
  for (const sub of sec.subsections) {
    if (sub.items.find(i => i.id === itemId)) return sub.items;
  }
  return null;
}
function findItem(itemId) {
  const c = findItemContainer(itemId);
  return c ? c.find(i => i.id === itemId) : null;
}
function itemEffectiveDone(item) {
  if (item.subtasks && item.subtasks.length > 0) return item.subtasks.every(st => st.done);
  return item.done;
}
function itemProgress(item) {
  if (!item.subtasks || item.subtasks.length === 0) return null;
  const done = item.subtasks.filter(st => st.done).length;
  return { done, total: item.subtasks.length };
}

// Totals
function computeItemTotal(item) {
  let total = parseFloat(item.price) || 0;
  if (item.subtasks) item.subtasks.forEach(st => { total += parseFloat(st.price) || 0; });
  return total;
}
function computeSubsectionTotal(sub) {
  return sub.items.reduce((a, i) => a + computeItemTotal(i), 0);
}
function computeSectionTotal(sec) {
  return sec.items.reduce((a, i) => a + computeItemTotal(i), 0)
       + sec.subsections.reduce((a, s) => a + computeSubsectionTotal(s), 0);
}
function computeGlobalTotal() {
  return state.data.sections.reduce((a, s) => a + computeSectionTotal(s), 0);
}

function countItems(sec) {
  let total = 0, done = 0;
  const allItems = [...sec.items, ...sec.subsections.flatMap(s => s.items)];
  allItems.forEach(item => {
    if (item.subtasks && item.subtasks.length > 0) {
      total += item.subtasks.length;
      done += item.subtasks.filter(st => st.done).length;
    } else {
      total += 1;
      if (item.done) done += 1;
    }
  });
  return { done, total };
}
function sectionStats(sec) {
  const { done, total } = countItems(sec);
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function globalStats() {
  let done = 0, total = 0;
  state.data.sections.forEach(s => { const c = countItems(s); done += c.done; total += c.total; });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function matchSearch(item, q) {
  if (!q) return true;
  q = q.toLowerCase();
  if (item.text.toLowerCase().includes(q)) return true;
  if ((item.notes||'').toLowerCase().includes(q)) return true;
  if ((item.link||'').toLowerCase().includes(q)) return true;
  if (item.location && item.location.name && item.location.name.toLowerCase().includes(q)) return true;
  if (item.subtasks && item.subtasks.some(st => st.text.toLowerCase().includes(q) || (st.location && st.location.name && st.location.name.toLowerCase().includes(q)))) return true;
  return false;
}
function locationMatchesFilter(loc, filter) {
  if (!filter) return true;
  return !!(loc && loc.name === filter);
}
function itemMatchesLocationFilter(item) {
  if (!state.locationFilter) return true;
  if (locationMatchesFilter(item.location, state.locationFilter)) return true;
  if (item.subtasks && item.subtasks.some(st => locationMatchesFilter(st.location, state.locationFilter))) return true;
  return false;
}
function visibleSubtasks(item) {
  if (!state.locationFilter) return item.subtasks || [];
  // If parent matches the filter, show all subtasks (parent IS this location)
  if (locationMatchesFilter(item.location, state.locationFilter)) return item.subtasks || [];
  // Otherwise show only matching subtasks
  return (item.subtasks || []).filter(st => locationMatchesFilter(st.location, state.locationFilter));
}
function getAllLocations() {
  const map = new Map(); // name -> color
  if (!state.data) return [];
  state.data.sections.forEach(sec => {
    const proc = (item) => {
      if (item.location && item.location.name) {
        if (!map.has(item.location.name)) map.set(item.location.name, item.location.color);
      }
      if (item.subtasks) item.subtasks.forEach(st => {
        if (st.location && st.location.name) {
          if (!map.has(st.location.name)) map.set(st.location.name, st.location.color);
        }
      });
    };
    sec.items.forEach(proc);
    sec.subsections.forEach(sub => sub.items.forEach(proc));
  });
  return Array.from(map.entries())
    .map(([name, color]) => ({ name, color: color || COLOR_PALETTE[0] }))
    .sort((a, b) => a.name.localeCompare(b.name, 'fr'));
}
function countLocationMatches(locName) {
  if (!locName) return 0;
  let count = 0;
  state.data.sections.forEach(sec => {
    const proc = (item) => {
      if (item.location && item.location.name === locName) count++;
      if (item.subtasks) item.subtasks.forEach(st => {
        if (st.location && st.location.name === locName) count++;
      });
    };
    sec.items.forEach(proc);
    sec.subsections.forEach(sub => sub.items.forEach(proc));
  });
  return count;
}
function matchFilter(item) {
  const done = itemEffectiveDone(item);
  if (state.filter === 'todo' && done) return false;
  if (state.filter === 'done' && !done) return false;
  if (state.priorityFilter !== 'all' && item.priority !== state.priorityFilter) return false;
  if (state.locationFilter && !itemMatchesLocationFilter(item)) return false;
  return true;
}
function filterItems(items) { return items.filter(i => matchFilter(i) && matchSearch(i, state.search)); }

// ==============================================
// Mutations
// ==============================================
function mutate(fn) { fn(state.data); scheduleSave(); render(); }
function toggleItemDone(id) {
  mutate(() => {
    const i = findItem(id); if (!i) return;
    if (i.subtasks && i.subtasks.length > 0) {
      const allDone = i.subtasks.every(st => st.done);
      i.subtasks.forEach(st => st.done = !allDone);
    } else i.done = !i.done;
  });
}
function changeItemPriority(id, p) { mutate(() => { const i = findItem(id); if (i) i.priority = p; }); }
function updateItemText(id, t) { mutate(() => { const i = findItem(id); if (i && t.trim()) i.text = t.trim(); }); }
function updateItemNotes(id, n) { const i = findItem(id); if (i) { i.notes = n; scheduleSave(); } }
function updateItemLink(id, l) { mutate(() => { const i = findItem(id); if (i) i.link = normalizeUrl(l); }); }
function updateItemPrice(id, p) { mutate(() => { const i = findItem(id); if (i) i.price = parsePrice(p); }); }
function updateItemLocation(id, name, color) {
  mutate(() => {
    const i = findItem(id); if (!i) return;
    if (!name || !name.trim()) i.location = null;
    else i.location = { name: name.trim(), color: color || COLOR_PALETTE[0] };
  });
}
function deleteItem(id) {
  const i = findItem(id); if (!i) return;
  if (!confirm('Supprimer "' + i.text + '" ?')) return;
  mutate(() => { const c = findItemContainer(id); const idx = c.findIndex(x => x.id === id); if (idx >= 0) c.splice(idx, 1); });
}
function moveItem(id, dir) {
  mutate(() => {
    const c = findItemContainer(id); if (!c) return;
    const idx = c.findIndex(x => x.id === id);
    const t = dir === 'up' ? idx-1 : idx+1;
    if (t < 0 || t >= c.length) return;
    [c[idx], c[t]] = [c[t], c[idx]];
  });
}
function dropReorderItem(dId, tId) {
  if (!dId || dId === tId) return;
  const cD = findItemContainer(dId); const cT = findItemContainer(tId);
  if (!cD || !cT) return;
  mutate(() => {
    const fi = cD.findIndex(x => x.id === dId);
    const [m] = cD.splice(fi, 1);
    const ti = cT.findIndex(x => x.id === tId);
    cT.splice(ti, 0, m);
  });
}
function addItem(pt, pid, txt, pr) {
  if (!txt.trim()) return;
  mutate(() => {
    const sec = currentSection();
    const ni = I(txt.trim(), pr);
    if (pt === 'section') sec.items.push(ni);
    else { const sub = sec.subsections.find(s => s.id === pid); if (sub) sub.items.push(ni); }
  });
}

function updateSubsectionTitle(sid, t) {

function deleteSubsection(sid) {
  const sec = currentSection();
  const sub = sec.subsections.find(s => s.id === sid); if (!sub) return;
  const count = sub.items.length;
  const msg = count > 0
    ? `Supprimer la sous-section "${sub.title}" ?\n\nLes ${count} tâche(s) seront déplacées dans la section principale.`
    : `Supprimer la sous-section "${sub.title}" ?`;
  if (!confirm(msg)) return;
  mutate(() => { sec.items.push(...sub.items); sec.subsections = sec.subsections.filter(s => s.id !== sid); });
}
function toggleSubsection(sid) { mutate(() => { const sec = currentSection(); const sub = sec.subsections.find(s => s.id === sid); if (sub) sub.collapsed = !sub.collapsed; }); }
function moveSubsection(sid, dir) {
  mutate(() => {
    const sec = currentSection();
    const idx = sec.subsections.findIndex(s => s.id === sid);
    const t = dir === 'up' ? idx-1 : idx+1;
    if (t < 0 || t >= sec.subsections.length) return;
    [sec.subsections[idx], sec.subsections[t]] = [sec.subsections[t], sec.subsections[idx]];
  });
}
function dropReorderSubsection(dId, tId) {
  if (!dId || dId === tId) return;
  mutate(() => {
    const sec = currentSection();
    const fi = sec.subsections.findIndex(s => s.id === dId); if (fi < 0) return;
    const [m] = sec.subsections.splice(fi, 1);
    const ti = sec.subsections.findIndex(s => s.id === tId);
    sec.subsections.splice(ti < 0 ? sec.subsections.length : ti, 0, m);
  });
}

  if (!title.trim()) return;
  mutate(() => {

    state.data.sections.push(ns);
    state.currentSectionId = ns.id;
  });
}
function updateSectionTitle(sid, title, subtitle, emoji) {
  mutate(() => {
    const sec = state.data.sections.find(s => s.id === sid); if (!sec) return;
    if (title !== undefined && title && title.trim()) sec.title = title.trim();
    if (subtitle !== undefined) sec.subtitle = subtitle.trim();
    if (emoji !== undefined && emoji && emoji.trim()) sec.emoji = emoji.trim();
  });
}
function deleteSection(sid) {
  const sec = state.data.sections.find(s => s.id === sid); if (!sec) return;
  const c = countItems(sec);
  if (!confirm(`⚠️ Supprimer la section "${sec.title}" ?\n\nCela supprimera ${c.total} tâche(s). Cette action est irréversible.`)) return;
  if (!confirm('Êtes-vous absolument sûr ?')) return;
  mutate(() => {
    state.data.sections = state.data.sections.filter(s => s.id !== sid);
    if (state.currentSectionId === sid && state.data.sections.length > 0) state.currentSectionId = state.data.sections[0].id;
  });
}
function dropReorderTab(dId, tId) {
  if (!dId || dId === tId) return;
  mutate(() => {
    const fi = state.data.sections.findIndex(s => s.id === dId); if (fi < 0) return;
    const [m] = state.data.sections.splice(fi, 1);
    const ti = state.data.sections.findIndex(s => s.id === tId);
    state.data.sections.splice(ti < 0 ? state.data.sections.length : ti, 0, m);
  });
}

// ==============================================
// Image management
// ==============================================
function compressImage(file, maxWidth = 1400, quality = 0.78) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) {
      reject(new Error('Le fichier sélectionné n\'est pas une image.'));
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          let width = img.naturalWidth || img.width;
          let height = img.naturalHeight || img.height;
          if (width > maxWidth) {
            height = Math.round(height * (maxWidth / width));
            width = maxWidth;
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          // White background for transparent images (since we're encoding as JPEG)
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        } catch (err) { reject(err); }
      };
      img.onerror = () => reject(new Error('Impossible de charger l\'image.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Lecture du fichier échouée.'));
    reader.readAsDataURL(file);
  });
}

function pickImage(callback) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.style.display = 'none';
  document.body.appendChild(input);
  input.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    document.body.removeChild(input);
    if (!file) return;
    try {
      const dataUrl = await compressImage(file);
      // Estimate size: rough base64 → bytes
      const sizeKb = Math.round((dataUrl.length * 3 / 4) / 1024);
      if (sizeKb > 800) {
        if (!confirm(`L'image fait ${sizeKb} Ko après compression. Cela peut alourdir le stockage. Continuer ?`)) return;
      }
      callback(dataUrl);
    } catch (err) {
      alert('Erreur : ' + (err.message || err));
    }
  };
  input.click();
}

  let html = '';

  if (sectionItems.length > 0 || !hasSub) {
    html += `<div class="items-list">`;
    if (sectionItems.length > 0) html += sectionItems.map(i => renderItem(i)).join('');
    else if (sec.items.length === 0 && !hasSub) html += `<div class="empty-state">Aucune tâche dans cette section.</div>`;
    html += `</div>`;

    const adding = state.adding && state.adding.type === 'item' && state.adding.parentType === 'section';
    html += adding ? renderAddItemForm('section', null) : `<button class="add-btn" data-action="start-add-item" data-parent-type="section">${ICO.plus} Ajouter une tâche</button>`;
  }

  sec.subsections.forEach(sub => { html += renderSubsection(sub); });

  const addSub = state.adding && state.adding.type === 'subsection';
  html += addSub ? `
    <div class="add-form" style="margin-top:16px;">
      <input type="text" id="new-subsection-title" placeholder="Nom de la sous-section…" autofocus>

          <span class="subsection-actions">
            <button data-action="move-subsection-up" data-id="${sub.id}" title="Monter">${ICO.up}</button>

            : items.map(i => renderItem(i)).join('')}
        </div>
        ${adding ? renderAddItemForm('subsection', sub.id) : `<button class="add-btn small" data-action="start-add-item" data-parent-type="subsection" data-parent-id="${sub.id}">${ICO.plusSm} Ajouter une tâche</button>`}
      ` : ''}
    </div>
  `;
}

function renderItem(item) {
  const isEditing = state.editing && state.editing.type === 'item' && state.editing.id === item.id;
  const notesOpen = state.expandedNotes[item.id];
  const locationOpen = state.expandedLocation[item.id];
  const isDragged = state.draggedType === 'item' && state.draggedId === item.id;
  const isDropTarget = state.draggedType === 'item' && state.dropTargetId === item.id && state.draggedId !== item.id;
  const prio = item.priority || 'medium';
  const dotColors = { critical: 'var(--crit-dot)', high: 'var(--high-dot)', medium: 'var(--med-dot)', low: 'var(--low-dot)' };
  const hasSubtasks = item.subtasks && item.subtasks.length > 0;
  const progress = itemProgress(item);
  const effectiveDone = itemEffectiveDone(item);
  const hasLink = !!item.link;
  const hasLocation = !!item.location;
  const hasImage = !!item.image;
  const hasOwnPrice = item.price && item.price > 0;
  const itemTotal = computeItemTotal(item);
  const showTotal = itemTotal > 0;

  // When location filter is active and parent doesn't itself match, auto-expand subtasks
  // (so user can see the matching subtasks)
  const matchingSubtasksForFilter = state.locationFilter && hasSubtasks
    ? item.subtasks.some(st => locationMatchesFilter(st.location, state.locationFilter))
    : false;
  const subtasksOpen = state.expandedSubtasks[item.id] || (matchingSubtasksForFilter && !locationMatchesFilter(item.location, state.locationFilter));

  if (isEditing) {
    return `
      <div class="item" data-id="${item.id}">
        <div class="item-prio-bar" style="background:${dotColors[prio]};"></div>
        <div class="item-row">
          <div style="padding-top:2px;">${effectiveDone ? ICO.checkFull : ICO.circle}</div>
          <div class="item-content">
            <input type="text" style="width:100%; background: var(--surface); border:1px solid var(--line); border-radius:4px; padding:6px 10px; font-size:14px; outline:none;" id="inline-edit-item-${item.id}" value="${escapeHtml(state.editing.value)}">
            <div style="display:flex; gap:8px; margin-top:8px;">
              <button class="btn-primary" data-action="save-item-edit" data-id="${item.id}">Enregistrer</button>
              <button class="btn-ghost" data-action="cancel-edit">Annuler</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  const cls = 'item' + (isDragged ? ' dragging' : '') + (isDropTarget ? ' drop-target' : '');
  const checkIcon = hasSubtasks
    ? (effectiveDone ? ICO.checkFull : (progress.done > 0 ? ICO.checkPartial : ICO.circle))
    : (item.done ? ICO.checkFull : ICO.circle);

  let priceDisplay = '';
  if (showTotal) {
    const isComputed = hasSubtasks && !hasOwnPrice;
    const tooltip = isComputed ? 'Total calculé depuis les sous-tâches' : 'Cliquer pour modifier';
    priceDisplay = `<span class="price-pill${isComputed ? ' computed' : ''}" data-action="manage-item-price" data-id="${item.id}" title="${tooltip}">${formatPrice(itemTotal)}</span>`;
  }

  return `
    <div class="${cls}" data-id="${item.id}" draggable="true" data-drag-type="item">
      <div class="item-prio-bar" style="background:${dotColors[prio]};"></div>
      <div class="item-row">
        <div class="grip">${ICO.grip}</div>
        <div class="move-buttons">
          <button data-action="move-item-up" data-id="${item.id}">${ICO.up}</button>
          <button data-action="move-item-down" data-id="${item.id}">${ICO.down}</button>
        </div>
        <button class="checkbox-btn" data-action="toggle-item" data-id="${item.id}">${checkIcon}</button>
        <div class="item-content">
          <div class="item-text-row">
            ${hasImage ? `<button class="image-thumb" data-action="open-lightbox-item" data-id="${item.id}" title="Voir l'image"><img src="${item.image}" alt=""></button>` : ''}
            <span class="item-text${effectiveDone ? ' done' : ''}">${escapeHtml(item.text)}</span>
            ${hasLink ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer" class="link-inline" title="${escapeHtml(item.link)}">${ICO.linkSm}</a>` : ''}
            ${hasLocation ? `<span class="location-pill" style="background:${escapeHtml(item.location.color)};" data-action="filter-by-location" data-location="${escapeHtml(item.location.name)}" title="Cliquer pour filtrer par « ${escapeHtml(item.location.name)} »">${escapeHtml(item.location.name)}</span>` : ''}
            ${priceDisplay}
            ${hasSubtasks ? `<span class="subtask-badge${effectiveDone ? ' all-done' : ''}" data-action="toggle-subtasks-display" data-id="${item.id}">
              ${subtasksOpen ? ICO.chevronD : ICO.chevronR} ${progress.done}/${progress.total}
            </span>` : ''}
            <select class="prio-select prio-${prio}" data-action="change-prio" data-id="${item.id}">
              ${Object.entries(PRIORITIES).map(([k,v]) => `<option value="${k}"${k===prio?' selected':''}>${v}</option>`).join('')}
            </select>
          </div>
          ${notesOpen ? `
            <textarea class="notes-textarea" data-action="update-notes" data-id="${item.id}" placeholder="Notes, liens, contacts, références…">${escapeHtml(item.notes || '')}</textarea>
          ` : (item.notes ? `
            <div class="notes-preview" data-action="toggle-notes-display" data-id="${item.id}">
              ${ICO.note}<span>${escapeHtml(item.notes.slice(0, 80))}${item.notes.length > 80 ? '…' : ''}</span>
            </div>
          ` : '')}
          ${locationOpen ? renderLocationEditor(item, 'item') : ''}
        </div>
        <div class="item-actions">
          ${!hasSubtasks ? `<button data-action="toggle-subtasks-display" data-id="${item.id}" title="Sous-tâches">${ICO.chevronR}</button>` : ''}
          <button data-action="manage-item-image" data-id="${item.id}" title="${hasImage ? 'Voir ou gérer l’image' : 'Ajouter une image'}"${hasImage ? ' class="has-data"' : ''}>${ICO.image}</button>
          <button data-action="toggle-location-editor" data-key="${item.id}" title="${hasLocation ? 'Modifier lieu' : 'Ajouter un lieu'}"${hasLocation ? ' class="has-data"' : ''}>${ICO.tag}</button>
          <button data-action="manage-item-price" data-id="${item.id}" title="${hasOwnPrice ? 'Modifier le prix' : 'Ajouter un prix'}"${hasOwnPrice ? ' class="has-data"' : ''}>${ICO.euro}</button>
          <button data-action="manage-item-link" data-id="${item.id}" title="${hasLink ? 'Modifier le lien' : 'Ajouter un lien'}"${hasLink ? ' class="has-data"' : ''}>${ICO.link}</button>
          <button data-action="toggle-notes-display" data-id="${item.id}" title="Notes"${item.notes?' class="has-data"':''}>${ICO.note}</button>
          <button data-action="edit-item" data-id="${item.id}" title="Modifier">${ICO.edit}</button>
          <button data-action="delete-item" data-id="${item.id}" class="delete" title="Supprimer">${ICO.trash}</button>
        </div>
      </div>
      ${subtasksOpen ? renderSubtasks(item) : ''}
    </div>
  `;
}

function renderLocationEditor(item, kind, parentItemId) {
  // kind = 'item' or 'subtask'
  const key = kind === 'item' ? item.id : 'st:' + item.id;
  const current = item.location || { name: '', color: COLOR_PALETTE[0] };
  const editorId = kind === 'item' ? `loc-editor-${item.id}` : `loc-editor-st-${item.id}`;
  const dataAttr = kind === 'item'
    ? `data-item-id="${item.id}"`
    : `data-parent-id="${parentItemId}" data-subtask-id="${item.id}"`;
  return `
    <div class="${kind === 'item' ? 'location-editor' : 'subtask-location-editor'}" id="${editorId}">
      <input type="text" data-role="loc-name" ${dataAttr} placeholder="Magasin / Lieu (ex: IKEA, Amazon, Fnac)" value="${escapeHtml(current.name || '')}" autofocus>
      <div class="color-swatches" ${dataAttr}>
        ${COLOR_PALETTE.map(c => `<div class="color-swatch${c === current.color ? ' selected' : ''}" data-role="loc-color" data-color="${c}" style="background:${c};"></div>`).join('')}
      </div>
      <div class="row">
        <button class="btn-primary" data-action="save-location" data-kind="${kind}" data-key="${key}" data-item-id="${kind === 'item' ? item.id : parentItemId}" data-subtask-id="${kind === 'subtask' ? item.id : ''}">Enregistrer</button>
        ${current.name ? `<button class="btn-danger" data-action="remove-location" data-kind="${kind}" data-key="${key}" data-item-id="${kind === 'item' ? item.id : parentItemId}" data-subtask-id="${kind === 'subtask' ? item.id : ''}">Retirer</button>` : ''}
        <button class="btn-ghost" data-action="cancel-location-editor" data-key="${key}">Annuler</button>
      </div>
    </div>
  `;
}

function renderSubtasks(item) {
  const adding = state.adding && state.adding.type === 'subtask' && state.adding.parentId === item.id;
  const visibleSt = visibleSubtasks(item);
  const filteringHidesSome = state.locationFilter && visibleSt.length < (item.subtasks || []).length;
  let html = '<div class="subtasks-container">';
  if (filteringHidesSome) {
    html += `<div style="font-size:11px;opacity:0.55;font-style:italic;padding:2px 4px;">Affichage filtré : ${visibleSt.length}/${item.subtasks.length} sous-tâches (lieu « ${escapeHtml(state.locationFilter)} »)</div>`;
  }
  visibleSt.forEach(st => {
    const editingSt = state.editing && state.editing.type === 'subtask' && state.editing.id === st.id;
    const hasLink = !!st.link;
    const hasLocation = !!st.location;
    const hasPrice = st.price && st.price > 0;
    const hasImage = !!st.image;
    const locKey = 'st:' + st.id;
    const locOpen = state.expandedLocation[locKey];
    if (editingSt) {
      html += `
        <div class="subtask-row">
          <input type="text" style="flex:1; background: var(--surface); border:1px solid var(--line); border-radius:3px; padding:4px 8px; font-size:13px; outline:none;" id="inline-edit-subtask-${st.id}" value="${escapeHtml(state.editing.value)}">
          <button class="btn-primary" style="padding:4px 10px;" data-action="save-subtask-edit" data-id="${st.id}" data-item-id="${item.id}">OK</button>
          <button class="btn-ghost" style="padding:4px 8px;" data-action="cancel-edit">✕</button>
        </div>
      `;
    } else {
      html += `
        <div class="subtask-row">
          <button class="subtask-checkbox" data-action="toggle-subtask" data-item-id="${item.id}" data-id="${st.id}">
            ${st.done ? ICO.checkSm : ICO.circleSm}
          </button>
          ${hasImage ? `<button class="image-thumb" style="width:22px;height:22px;" data-action="open-lightbox-subtask" data-item-id="${item.id}" data-id="${st.id}" title="Voir l'image"><img src="${st.image}" alt=""></button>` : ''}
          <span class="subtask-text${st.done?' done':''}">${escapeHtml(st.text)}</span>
          ${hasLink ? `<a href="${escapeHtml(st.link)}" target="_blank" rel="noopener noreferrer" class="link-inline" title="${escapeHtml(st.link)}">${ICO.linkSm}</a>` : ''}
          ${hasLocation ? `<span class="location-pill" style="background:${escapeHtml(st.location.color)};" data-action="filter-by-location" data-location="${escapeHtml(st.location.name)}" title="Cliquer pour filtrer par « ${escapeHtml(st.location.name)} »">${escapeHtml(st.location.name)}</span>` : ''}
          ${hasPrice ? `<span class="price-pill" data-action="manage-subtask-price" data-item-id="${item.id}" data-id="${st.id}">${formatPrice(st.price)}</span>` : ''}
          <span class="subtask-actions">
            <button data-action="manage-subtask-image" data-item-id="${item.id}" data-id="${st.id}" title="${hasImage ? 'Voir ou gérer l’image' : 'Ajouter image'}"${hasImage ? ' class="has-data"' : ''}>${ICO.image}</button>
            <button data-action="toggle-location-editor" data-key="${locKey}" title="${hasLocation ? 'Modifier lieu' : 'Ajouter lieu'}"${hasLocation ? ' class="has-data"' : ''}>${ICO.tag}</button>
            <button data-action="manage-subtask-price" data-item-id="${item.id}" data-id="${st.id}" title="${hasPrice ? 'Modifier prix' : 'Ajouter prix'}"${hasPrice ? ' class="has-data"' : ''}>${ICO.euro}</button>
            <button data-action="manage-subtask-link" data-item-id="${item.id}" data-id="${st.id}" title="${hasLink ? 'Modifier lien' : 'Ajouter lien'}"${hasLink ? ' class="has-data"' : ''}>${ICO.link}</button>
            <button data-action="move-subtask-up" data-item-id="${item.id}" data-id="${st.id}">${ICO.up}</button>
            <button data-action="move-subtask-down" data-item-id="${item.id}" data-id="${st.id}">${ICO.down}</button>
            <button data-action="edit-subtask" data-item-id="${item.id}" data-id="${st.id}">${ICO.edit}</button>
            <button data-action="delete-subtask" data-item-id="${item.id}" data-id="${st.id}" class="danger">${ICO.trash}</button>
          </span>
          ${locOpen ? renderLocationEditor(st, 'subtask', item.id) : ''}
        </div>
      `;
    }
  });
  if (adding) {
    html += `
      <div class="subtask-row" style="gap:8px;">
        <input type="text" id="new-subtask-text" placeholder="Sous-tâche…" autofocus style="flex:1; background: var(--surface); border:1px solid var(--line); border-radius:3px; padding:4px 8px; font-size:13px; outline:none;">
        <button class="btn-primary" style="padding:4px 10px;" data-action="confirm-add-subtask" data-id="${item.id}">+</button>
        <button class="btn-ghost" style="padding:4px 8px;" data-action="cancel-add">✕</button>
      </div>
    `;
  } else if (!state.locationFilter) {
    // Don't show "add subtask" button when in filter mode (could be confusing)
    html += `<button class="add-subtask-btn" data-action="start-add-subtask" data-id="${item.id}">${ICO.plusSm} Ajouter une sous-tâche</button>`;
  }
  html += '</div>';
  return html;
}

function renderAddItemForm(parentType, parentId) {
  const prio = (state.adding && state.adding.priority) || 'medium';
  return `
    <div class="add-form">
      <input type="text" id="new-item-text" placeholder="Nouvelle tâche…" autofocus value="${escapeHtml((state.adding && state.adding.text) || '')}">
      <div class="row">
        <select id="new-item-prio">
          ${Object.entries(PRIORITIES).map(([k,v]) => `<option value="${k}"${k===prio?' selected':''}>${v}</option>`).join('')}
        </select>
        <button class="btn-primary" data-action="confirm-add-item" data-parent-type="${parentType}" data-parent-id="${parentId || ''}">Ajouter</button>
        <button class="btn-ghost" data-action="cancel-add">Annuler</button>
      </div>
    </div>
  `;
}

// ==============================================
// Event delegation
// ==============================================
function handleClick(e) {
  const el = e.target.closest('[data-action]');

  // Lightbox overlay click (outside content) closes
  const overlay = e.target.closest('[data-role="lightbox-overlay"]');
  if (overlay && e.target === overlay) {
    closeLightbox();
    return;
  }

  // Color swatch click
  const sw = e.target.closest('[data-role="loc-color"]');
  if (sw) {
    // Mark as selected visually
    const container = sw.parentElement;
    container.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
    sw.classList.add('selected');
    return;
  }

  if (!el) {
    // Close context menu on random click
    if (state.contextMenu) closeContextMenu();
    return;
  }

  const a = el.dataset.action;
  const id = el.dataset.id;

  switch (a) {
    case 'refresh': refresh(); break;
    case 'select-section': {
      if (state.draggedType) return;
      state.currentSectionId = id;
      state.search = '';
      state.editing = null;
      state.adding = null;
      state.expandedNotes = {};
      state.expandedSubtasks = {};
      state.expandedLocation = {};
      render();
      break;
    }
    case 'add-section': {
      const title = prompt('Nom de la nouvelle section :');
      if (!title) return;
      const emoji = prompt('Emoji (optionnel) :', '📁') || '📁';
      addSection(title, emoji);
      break;
    }
    case 'edit-section': {
      const sec = state.data.sections.find(s => s.id === id); if (!sec) return;
      state.editing = { type: 'section', id, value: sec.title };
      render();
      setTimeout(() => document.getElementById('inline-edit-title')?.focus(), 30);
      break;
    }
    case 'save-section-edit': {
      const title = document.getElementById('inline-edit-title').value;
      const subtitle = document.getElementById('inline-edit-subtitle').value;
      const emoji = document.getElementById('inline-edit-emoji').value;
      state.editing = null;
      updateSectionTitle(state.currentSectionId, title, subtitle, emoji);
      break;
    }
    case 'open-tab-menu': {
      const rect = el.getBoundingClientRect();
      openTabContextMenu(id, rect.left, rect.bottom + 4);
      break;
    }
    case 'close-context-menu': closeContextMenu(); break;
    case 'ctx-rename-tab': ctxRenameTab(id); break;
    case 'ctx-emoji-tab': ctxChangeEmojiTab(id); break;
    case 'ctx-subtitle-tab': ctxEditSubtitleTab(id); break;
    case 'ctx-delete-tab': ctxDeleteTab(id); break;

    case 'clear-search': state.search = ''; render(); break;

    case 'start-add-item': {
      state.adding = { type: 'item', parentType: el.dataset.parentType, parentId: el.dataset.parentId || null, text: '', priority: 'medium' };
      render();
      setTimeout(() => document.getElementById('new-item-text')?.focus(), 30);
      break;
    }
    case 'confirm-add-item': {
      const text = document.getElementById('new-item-text').value;
      const prio = document.getElementById('new-item-prio').value;
      const parentType = el.dataset.parentType;
      const parentId = el.dataset.parentId || null;
      state.adding = null;
      addItem(parentType, parentId, text, prio);
      break;
    }
    case 'cancel-add': state.adding = null; render(); break;

    case 'start-add-subsection': {
      state.adding = { type: 'subsection' };
      render();
      setTimeout(() => document.getElementById('new-subsection-title')?.focus(), 30);
      break;
    }
    case 'confirm-add-subsection': {
      const title = document.getElementById('new-subsection-title').value;
      state.adding = null;
      addSubsection(title);
      break;
    }
    case 'edit-subsection': {
      const sec = currentSection();
      const sub = sec.subsections.find(s => s.id === id); if (!sub) return;
      state.editing = { type: 'subsection', id, value: sub.title };
      render();
      setTimeout(() => document.getElementById('inline-edit-subsection-' + id)?.focus(), 30);
      break;
    }
    case 'save-subsection-edit': {
      const val = document.getElementById('inline-edit-subsection-' + id).value;
      state.editing = null;
      updateSubsectionTitle(id, val);
      break;
    }
    case 'delete-subsection': deleteSubsection(id); break;
    case 'toggle-subsection': toggleSubsection(id); break;
    case 'move-subsection-up': moveSubsection(id, 'up'); break;
    case 'move-subsection-down': moveSubsection(id, 'down'); break;

    case 'toggle-item': toggleItemDone(id); break;
    case 'change-prio': break;
    case 'edit-item': {
      const item = findItem(id); if (!item) return;
      state.editing = { type: 'item', id, value: item.text };
      render();
      setTimeout(() => document.getElementById('inline-edit-item-' + id)?.focus(), 30);
      break;
    }
    case 'save-item-edit': {
      const val = document.getElementById('inline-edit-item-' + id).value;
      state.editing = null;
      updateItemText(id, val);
      break;
    }
    case 'cancel-edit': state.editing = null; render(); break;
    case 'delete-item': deleteItem(id); break;
    case 'move-item-up': moveItem(id, 'up'); break;
    case 'move-item-down': moveItem(id, 'down'); break;
    case 'toggle-notes-display': state.expandedNotes[id] = !state.expandedNotes[id]; render(); break;
    case 'toggle-subtasks-display': state.expandedSubtasks[id] = !state.expandedSubtasks[id]; render(); break;
    case 'manage-item-link': manageItemLink(id); break;
    case 'manage-item-price': manageItemPrice(id); break;

    case 'toggle-location-editor': {
      const key = el.dataset.key;
      toggleLocationEditor(key);
      break;
    }
    case 'cancel-location-editor': {
      const key = el.dataset.key;
      state.expandedLocation[key] = false;
      render();
      break;
    }
    case 'save-location': {
      const kind = el.dataset.kind;
      const key = el.dataset.key;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      const editorId = kind === 'item' ? `loc-editor-${itemId}` : `loc-editor-st-${subtaskId}`;
      const editor = document.getElementById(editorId);
      const nameInput = editor.querySelector('[data-role="loc-name"]');
      const selectedSwatch = editor.querySelector('.color-swatch.selected');
      const name = nameInput.value;
      const color = selectedSwatch ? selectedSwatch.dataset.color : COLOR_PALETTE[0];
      state.expandedLocation[key] = false;
      if (kind === 'item') updateItemLocation(itemId, name, color);
      else updateSubtaskLocation(itemId, subtaskId, name, color);
      break;
    }
    case 'remove-location': {
      const kind = el.dataset.kind;
      const key = el.dataset.key;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      state.expandedLocation[key] = false;
      if (kind === 'item') updateItemLocation(itemId, '', '');
      else updateSubtaskLocation(itemId, subtaskId, '', '');
      break;
    }

    case 'manage-subtask-link': manageSubtaskLink(el.dataset.itemId, id); break;
    case 'manage-subtask-price': manageSubtaskPrice(el.dataset.itemId, id); break;
    case 'toggle-subtask': toggleSubtaskDone(el.dataset.itemId, id); break;

    // Image actions
    case 'manage-item-image': manageItemImage(id); break;
    case 'manage-subtask-image': manageSubtaskImage(el.dataset.itemId, id); break;
    case 'open-lightbox-item': openLightboxItem(id); break;
    case 'open-lightbox-subtask': openLightboxSubtask(el.dataset.itemId, id); break;
    case 'close-lightbox': closeLightbox(); break;
    case 'replace-image': {
      const kind = el.dataset.kind;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      // Close lightbox first
      state.lightbox = null;
      render();
      // Then pick a new image
      pickImage((dataUrl) => {
        if (kind === 'item') updateItemImage(itemId, dataUrl);
        else updateSubtaskImage(itemId, subtaskId, dataUrl);
      });
      break;
    }
    case 'remove-image': {
      const kind = el.dataset.kind;
      const itemId = el.dataset.itemId;
      const subtaskId = el.dataset.subtaskId;
      if (!confirm('Supprimer l\'image attachée ?')) return;
      state.lightbox = null;
      if (kind === 'item') updateItemImage(itemId, '');
      else updateSubtaskImage(itemId, subtaskId, '');
      break;
    }

    // Location filter actions
    case 'filter-by-location': {
      const locName = el.dataset.location;
      // Toggle: if same filter is active, clear it
      if (state.locationFilter === locName) {
        state.locationFilter = null;
      } else {
        state.locationFilter = locName;
      }
      render();
      break;
    }
    case 'clear-location-filter': {
      state.locationFilter = null;
      render();
      break;
    }

    case 'start-add-subtask': {
      state.adding = { type: 'subtask', parentId: id };
      state.expandedSubtasks[id] = true;
      render();
      setTimeout(() => document.getElementById('new-subtask-text')?.focus(), 30);
      break;
    }
    case 'confirm-add-subtask': {
      const text = document.getElementById('new-subtask-text').value;
      state.adding = null;
      addSubtask(id, text);
      break;
    }
    case 'edit-subtask': {
      const itemId = el.dataset.itemId;
      const item = findItem(itemId); if (!item) return;
      const st = item.subtasks.find(s => s.id === id); if (!st) return;
      state.editing = { type: 'subtask', id, parentId: itemId, value: st.text };
      render();
      setTimeout(() => document.getElementById('inline-edit-subtask-' + id)?.focus(), 30);
      break;
    }
    case 'save-subtask-edit': {
      const itemId = el.dataset.itemId;
      const val = document.getElementById('inline-edit-subtask-' + id).value;
      state.editing = null;
      updateSubtaskText(itemId, id, val);
      break;
    }
    case 'delete-subtask': deleteSubtask(el.dataset.itemId, id); break;
    case 'move-subtask-up': moveSubtask(el.dataset.itemId, id, 'up'); break;
    case 'move-subtask-down': moveSubtask(el.dataset.itemId, id, 'down'); break;
  }
}

function handleChange(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action; const id = el.dataset.id;
  if (a === 'change-prio') changeItemPriority(id, e.target.value);
  if (a === 'set-filter') { state.filter = e.target.value; render(); }
  if (a === 'set-prio-filter') { state.priorityFilter = e.target.value; render(); }
  if (a === 'set-location-filter') { state.locationFilter = e.target.value || null; render(); }
}

function handleInput(e) {
  const el = e.target;
  if (el.id === 'search-input') {
    state.search = el.value;
    const cursor = el.selectionStart;
    render();
    const ni = document.getElementById('search-input');
    if (ni) { ni.focus(); ni.setSelectionRange(cursor, cursor); }
    return;
  }
  const ae = el.closest('[data-action]');
  if (ae && ae.dataset.action === 'update-notes') updateItemNotes(ae.dataset.id, el.value);
}

function handleKeydown(e) {
  const el = e.target;
  if (e.key === 'Enter' && !e.shiftKey) {
    if (el.id === 'inline-edit-title') { document.querySelector('[data-action="save-section-edit"]')?.click(); e.preventDefault(); }
    if (el.id?.startsWith('inline-edit-subsection-')) { document.querySelector(`[data-action="save-subsection-edit"][data-id="${el.id.replace('inline-edit-subsection-','')}"]`)?.click(); e.preventDefault(); }
    if (el.id?.startsWith('inline-edit-item-')) { document.querySelector(`[data-action="save-item-edit"][data-id="${el.id.replace('inline-edit-item-','')}"]`)?.click(); e.preventDefault(); }
    if (el.id?.startsWith('inline-edit-subtask-')) { document.querySelector(`[data-action="save-subtask-edit"][data-id="${el.id.replace('inline-edit-subtask-','')}"]`)?.click(); e.preventDefault(); }
    if (el.id === 'new-item-text') { document.querySelector('[data-action="confirm-add-item"]')?.click(); e.preventDefault(); }
    if (el.id === 'new-subsection-title') { document.querySelector('[data-action="confirm-add-subsection"]')?.click(); e.preventDefault(); }
    if (el.id === 'new-subtask-text') { document.querySelector('[data-action="confirm-add-subtask"]')?.click(); e.preventDefault(); }
  }
  if (e.key === 'Escape') {
    if (state.lightbox) { closeLightbox(); return; }
    if (state.contextMenu) { closeContextMenu(); return; }
    if (state.editing) { state.editing = null; render(); }
    else if (state.adding) { state.adding = null; render(); }
  }
}

// ==============================================
// Context menu triggers (right-click, dblclick, long-press)
// ==============================================
function handleContextMenu(e) {
  const tab = e.target.closest('.tab[data-drag-type="tab"]');
  if (!tab) return;
  e.preventDefault();
  openTabContextMenu(tab.dataset.id, e.clientX, e.clientY);
}
function handleDblClick(e) {
  const tab = e.target.closest('.tab[data-drag-type="tab"]');
  if (!tab) return;
  e.preventDefault();
  ctxRenameTab(tab.dataset.id);
}

let longPressTimer = null;
let longPressFired = false;
function handleTouchStart(e) {
  const tab = e.target.closest('.tab[data-drag-type="tab"]');
  if (!tab) return;
  longPressFired = false;
  longPressTimer = setTimeout(() => {
    const rect = tab.getBoundingClientRect();
    longPressFired = true;
    // Vibrate if available
    if (navigator.vibrate) try { navigator.vibrate(15); } catch (e) {}
    openTabContextMenu(tab.dataset.id, rect.left + rect.width/2 - 100, rect.bottom + 6);
  }, 500);
}
function clearLongPress() { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } }
function handleTouchEnd(e) {
  clearLongPress();
  if (longPressFired) { e.preventDefault(); longPressFired = false; }
}

// ==============================================
// Drag & Drop
// ==============================================
function handleDragStart(e) {
  const d = e.target.closest('[data-drag-type]');
  if (!d) return;
  state.draggedType = d.dataset.dragType;
  state.draggedId = d.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', d.dataset.id); } catch (err) {}
  d.classList.add('dragging');
}
function handleDragOver(e) {
  if (!state.draggedType || !state.draggedId) return;
  let t;
  if (state.draggedType === 'item') t = e.target.closest('.item[data-drag-type="item"]');
  else if (state.draggedType === 'subsection') t = e.target.closest('.subsection[data-drag-type="subsection"]');
  else if (state.draggedType === 'tab') t = e.target.closest('.tab[data-drag-type="tab"]');
  if (!t) return;
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  const id = t.dataset.id;
  if (id !== state.draggedId && state.dropTargetId !== id) {
    state.dropTargetId = id;
    document.querySelectorAll('.drop-target').forEach(x => x.classList.remove('drop-target'));
    t.classList.add('drop-target');
  }
}
function handleDrop(e) {
  if (!state.draggedType || !state.draggedId) return;
  let t;
  if (state.draggedType === 'item') t = e.target.closest('.item[data-drag-type="item"]');
  else if (state.draggedType === 'subsection') t = e.target.closest('.subsection[data-drag-type="subsection"]');
  else if (state.draggedType === 'tab') t = e.target.closest('.tab[data-drag-type="tab"]');
  if (!t) { handleDragEnd(); return; }
  e.preventDefault();
  const tId = t.dataset.id; const dId = state.draggedId; const type = state.draggedType;
  state.draggedType = null; state.draggedId = null; state.dropTargetId = null;
  if (type === 'item') dropReorderItem(dId, tId);
  else if (type === 'subsection') dropReorderSubsection(dId, tId);
  else if (type === 'tab') dropReorderTab(dId, tId);
}
function handleDragEnd() {
  state.draggedType = null; state.draggedId = null; state.dropTargetId = null;
  document.querySelectorAll('.dragging, .drop-target').forEach(x => { x.classList.remove('dragging'); x.classList.remove('drop-target'); });
}

// ==============================================
// Init
// ==============================================
(async function init() {
  let loaded = await loadData();
  if (!loaded) { loaded = JSON.parse(JSON.stringify(DEFAULT_DATA)); await saveData(loaded); }
  state.data = loaded;

  const app = document.getElementById('app');
  app.addEventListener('click', handleClick);
  app.addEventListener('change', handleChange);
  app.addEventListener('input', handleInput);
  app.addEventListener('keydown', handleKeydown);
  app.addEventListener('dragstart', handleDragStart);
  app.addEventListener('dragover', handleDragOver);
  app.addEventListener('drop', handleDrop);
  app.addEventListener('dragend', handleDragEnd);
  app.addEventListener('contextmenu', handleContextMenu);
  app.addEventListener('dblclick', handleDblClick);
  app.addEventListener('touchstart', handleTouchStart, { passive: true });
  app.addEventListener('touchend', handleTouchEnd);
  app.addEventListener('touchmove', clearLongPress, { passive: true });
  app.addEventListener('touchcancel', clearLongPress);

  render();
})();
</script>
</body>
</html>
