<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet">
<meta name="referrer" content="no-referrer">
<title>Expatriation Sydney → Tel Aviv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAF7F2;
    --ink: #1E1A17;
    --ink-soft: #4A4540;
    --ink-faint: rgba(30, 26, 23, 0.55);
    --line: rgba(30, 26, 23, 0.1);
    --line-soft: rgba(30, 26, 23, 0.05);
    --surface: rgba(255, 255, 255, 0.75);
    --surface-soft: rgba(255, 255, 255, 0.55);
    --surface-hover: #ffffff;
    --accent: #C2410C;
    --accent-blue: #0E2A47;
    --green: #65A30D;
    --crit-bg: #FEE2E2; --crit-fg: #7F1D1D; --crit-dot: #B91C1C;
    --high-bg: #FFEDD5; --high-fg: #7C2D12; --high-dot: #C2410C;
    --med-bg:  #FEF3C7; --med-fg:  #713F12; --med-dot:  #A16207;
    --low-bg:  #F1F5F9; --low-fg:  #334155; --low-dot:  #64748B;
  }
  html, body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(201, 94, 43, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(14, 42, 71, 0.04) 0%, transparent 40%);
    color: var(--ink);
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { padding-bottom: 60px; }
  .serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01", "ss02"; }
  button { font-family: inherit; font-size: inherit; background: none; border: none; cursor: pointer; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  select { cursor: pointer; }
  a { color: inherit; }

  /* Layout */
  .wrap { max-width: 960px; margin: 0 auto; padding: 0 14px; }
  @media (min-width: 640px) { .wrap { padding: 0 24px; } }
  @media (min-width: 900px) { .wrap { padding: 0 32px; } }

  /* Header */
  header { padding: 20px 0 14px; border-bottom: 1px solid var(--line); }
  .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.6;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  h1 em { font-style: italic; color: var(--accent); }
  @media (min-width: 640px) { h1 { font-size: 40px; } }
  @media (min-width: 900px) { h1 { font-size: 48px; } }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .save-indicator { font-size: 11px; opacity: 0.6; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  .save-indicator.saving { opacity: 1; color: var(--accent); }
  .refresh-btn { font-size: 11px; opacity: 0.6; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; }
  .refresh-btn:hover { opacity: 1; }

  /* Progress */
  .progress-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .progress-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; }
  @media (min-width: 640px) { .progress-label { font-size: 11px; } }
  .progress-value { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; }
  @media (min-width: 640px) { .progress-value { font-size: 26px; } }
  .progress-value .pct-sign { font-size: 12px; opacity: 0.5; font-family: 'DM Sans', sans-serif; }
  .progress-bar { height: 5px; background: rgba(30, 26, 23, 0.1); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent) 100%);
    transition: width 0.6s ease;
  }
  .progress-count { font-size: 11px; opacity: 0.6; margin-top: 4px; }

  /* TABS */
  .tabs-outer { position: relative; border-bottom: 1px solid var(--line); }
  .tabs-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    padding: 12px 0;
  }
  .tabs-scroll::-webkit-scrollbar { height: 4px; }
  .tabs-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  .tabs-inner {
    display: inline-flex;
    gap: 6px;
    padding: 0 14px;
    min-width: 100%;
  }
  /* Mobile fade hint */
  .tabs-outer::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 1px;
    width: 30px;
    background: linear-gradient(to right, transparent, var(--bg));
    pointer-events: none;
    opacity: 0.9;
  }
  /* Desktop: wrap tabs on 2+ lines, no scroll, no fade */
  @media (min-width: 700px) {
    .tabs-scroll { overflow: visible; padding: 10px 0; }
    .tabs-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 24px;
    }
    .tabs-outer::after { display: none; }
  }
  @media (min-width: 900px) { .tabs-inner { padding: 0 32px; } }
  .tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 11px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--line-soft);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: background 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
    cursor: pointer;
  }
  .tab:hover { background: var(--surface-hover); }
  .tab.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .tab .count {
    font-size: 11px;
    padding: 1px 6px;
    background: rgba(30, 26, 23, 0.07);
    border-radius: 3px;
  }
  .tab.active .count { background: rgba(255, 255, 255, 0.15); }
  .tab.dragging { opacity: 0.35; }
  .tab.drop-target { box-shadow: 0 0 0 2px var(--accent); }
  .tab-add {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    padding: 0;
    background: transparent;
    border: 1px dashed rgba(30, 26, 23, 0.25);
    border-radius: 6px;
    opacity: 0.7;
    flex-shrink: 0;
    cursor: pointer;
  }
  .tab-add:hover { opacity: 1; background: var(--surface); }

  /* Main */
  main { padding: 20px 0; }

  /* Section header */
  .section-header {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  @media (min-width: 700px) {
    .section-header { flex-direction: row; align-items: flex-start; justify-content: space-between; gap: 16px; }
  }
  .section-header-left { flex: 1; min-width: 0; }
  .section-title-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.5;
    margin-bottom: 2px;
  }
  .section-title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .section-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 24px;
    font-weight: 400;
    line-height: 1.15;
    cursor: text;
  }
  @media (min-width: 640px) { .section-title { font-size: 30px; } }
  .section-edit-actions { display: inline-flex; gap: 2px; opacity: 0.55; }
  .section-edit-actions:hover { opacity: 1; }
  .section-edit-actions button {
    padding: 6px;
    border-radius: 4px;
    display: flex;
  }
  .section-edit-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .section-edit-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }
  .section-subtitle {
    font-size: 12px;
    opacity: 0.65;
    font-style: italic;
    margin-top: 4px;
  }
  @media (min-width: 640px) { .section-subtitle { font-size: 13px; } }
  .section-stats { text-align: right; flex-shrink: 0; }
  .section-stats .pct { font-family: 'Fraunces', serif; font-size: 26px; }
  @media (min-width: 640px) { .section-stats .pct { font-size: 30px; } }

  /* Inline edit */
  .inline-edit {
    display: flex;
    gap: 6px;
    align-items: center;
    flex: 1;
    min-width: 0;
    flex-wrap: wrap;
  }
  .inline-edit input {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 18px;
    font-family: 'Fraunces', serif;
    outline: none;
    flex: 1;
    min-width: 0;
  }
  .inline-edit input.small { font-size: 14px; font-family: inherit; }
  .inline-edit input.emoji { width: 56px; flex: 0 0 auto; text-align: center; font-family: inherit; font-size: 20px; }
  .inline-edit .btn-primary, .inline-edit .btn-ghost { flex-shrink: 0; }

  /* Toolbar */
  .toolbar {
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 7px 10px;
  }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 14px;
    min-width: 0;
  }
  .search-box .clear-search { opacity: 0.4; display: flex; align-items: center; padding: 2px; }
  .search-box .clear-search:hover { opacity: 1; }
  .toolbar select {
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
  }

  /* Subsection */
  .subsection {
    margin-top: 20px;
    border-radius: 6px;
    transition: box-shadow 0.15s;
  }
  .subsection.dragging { opacity: 0.35; }
  .subsection.drop-target {
    box-shadow: 0 0 0 2px var(--accent);
    background: rgba(194, 65, 12, 0.04);
  }
  .subsection-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 4px 6px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 8px;
  }
  .subsection-toggle {
    display: flex;
    align-items: center;
    padding: 4px;
    opacity: 0.6;
    flex-shrink: 0;
  }
  .subsection-toggle:hover { opacity: 1; }
  .subsection-grip {
    display: none;
    cursor: grab;
    opacity: 0.3;
    padding: 4px 2px;
    flex-shrink: 0;
  }
  .subsection-grip:active { cursor: grabbing; }
  .subsection:hover .subsection-grip { opacity: 0.6; }
  @media (min-width: 700px) { .subsection-grip { display: inline-flex; } }
  .subsection-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    flex: 1;
    min-width: 0;
  }
  @media (min-width: 640px) { .subsection-title { font-size: 18px; } }
  .subsection-count { font-size: 11px; opacity: 0.5; flex-shrink: 0; }
  .subsection-actions {
    display: inline-flex;
    gap: 2px;
    opacity: 0.55;
    flex-shrink: 0;
  }
  .subsection-actions:hover { opacity: 1; }
  .subsection-actions button { padding: 5px; border-radius: 4px; display: flex; }
  .subsection-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .subsection-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }

  /* Items */
  .items-list { display: flex; flex-direction: column; gap: 5px; }
  .items-list.collapsed { display: none; }
  .item {
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .item.dragging { opacity: 0.35; }
  .item.drop-target { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 10px 10px 10px 12px;
  }
  @media (min-width: 640px) { .item-row { gap: 8px; padding: 10px 12px; } }
  .item-prio-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .grip {
    display: none;
    cursor: grab;
    opacity: 0.2;
    padding-top: 2px;
  }
  .item:hover .grip { opacity: 0.7; }
  .grip:active { cursor: grabbing; }
  @media (min-width: 700px) { .grip { display: flex; } }
  .move-buttons {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-top: 0;
  }
  @media (min-width: 700px) { .move-buttons { display: none; } }
  .move-buttons button {
    opacity: 0.35;
    padding: 4px 2px;
    display: flex;
  }
  .move-buttons button:active { opacity: 1; }

  .checkbox-btn {
    flex-shrink: 0;
    padding: 2px 0 0;
    display: flex;
    align-items: center;
  }
  .item-content { flex: 1; min-width: 0; }
  .item-text-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }
  .item-text {
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .item-text.done { text-decoration: line-through; opacity: 0.5; }
  .subtask-badge {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 999px;
    background: rgba(30, 26, 23, 0.06);
    opacity: 0.7;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .subtask-badge:hover { opacity: 1; background: rgba(30, 26, 23, 0.1); }
  .subtask-badge.all-done { background: #DCFCE7; color: #14532D; opacity: 1; }

  /* Inline link */
  .link-inline {
    display: inline-flex;
    align-items: center;
    color: var(--accent);
    text-decoration: none;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--high-bg);
    opacity: 0.85;
    flex-shrink: 0;
    transition: opacity 0.15s;
    font-size: 11px;
  }
  .link-inline:hover { opacity: 1; }

  .prio-select {
    font-size: 11px;
    padding: 2px 20px 2px 8px;
    border-radius: 999px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 6px center;
  }
  .prio-critical { background-color: var(--crit-bg); color: var(--crit-fg); }
  .prio-high { background-color: var(--high-bg); color: var(--high-fg); }
  .prio-medium { background-color: var(--med-bg); color: var(--med-fg); }
  .prio-low { background-color: var(--low-bg); color: var(--low-fg); }

  .notes-preview {
    margin-top: 4px;
    font-size: 12px;
    opacity: 0.6;
    font-style: italic;
    display: flex;
    align-items: flex-start;
    gap: 4px;
    cursor: pointer;
    word-break: break-word;
  }
  .notes-preview:hover { opacity: 1; }
  .notes-textarea {
    margin-top: 6px;
    width: 100%;
    background: rgba(245, 242, 237, 0.8);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    padding: 8px;
    font-size: 13px;
    outline: none;
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
  }

  .item-actions {
    display: flex;
    align-items: center;
    gap: 0;
    opacity: 0.55;
    flex-shrink: 0;
  }
  .item:hover .item-actions { opacity: 1; }
  .item-actions button {
    padding: 6px;
    border-radius: 4px;
    display: flex;
    align-items: center;
  }
  .item-actions button:hover { background: rgba(30, 26, 23, 0.05); }
  .item-actions button.has-notes, .item-actions button.has-link { color: var(--accent); opacity: 1; }
  .item-actions button.delete:hover { background: var(--crit-bg); color: var(--crit-fg); }
  @media (max-width: 639px) { .item-actions button { padding: 7px; } }

  /* Subtasks */
  .subtasks-container {
    margin: 0 10px 10px 34px;
    padding: 6px 0 0 10px;
    border-left: 2px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .subtask-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .subtask-row:hover { background: rgba(255, 255, 255, 0.5); }
  .subtask-checkbox { flex-shrink: 0; display: flex; }
  .subtask-text { flex: 1; min-width: 0; word-break: break-word; }
  .subtask-text.done { text-decoration: line-through; opacity: 0.5; }
  .subtask-actions {
    display: inline-flex;
    gap: 0;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .subtask-row:hover .subtask-actions { opacity: 1; }
  .subtask-actions button { padding: 4px; border-radius: 3px; display: flex; }
  .subtask-actions button:hover { background: rgba(30, 26, 23, 0.06); }
  .subtask-actions button.has-link { color: var(--accent); opacity: 1; }
  .subtask-actions button.danger:hover { background: var(--crit-bg); color: var(--crit-fg); }
  .add-subtask-btn {
    align-self: flex-start;
    padding: 3px 8px;
    margin-top: 2px;
    font-size: 12px;
    opacity: 0.6;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .add-subtask-btn:hover { opacity: 1; background: rgba(30, 26, 23, 0.05); }

  /* Add forms */
  .add-btn {
    width: 100%;
    padding: 11px;
    border: 2px dashed rgba(30, 26, 23, 0.18);
    border-radius: 6px;
    font-size: 13px;
    opacity: 0.7;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
    margin-top: 8px;
    cursor: pointer;
  }
  .add-btn:hover {
    border-color: rgba(30, 26, 23, 0.4);
    opacity: 1;
    background: var(--surface-soft);
  }
  .add-btn.small { padding: 7px; font-size: 12px; }
  .add-subsection-btn {
    margin-top: 16px;
    padding: 10px;
    border: 2px dashed rgba(30, 26, 23, 0.18);
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    opacity: 0.7;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    transition: all 0.15s;
    cursor: pointer;
  }
  .add-subsection-btn:hover { opacity: 1; border-color: rgba(30, 26, 23, 0.35); background: var(--surface-soft); }

  .add-form {
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    padding: 10px;
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .add-form input[type="text"] {
    width: 100%;
    background: rgba(245, 242, 237, 0.8);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 14px;
    outline: none;
  }
  .add-form .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .add-form select {
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
  }

  .btn-primary {
    padding: 7px 14px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-primary:hover { background: var(--accent-blue); }
  .btn-ghost {
    padding: 7px 12px;
    border-radius: 4px;
    font-size: 13px;
    opacity: 0.6;
    cursor: pointer;
  }
  .btn-ghost:hover { opacity: 1; }

  .empty-state {
    padding: 36px 0;
    text-align: center;
    opacity: 0.5;
    font-style: italic;
    font-family: 'Fraunces', serif;
    font-size: 14px;
  }

  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    text-align: center;
    font-size: 11px;
    opacity: 0.55;
  }
  .footer .quote { font-family: 'Fraunces', serif; font-style: italic; }

  .loading-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }

// ==============================================
// Migration
// ==============================================
function migrate(data) {
  if (!data || !data.sections) return null;
  data.version = 2;
  data.sections.forEach(s => {
    if (!Array.isArray(s.items)) s.items = [];
    if (!Array.isArray(s.subsections)) s.subsections = [];
    s.items.forEach(i => {
      if (!Array.isArray(i.subtasks)) i.subtasks = [];
      if (typeof i.link !== 'string') i.link = '';
      i.subtasks.forEach(st => {
        if (typeof st.link !== 'string') st.link = '';
      });
    });
    s.subsections.forEach(sub => {
      if (typeof sub.collapsed !== 'boolean') sub.collapsed = false;
      if (!Array.isArray(sub.items)) sub.items = [];
      sub.items.forEach(i => {
        if (!Array.isArray(i.subtasks)) i.subtasks = [];
        if (typeof i.link !== 'string') i.link = '';
        i.subtasks.forEach(st => {
          if (typeof st.link !== 'string') st.link = '';
        });
      });
    });
  });
  return data;
}

  trash: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>',
  search: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',

  plusSm: '<svg class="ico-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',

// ==============================================
// State
// ==============================================
let state = {
  data: null,
  currentSectionId: 'status',
  search: '',
  filter: 'all',
  priorityFilter: 'all',
  expandedNotes: {},
  expandedSubtasks: {},
  editing: null,
  adding: null,
  draggedType: null, // 'item' | 'subsection' | 'tab'
  draggedId: null,
  dropTargetId: null,
  saving: false,
};
let saveTimeout = null;

// ==============================================
// Storage
// ==============================================
const hasWindowStorage = typeof window !== 'undefined' &&
                         typeof window.storage !== 'undefined' &&
                         window.storage && typeof window.storage.get === 'function';

async function loadData() {
  try {
    if (hasWindowStorage) {
      try { const r = await window.storage.get(STORAGE_KEY, true); if (r && r.value) return migrate(JSON.parse(r.value)); } catch (e) {}
      try { const r1 = await window.storage.get(STORAGE_KEY_V1, true); if (r1 && r1.value) return migrate(JSON.parse(r1.value)); } catch (e) {}
    } else {
      const raw2 = localStorage.getItem(STORAGE_KEY); if (raw2) return migrate(JSON.parse(raw2));
      const raw1 = localStorage.getItem(STORAGE_KEY_V1); if (raw1) return migrate(JSON.parse(raw1));
    }
  } catch (e) { console.error('Load error', e); }
  return null;
}

async function saveData(data) {
  try {
    const json = JSON.stringify(data);
    if (hasWindowStorage) await window.storage.set(STORAGE_KEY, json, true);
    else localStorage.setItem(STORAGE_KEY, json);
  } catch (e) { console.error('Save error', e); }
}

function scheduleSave() {
  if (saveTimeout) clearTimeout(saveTimeout);
  state.saving = true;
  updateSaveIndicator();
  saveTimeout = setTimeout(async () => {
    await saveData(state.data);
    state.saving = false;
    updateSaveIndicator();
  }, 400);
}

function updateSaveIndicator() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.innerHTML = state.saving
    ? ICO.save + ' Sauvegarde…'
    : ICO.checkSm + ' Synchronisé';
  el.className = 'save-indicator' + (state.saving ? ' saving' : '');
}

// ==============================================
// Helpers
// ==============================================
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeUrl(url) {
  if (!url) return '';
  url = url.trim();
  if (!url) return '';
  if (/^(https?:|mailto:|tel:|ftp:|file:)/i.test(url)) return url;
  return 'https://' + url;
}
function currentSection() {
  return state.data.sections.find(s => s.id === state.currentSectionId) || state.data.sections[0];
}
function findItemContainer(itemId) {
  const sec = currentSection();
  if (sec.items.find(i => i.id === itemId)) return sec.items;
  for (const sub of sec.subsections) {
    if (sub.items.find(i => i.id === itemId)) return sub.items;
  }
  return null;
}
function findItem(itemId) {
  const c = findItemContainer(itemId);
  return c ? c.find(i => i.id === itemId) : null;
}
function itemEffectiveDone(item) {
  if (item.subtasks && item.subtasks.length > 0) return item.subtasks.every(st => st.done);
  return item.done;
}
function itemProgress(item) {
  if (!item.subtasks || item.subtasks.length === 0) return null;
  const done = item.subtasks.filter(st => st.done).length;
  return { done, total: item.subtasks.length };
}
function countItems(sec) {
  let total = 0, done = 0;
  const allItems = [...sec.items, ...sec.subsections.flatMap(s => s.items)];
  allItems.forEach(item => {
    if (item.subtasks && item.subtasks.length > 0) {
      total += item.subtasks.length;
      done += item.subtasks.filter(st => st.done).length;
    } else {
      total += 1;
      if (item.done) done += 1;
    }
  });
  return { done, total };
}
function sectionStats(sec) {
  const { done, total } = countItems(sec);
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function globalStats() {
  let done = 0, total = 0;
  state.data.sections.forEach(s => { const c = countItems(s); done += c.done; total += c.total; });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function matchSearch(item, q) {
  if (!q) return true;
  q = q.toLowerCase();
  if (item.text.toLowerCase().includes(q)) return true;
  if ((item.notes||'').toLowerCase().includes(q)) return true;
  if ((item.link||'').toLowerCase().includes(q)) return true;
  if (item.subtasks && item.subtasks.some(st => st.text.toLowerCase().includes(q))) return true;
  return false;
}
function matchFilter(item) {
  const done = itemEffectiveDone(item);
  if (state.filter === 'todo' && done) return false;
  if (state.filter === 'done' && !done) return false;
  if (state.priorityFilter !== 'all' && item.priority !== state.priorityFilter) return false;
  return true;
}
function filterItems(items) {
  return items.filter(i => matchFilter(i) && matchSearch(i, state.search));
}

// ==============================================
// Mutations
// ==============================================
function mutate(fn) { fn(state.data); scheduleSave(); render(); }

// Items
function toggleItemDone(itemId) {
  mutate(() => {
    const item = findItem(itemId);
    if (!item) return;
    if (item.subtasks && item.subtasks.length > 0) {
      const allDone = item.subtasks.every(st => st.done);
      item.subtasks.forEach(st => st.done = !allDone);
    } else {
      item.done = !item.done;
    }
  });
}
function changeItemPriority(itemId, priority) { mutate(() => { const i = findItem(itemId); if (i) i.priority = priority; }); }
function updateItemText(itemId, text) { mutate(() => { const i = findItem(itemId); if (i) i.text = text.trim() || i.text; }); }
function updateItemNotes(itemId, notes) { const i = findItem(itemId); if (i) { i.notes = notes; scheduleSave(); } }
function updateItemLink(itemId, link) { mutate(() => { const i = findItem(itemId); if (i) i.link = normalizeUrl(link); }); }
function deleteItem(itemId) {
  const item = findItem(itemId);
  if (!item) return;
  if (!confirm('Supprimer "' + item.text + '" ?')) return;
  mutate(() => { const c = findItemContainer(itemId); const idx = c.findIndex(i => i.id === itemId); if (idx >= 0) c.splice(idx, 1); });
}
function moveItem(itemId, direction) {
  mutate(() => {
    const c = findItemContainer(itemId); if (!c) return;
    const idx = c.findIndex(i => i.id === itemId);
    const target = direction === 'up' ? idx - 1 : idx + 1;
    if (target < 0 || target >= c.length) return;
    [c[idx], c[target]] = [c[target], c[idx]];
  });
}
function dropReorderItem(draggedId, targetId) {
  if (!draggedId || draggedId === targetId) return;
  const cDragged = findItemContainer(draggedId);
  const cTarget = findItemContainer(targetId);
  if (!cDragged || !cTarget) return;
  mutate(() => {
    const fromIdx = cDragged.findIndex(i => i.id === draggedId);
    const [moved] = cDragged.splice(fromIdx, 1);
    const toIdx = cTarget.findIndex(i => i.id === targetId);
    cTarget.splice(toIdx, 0, moved);
  });
}
function addItem(containerType, parentId, text, priority) {
  if (!text.trim()) return;
  mutate(() => {
    const sec = currentSection();
    const newItem = I(text.trim(), priority);
    if (containerType === 'section') sec.items.push(newItem);
    else { const sub = sec.subsections.find(s => s.id === parentId); if (sub) sub.items.push(newItem); }
  });
}

// Subtasks
function toggleSubtaskDone(itemId, subtaskId) {
  mutate(() => {
    const i = findItem(itemId); if (!i) return;
    const st = i.subtasks.find(s => s.id === subtaskId); if (st) st.done = !st.done;
  });
}
function addSubtask(itemId, text) {
  if (!text.trim()) return;
  mutate(() => { const i = findItem(itemId); if (i) i.subtasks.push({ id: genId(), text: text.trim(), done: false, link: '' }); });
}
function updateSubtaskText(itemId, stId, text) {
  mutate(() => { const i = findItem(itemId); if (!i) return;
    const st = i.subtasks.find(s => s.id === stId); if (st) st.text = text.trim() || st.text;
  });
}
function updateSubtaskLink(itemId, stId, link) {
  mutate(() => { const i = findItem(itemId); if (!i) return;
    const st = i.subtasks.find(s => s.id === stId); if (st) st.link = normalizeUrl(link);
  });
}
function deleteSubtask(itemId, stId) {
  mutate(() => { const i = findItem(itemId); if (!i) return; i.subtasks = i.subtasks.filter(s => s.id !== stId); });
}
function moveSubtask(itemId, stId, direction) {
  mutate(() => {
    const i = findItem(itemId); if (!i) return;
    const idx = i.subtasks.findIndex(s => s.id === stId);
    const target = direction === 'up' ? idx - 1 : idx + 1;
    if (target < 0 || target >= i.subtasks.length) return;
    [i.subtasks[idx], i.subtasks[target]] = [i.subtasks[target], i.subtasks[idx]];
  });
}

// Subsections
function addSubsection(title) {
  if (!title.trim()) return;
  mutate(() => { const sec = currentSection(); sec.subsections.push({ id: genId(), title: title.trim(), collapsed: false, items: [] }); });
}
function updateSubsectionTitle(subId, title) {
  mutate(() => { const sec = currentSection(); const sub = sec.subsections.find(s => s.id === subId); if (sub && title.trim()) sub.title = title.trim(); });
}
function deleteSubsection(subId) {
  const sec = currentSection();
  const sub = sec.subsections.find(s => s.id === subId);
  if (!sub) return;
  const count = sub.items.length;
  const msg = count > 0
    ? `Supprimer la sous-section "${sub.title}" ?\n\nLes ${count} tâche(s) seront déplacées dans la section principale.`
    : `Supprimer la sous-section "${sub.title}" ?`;
  if (!confirm(msg)) return;
  mutate(() => { sec.items.push(...sub.items); sec.subsections = sec.subsections.filter(s => s.id !== subId); });
}
function toggleSubsection(subId) {
  mutate(() => { const sec = currentSection(); const sub = sec.subsections.find(s => s.id === subId); if (sub) sub.collapsed = !sub.collapsed; });
}
function moveSubsection(subId, direction) {
  mutate(() => {
    const sec = currentSection();
    const idx = sec.subsections.findIndex(s => s.id === subId);
    const target = direction === 'up' ? idx - 1 : idx + 1;
    if (target < 0 || target >= sec.subsections.length) return;
    [sec.subsections[idx], sec.subsections[target]] = [sec.subsections[target], sec.subsections[idx]];
  });
}
function dropReorderSubsection(draggedId, targetId) {
  if (!draggedId || draggedId === targetId) return;
  mutate(() => {
    const sec = currentSection();
    const fromIdx = sec.subsections.findIndex(s => s.id === draggedId);
    if (fromIdx < 0) return;
    const [moved] = sec.subsections.splice(fromIdx, 1);
    const toIdx = sec.subsections.findIndex(s => s.id === targetId);
    sec.subsections.splice(toIdx < 0 ? sec.subsections.length : toIdx, 0, moved);
  });
}

// Sections
function addSection(title, emoji) {
  if (!title.trim()) return;
  mutate(() => {
    const newSec = { id: genId(), emoji: (emoji && emoji.trim()) || '📁', title: title.trim(), subtitle: '', items: [], subsections: [] };
    state.data.sections.push(newSec);
    state.currentSectionId = newSec.id;
  });
}
function updateSectionTitle(secId, title, subtitle, emoji) {
  mutate(() => {
    const sec = state.data.sections.find(s => s.id === secId); if (!sec) return;
    if (title && title.trim()) sec.title = title.trim();
    if (subtitle !== undefined) sec.subtitle = subtitle.trim();
    if (emoji && emoji.trim()) sec.emoji = emoji.trim();
  });
}
function deleteSection(secId) {
  const sec = state.data.sections.find(s => s.id === secId); if (!sec) return;
  const c = countItems(sec);
  if (!confirm(`⚠️ Supprimer la section "${sec.title}" ?\n\nCela supprimera ${c.total} tâche(s). Cette action est irréversible.`)) return;
  if (!confirm('Êtes-vous absolument sûr ? Tapez OK pour confirmer.')) return;
  mutate(() => {
    state.data.sections = state.data.sections.filter(s => s.id !== secId);
    if (state.currentSectionId === secId && state.data.sections.length > 0) {
      state.currentSectionId = state.data.sections[0].id;
    }
  });
}
function moveSectionTab(secId, direction) {
  mutate(() => {
    const idx = state.data.sections.findIndex(s => s.id === secId);
    const target = direction === 'left' ? idx - 1 : idx + 1;
    if (target < 0 || target >= state.data.sections.length) return;
    [state.data.sections[idx], state.data.sections[target]] = [state.data.sections[target], state.data.sections[idx]];
  });
}
function dropReorderTab(draggedId, targetId) {
  if (!draggedId || draggedId === targetId) return;
  mutate(() => {
    const fromIdx = state.data.sections.findIndex(s => s.id === draggedId);
    if (fromIdx < 0) return;
    const [moved] = state.data.sections.splice(fromIdx, 1);
    const toIdx = state.data.sections.findIndex(s => s.id === targetId);
    state.data.sections.splice(toIdx < 0 ? state.data.sections.length : toIdx, 0, moved);
  });
}

async function refresh() {
  const loaded = await loadData();
  if (loaded) { state.data = loaded; render(); }
}

// Link prompt
function manageItemLink(itemId) {
  const item = findItem(itemId); if (!item) return;
  const current = item.link || '';
  const val = prompt(current ? 'Modifier le lien (laisser vide pour supprimer) :' : 'Ajouter un lien (URL) :', current);
  if (val === null) return;
  updateItemLink(itemId, val);
}
function manageSubtaskLink(itemId, stId) {
  const item = findItem(itemId); if (!item) return;
  const st = item.subtasks.find(s => s.id === stId); if (!st) return;
  const current = st.link || '';
  const val = prompt(current ? 'Modifier le lien (laisser vide pour supprimer) :' : 'Ajouter un lien (URL) :', current);
  if (val === null) return;
  updateSubtaskLink(itemId, stId, val);
}

// ==============================================
// Render
// ==============================================
function render() {
  const app = document.getElementById('app');
  const sec = currentSection();
  const g = globalStats();
  const s = sectionStats(sec);

  app.innerHTML = `
    ${renderHeader(g)}
    ${renderTabs()}
    <main>
      <div class="wrap">
        ${renderSectionHeader(sec, s)}
        ${renderToolbar()}
        ${renderSectionBody(sec)}
        <div class="footer">
          <div class="quote">« Les voyages forment la jeunesse » — et les administrations aussi.</div>
        </div>
      </div>
    </main>
  `;
}

function renderHeader(g) {
  return `
    <header>
      <div class="wrap">
        <div class="header-top">
          <div>
            <div class="eyebrow">🇫🇷 → 🇮🇱 <span>Sydney → Tel Aviv</span></div>
            <h1>Projet d'<em>expatriation</em></h1>
          </div>
          <div style="text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:2px;">
            <span id="save-indicator" class="save-indicator">${ICO.checkSm} Synchronisé</span>
            <button class="refresh-btn" data-action="refresh" title="Rafraîchir">${ICO.refresh} Rafraîchir</button>
          </div>
        </div>
        <div class="progress-row">
          <span class="progress-label">Progression globale</span>
          <span class="progress-value">${g.pct}<span class="pct-sign">%</span></span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${g.pct}%"></div></div>
        <div class="progress-count">${g.done} / ${g.total} tâches terminées</div>
      </div>
    </header>
  `;
}

function renderTabs() {
  return `
    <div class="tabs-outer">
      <div class="tabs-scroll">
        <div class="tabs-inner">
          ${state.data.sections.map(s => {
            const st = sectionStats(s);
            const active = s.id === state.currentSectionId ? ' active' : '';
            const dragging = state.draggedType === 'tab' && state.draggedId === s.id ? ' dragging' : '';
            const dropTarget = state.draggedType === 'tab' && state.dropTargetId === s.id && state.draggedId !== s.id ? ' drop-target' : '';
            return `<button class="tab${active}${dragging}${dropTarget}" draggable="true" data-drag-type="tab" data-id="${s.id}" data-action="select-section">
              <span>${s.emoji}</span>
              <span>${escapeHtml(s.title)}</span>
              <span class="count">${st.done}/${st.total}</span>
            </button>`;
          }).join('')}
          <button class="tab-add" data-action="add-section" title="Ajouter une section">${ICO.plus}</button>
        </div>
      </div>
    </div>
  `;
}

function renderSectionHeader(sec, s) {
  const isEditing = state.editing && state.editing.type === 'section' && state.editing.id === sec.id;
  const isFirst = state.data.sections[0]?.id === sec.id;
  const isLast = state.data.sections[state.data.sections.length - 1]?.id === sec.id;
  return `
    <div class="section-header">
      <div class="section-header-left">
        <div class="section-title-label">${sec.emoji} Section</div>
        ${isEditing ? `
          <div class="inline-edit" style="margin: 6px 0;">
            <input type="text" id="inline-edit-emoji" class="emoji" value="${escapeHtml(sec.emoji)}" maxlength="4" title="Emoji">
            <input type="text" id="inline-edit-title" value="${escapeHtml(state.editing.value)}" autofocus>
            <button class="btn-primary" data-action="save-section-edit">OK</button>
            <button class="btn-ghost" data-action="cancel-edit">✕</button>
          </div>
          <input type="text" id="inline-edit-subtitle" class="small" placeholder="Sous-titre (optionnel)" value="${escapeHtml(sec.subtitle || '')}" style="width:100%; background: var(--surface); border:1px solid var(--line); border-radius:4px; padding:6px 10px; font-size:13px; outline:none; margin-top:6px;">
        ` : `
          <div class="section-title-row">
            <span class="section-title serif" data-action="edit-section" data-id="${sec.id}" title="Cliquer pour renommer">${escapeHtml(sec.title)}</span>
            <span class="section-edit-actions">
              ${!isFirst ? `<button data-action="move-section-left" data-id="${sec.id}" title="Déplacer à gauche">${ICO.up}</button>` : ''}
              ${!isLast ? `<button data-action="move-section-right" data-id="${sec.id}" title="Déplacer à droite">${ICO.down}</button>` : ''}
              <button data-action="edit-section" data-id="${sec.id}" title="Renommer / changer emoji">${ICO.edit}</button>
              <button data-action="delete-section" data-id="${sec.id}" class="danger" title="Supprimer la section">${ICO.trash}</button>
            </span>
          </div>
          ${sec.subtitle ? `<div class="section-subtitle">${escapeHtml(sec.subtitle)}</div>` : ''}
        `}
      </div>
      <div class="section-stats">
        <div class="pct">${s.pct}<span style="font-size:12px;opacity:0.5;font-family:'DM Sans',sans-serif;">%</span></div>
        <div style="font-size:11px;opacity:0.6;">${s.done} / ${s.total}</div>
      </div>
    </div>
  `;
}

function renderToolbar() {
  return `
    <div class="toolbar">
      <div class="search-box">
        ${ICO.search}
        <input type="text" id="search-input" placeholder="Rechercher…" value="${escapeHtml(state.search)}">
        ${state.search ? '<button class="clear-search" data-action="clear-search">'+ICO.x+'</button>' : ''}
      </div>
      <select data-action="set-filter">
        <option value="all"${state.filter==='all'?' selected':''}>Toutes</option>
        <option value="todo"${state.filter==='todo'?' selected':''}>À faire</option>
        <option value="done"${state.filter==='done'?' selected':''}>Terminées</option>
      </select>
      <select data-action="set-prio-filter">
        <option value="all"${state.priorityFilter==='all'?' selected':''}>Priorités</option>
        <option value="critical"${state.priorityFilter==='critical'?' selected':''}>Critique</option>
        <option value="high"${state.priorityFilter==='high'?' selected':''}>Haute</option>
        <option value="medium"${state.priorityFilter==='medium'?' selected':''}>Moyenne</option>
        <option value="low"${state.priorityFilter==='low'?' selected':''}>Basse</option>
      </select>
    </div>
  `;
}

function renderSectionBody(sec) {
  let html = '';
  const sectionItems = filterItems(sec.items);
  const hasSubsections = sec.subsections.length > 0;

  if (sectionItems.length > 0 || !hasSubsections) {
    html += `<div class="items-list">`;
    if (sectionItems.length > 0) html += sectionItems.map(i => renderItem(i)).join('');
    else if (sec.items.length === 0 && !hasSubsections) html += `<div class="empty-state">Aucune tâche dans cette section.</div>`;
    html += `</div>`;

    const adding = state.adding && state.adding.type === 'item' && state.adding.parentType === 'section';
    html += adding ? renderAddItemForm('section', null) : `<button class="add-btn" data-action="start-add-item" data-parent-type="section">${ICO.plus} Ajouter une tâche</button>`;
  }

  sec.subsections.forEach(sub => { html += renderSubsection(sub); });

  const addingSub = state.adding && state.adding.type === 'subsection';
  html += addingSub ? `
    <div class="add-form" style="margin-top:16px;">
      <input type="text" id="new-subsection-title" placeholder="Nom de la sous-section…" autofocus>
      <div class="row">
        <button class="btn-primary" data-action="confirm-add-subsection">Créer</button>
        <button class="btn-ghost" data-action="cancel-add">Annuler</button>
      </div>
    </div>
  ` : `<button class="add-subsection-btn" data-action="start-add-subsection">${ICO.plus} Ajouter une sous-section</button>`;

  return html;
}

function renderSubsection(sub) {
  const isEditing = state.editing && state.editing.type === 'subsection' && state.editing.id === sub.id;
  const items = filterItems(sub.items);
  const doneCount = sub.items.filter(i => itemEffectiveDone(i)).length;
  const adding = state.adding && state.adding.type === 'item' && state.adding.parentType === 'subsection' && state.adding.parentId === sub.id;
  const dragging = state.draggedType === 'subsection' && state.draggedId === sub.id ? ' dragging' : '';
  const dropTarget = state.draggedType === 'subsection' && state.dropTargetId === sub.id && state.draggedId !== sub.id ? ' drop-target' : '';

  return `
    <div class="subsection${dragging}${dropTarget}" draggable="true" data-drag-type="subsection" data-id="${sub.id}">
      <div class="subsection-header">
        <button class="subsection-toggle" data-action="toggle-subsection" data-id="${sub.id}" title="${sub.collapsed ? 'Déplier' : 'Replier'}">
          ${sub.collapsed ? ICO.chevronR : ICO.chevronD}
        </button>
        <span class="subsection-grip" title="Glisser pour réorganiser">${ICO.grip}</span>
        ${isEditing ? `
          <div class="inline-edit">
            <input type="text" id="inline-edit-subsection-${sub.id}" class="small" value="${escapeHtml(state.editing.value)}" autofocus>
            <button class="btn-primary" data-action="save-subsection-edit" data-id="${sub.id}">OK</button>
            <button class="btn-ghost" data-action="cancel-edit">✕</button>
          </div>
        ` : `
          <span class="subsection-title">${escapeHtml(sub.title)}</span>
          <span class="subsection-count">${doneCount}/${sub.items.length}</span>
          <span class="subsection-actions">
            <button data-action="move-subsection-up" data-id="${sub.id}" title="Monter">${ICO.up}</button>
            <button data-action="move-subsection-down" data-id="${sub.id}" title="Descendre">${ICO.down}</button>
            <button data-action="edit-subsection" data-id="${sub.id}" title="Renommer">${ICO.edit}</button>
            <button data-action="delete-subsection" data-id="${sub.id}" class="danger" title="Supprimer">${ICO.trash}</button>
          </span>
        `}
      </div>
      ${!sub.collapsed ? `
        <div class="items-list">
          ${items.length === 0
            ? (sub.items.length === 0 ? '<div class="empty-state" style="padding:16px 0;">Sous-section vide.</div>' : '<div class="empty-state" style="padding:12px 0;">Aucune tâche ne correspond aux filtres.</div>')
            : items.map(i => renderItem(i)).join('')}
        </div>
        ${adding ? renderAddItemForm('subsection', sub.id) : `<button class="add-btn small" data-action="start-add-item" data-parent-type="subsection" data-parent-id="${sub.id}">${ICO.plusSm} Ajouter une tâche</button>`}
      ` : ''}
    </div>
  `;
}

function renderItem(item) {
  const isEditing = state.editing && state.editing.type === 'item' && state.editing.id === item.id;
  const notesOpen = state.expandedNotes[item.id];
  const subtasksOpen = state.expandedSubtasks[item.id];
  const isDragged = state.draggedType === 'item' && state.draggedId === item.id;
  const isDropTarget = state.draggedType === 'item' && state.dropTargetId === item.id && state.draggedId !== item.id;
  const prio = item.priority || 'medium';
  const dotColors = { critical: 'var(--crit-dot)', high: 'var(--high-dot)', medium: 'var(--med-dot)', low: 'var(--low-dot)' };
  const hasSubtasks = item.subtasks && item.subtasks.length > 0;
  const progress = itemProgress(item);
  const effectiveDone = itemEffectiveDone(item);
  const hasLink = !!item.link;

  if (isEditing) {
    return `
      <div class="item" data-id="${item.id}">
        <div class="item-prio-bar" style="background:${dotColors[prio]};"></div>
        <div class="item-row">
          <div style="padding-top:2px;">${effectiveDone ? ICO.checkFull : ICO.circle}</div>
          <div class="item-content">
            <input type="text" style="width:100%; background: var(--surface); border:1px solid var(--line); border-radius:4px; padding:6px 10px; font-size:14px; outline:none;" id="inline-edit-item-${item.id}" value="${escapeHtml(state.editing.value)}">
            <div style="display:flex; gap:8px; margin-top:8px;">
              <button class="btn-primary" data-action="save-item-edit" data-id="${item.id}">Enregistrer</button>
              <button class="btn-ghost" data-action="cancel-edit">Annuler</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  const cls = 'item' + (isDragged ? ' dragging' : '') + (isDropTarget ? ' drop-target' : '');
  const checkIcon = hasSubtasks
    ? (effectiveDone ? ICO.checkFull : (progress.done > 0 ? ICO.checkPartial : ICO.circle))
    : (item.done ? ICO.checkFull : ICO.circle);

  return `
    <div class="${cls}" data-id="${item.id}" draggable="true" data-drag-type="item">
      <div class="item-prio-bar" style="background:${dotColors[prio]};"></div>
      <div class="item-row">
        <div class="grip">${ICO.grip}</div>
        <div class="move-buttons">
          <button data-action="move-item-up" data-id="${item.id}">${ICO.up}</button>
          <button data-action="move-item-down" data-id="${item.id}">${ICO.down}</button>
        </div>
        <button class="checkbox-btn" data-action="toggle-item" data-id="${item.id}">${checkIcon}</button>
        <div class="item-content">
          <div class="item-text-row">
            <span class="item-text${effectiveDone ? ' done' : ''}">${escapeHtml(item.text)}</span>
            ${hasLink ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer" class="link-inline" title="${escapeHtml(item.link)}">${ICO.linkSm}</a>` : ''}
            ${hasSubtasks ? `<span class="subtask-badge${effectiveDone ? ' all-done' : ''}" data-action="toggle-subtasks-display" data-id="${item.id}">
              ${subtasksOpen ? ICO.chevronD : ICO.chevronR} ${progress.done}/${progress.total}
            </span>` : ''}
            <select class="prio-select prio-${prio}" data-action="change-prio" data-id="${item.id}">
              ${Object.entries(PRIORITIES).map(([k,v]) =>
                `<option value="${k}"${k===prio?' selected':''}>${v}</option>`
              ).join('')}
            </select>
          </div>
          ${notesOpen ? `
            <textarea class="notes-textarea" data-action="update-notes" data-id="${item.id}" placeholder="Notes, liens, contacts, références…">${escapeHtml(item.notes || '')}</textarea>
          ` : (item.notes ? `
            <div class="notes-preview" data-action="toggle-notes-display" data-id="${item.id}">
              ${ICO.note}
              <span>${escapeHtml(item.notes.slice(0, 80))}${item.notes.length > 80 ? '…' : ''}</span>
            </div>
          ` : '')}
        </div>
        <div class="item-actions">
          ${!hasSubtasks ? `<button data-action="toggle-subtasks-display" data-id="${item.id}" title="Ajouter des sous-tâches">${ICO.chevronR}</button>` : ''}
          <button data-action="manage-item-link" data-id="${item.id}" title="${hasLink ? 'Modifier le lien' : 'Ajouter un lien'}"${hasLink ? ' class="has-link"' : ''}>${ICO.link}</button>
          <button data-action="toggle-notes-display" data-id="${item.id}" title="Notes"${item.notes?' class="has-notes"':''}>${ICO.note}</button>
          <button data-action="edit-item" data-id="${item.id}" title="Modifier">${ICO.edit}</button>
          <button data-action="delete-item" data-id="${item.id}" class="delete" title="Supprimer">${ICO.trash}</button>
        </div>
      </div>
      ${subtasksOpen ? renderSubtasks(item) : ''}
    </div>
  `;
}

function renderSubtasks(item) {
  const adding = state.adding && state.adding.type === 'subtask' && state.adding.parentId === item.id;
  let html = '<div class="subtasks-container">';
  item.subtasks.forEach(st => {
    const editingSt = state.editing && state.editing.type === 'subtask' && state.editing.id === st.id;
    const hasLink = !!st.link;
    if (editingSt) {
      html += `
        <div class="subtask-row">
          <input type="text" style="flex:1; background: var(--surface); border:1px solid var(--line); border-radius:3px; padding:4px 8px; font-size:13px; outline:none;" id="inline-edit-subtask-${st.id}" value="${escapeHtml(state.editing.value)}">
          <button class="btn-primary" style="padding:4px 10px;" data-action="save-subtask-edit" data-id="${st.id}" data-item-id="${item.id}">OK</button>
          <button class="btn-ghost" style="padding:4px 8px;" data-action="cancel-edit">✕</button>
        </div>
      `;
    } else {
      html += `
        <div class="subtask-row">
          <button class="subtask-checkbox" data-action="toggle-subtask" data-item-id="${item.id}" data-id="${st.id}">
            ${st.done ? ICO.checkSm : ICO.circleSm}
          </button>
          <span class="subtask-text${st.done?' done':''}">${escapeHtml(st.text)}</span>
          ${hasLink ? `<a href="${escapeHtml(st.link)}" target="_blank" rel="noopener noreferrer" class="link-inline" title="${escapeHtml(st.link)}">${ICO.linkSm}</a>` : ''}
          <span class="subtask-actions">
            <button data-action="manage-subtask-link" data-item-id="${item.id}" data-id="${st.id}" title="${hasLink ? 'Modifier lien' : 'Ajouter lien'}"${hasLink ? ' class="has-link"' : ''}>${ICO.link}</button>
            <button data-action="move-subtask-up" data-item-id="${item.id}" data-id="${st.id}">${ICO.up}</button>
            <button data-action="move-subtask-down" data-item-id="${item.id}" data-id="${st.id}">${ICO.down}</button>
            <button data-action="edit-subtask" data-item-id="${item.id}" data-id="${st.id}">${ICO.edit}</button>
            <button data-action="delete-subtask" data-item-id="${item.id}" data-id="${st.id}" class="danger">${ICO.trash}</button>
          </span>
        </div>
      `;
    }
  });
  if (adding) {
    html += `
      <div class="subtask-row" style="gap:8px;">
        <input type="text" id="new-subtask-text" placeholder="Sous-tâche…" autofocus style="flex:1; background: var(--surface); border:1px solid var(--line); border-radius:3px; padding:4px 8px; font-size:13px; outline:none;">
        <button class="btn-primary" style="padding:4px 10px;" data-action="confirm-add-subtask" data-id="${item.id}">+</button>
        <button class="btn-ghost" style="padding:4px 8px;" data-action="cancel-add">✕</button>
      </div>
    `;
  } else {
    html += `<button class="add-subtask-btn" data-action="start-add-subtask" data-id="${item.id}">${ICO.plusSm} Ajouter une sous-tâche</button>`;
  }
  html += '</div>';
  return html;
}

function renderAddItemForm(parentType, parentId) {
  const prio = (state.adding && state.adding.priority) || 'medium';
  return `
    <div class="add-form">
      <input type="text" id="new-item-text" placeholder="Nouvelle tâche…" autofocus value="${escapeHtml((state.adding && state.adding.text) || '')}">
      <div class="row">
        <select id="new-item-prio">
          ${Object.entries(PRIORITIES).map(([k,v]) =>
            `<option value="${k}"${k===prio?' selected':''}>${v}</option>`
          ).join('')}
        </select>
        <button class="btn-primary" data-action="confirm-add-item" data-parent-type="${parentType}" data-parent-id="${parentId || ''}">Ajouter</button>
        <button class="btn-ghost" data-action="cancel-add">Annuler</button>
      </div>
    </div>
  `;
}

// ==============================================
// Event delegation
// ==============================================
function handleClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action;
  const id = el.dataset.id;

  switch (a) {
    case 'refresh': refresh(); break;
    case 'select-section': {
      // Don't re-render if drag just happened on this tab
      if (state.draggedType) return;
      state.currentSectionId = id;
      state.search = '';
      state.editing = null;
      state.adding = null;
      state.expandedNotes = {};
      state.expandedSubtasks = {};
      render();
      break;
    }
    case 'add-section': {
      const title = prompt('Nom de la nouvelle section :');
      if (!title) return;
      const emoji = prompt('Emoji (optionnel) :', '📁') || '📁';
      addSection(title, emoji);
      break;
    }
    case 'edit-section': {
      const sec = state.data.sections.find(s => s.id === id);
      if (!sec) return;
      state.editing = { type: 'section', id, value: sec.title };
      render();
      setTimeout(() => document.getElementById('inline-edit-title')?.focus(), 30);
      break;
    }
    case 'save-section-edit': {
      const title = document.getElementById('inline-edit-title').value;
      const subtitle = document.getElementById('inline-edit-subtitle').value;
      const emoji = document.getElementById('inline-edit-emoji').value;
      state.editing = null;
      updateSectionTitle(state.currentSectionId, title, subtitle, emoji);
      break;
    }
    case 'delete-section': deleteSection(id); break;
    case 'move-section-left': moveSectionTab(id, 'left'); break;
    case 'move-section-right': moveSectionTab(id, 'right'); break;

    case 'clear-search': state.search = ''; render(); break;

    case 'start-add-item': {
      state.adding = { type: 'item', parentType: el.dataset.parentType, parentId: el.dataset.parentId || null, text: '', priority: 'medium' };
      render();
      setTimeout(() => document.getElementById('new-item-text')?.focus(), 30);
      break;
    }
    case 'confirm-add-item': {
      const text = document.getElementById('new-item-text').value;
      const prio = document.getElementById('new-item-prio').value;
      const parentType = el.dataset.parentType;
      const parentId = el.dataset.parentId || null;
      state.adding = null;
      addItem(parentType, parentId, text, prio);
      break;
    }
    case 'cancel-add': state.adding = null; render(); break;

    case 'start-add-subsection': {
      state.adding = { type: 'subsection' };
      render();
      setTimeout(() => document.getElementById('new-subsection-title')?.focus(), 30);
      break;
    }
    case 'confirm-add-subsection': {
      const title = document.getElementById('new-subsection-title').value;
      state.adding = null;
      addSubsection(title);
      break;
    }
    case 'edit-subsection': {
      const sec = currentSection();
      const sub = sec.subsections.find(s => s.id === id);
      state.editing = { type: 'subsection', id, value: sub.title };
      render();
      setTimeout(() => document.getElementById('inline-edit-subsection-' + id)?.focus(), 30);
      break;
    }
    case 'save-subsection-edit': {
      const val = document.getElementById('inline-edit-subsection-' + id).value;
      state.editing = null;
      updateSubsectionTitle(id, val);
      break;
    }
    case 'delete-subsection': deleteSubsection(id); break;
    case 'toggle-subsection': toggleSubsection(id); break;
    case 'move-subsection-up': moveSubsection(id, 'up'); break;
    case 'move-subsection-down': moveSubsection(id, 'down'); break;

    case 'toggle-item': toggleItemDone(id); break;
    case 'change-prio': break;
    case 'edit-item': {
      const item = findItem(id);
      state.editing = { type: 'item', id, value: item.text };
      render();
      setTimeout(() => document.getElementById('inline-edit-item-' + id)?.focus(), 30);
      break;
    }
    case 'save-item-edit': {
      const val = document.getElementById('inline-edit-item-' + id).value;
      state.editing = null;
      updateItemText(id, val);
      break;
    }
    case 'cancel-edit': state.editing = null; render(); break;
    case 'delete-item': deleteItem(id); break;
    case 'move-item-up': moveItem(id, 'up'); break;
    case 'move-item-down': moveItem(id, 'down'); break;
    case 'toggle-notes-display': state.expandedNotes[id] = !state.expandedNotes[id]; render(); break;
    case 'toggle-subtasks-display': state.expandedSubtasks[id] = !state.expandedSubtasks[id]; render(); break;
    case 'manage-item-link': manageItemLink(id); break;
    case 'manage-subtask-link': manageSubtaskLink(el.dataset.itemId, id); break;

    case 'toggle-subtask': toggleSubtaskDone(el.dataset.itemId, id); break;
    case 'start-add-subtask': {
      state.adding = { type: 'subtask', parentId: id };
      state.expandedSubtasks[id] = true;
      render();
      setTimeout(() => document.getElementById('new-subtask-text')?.focus(), 30);
      break;
    }
    case 'confirm-add-subtask': {
      const text = document.getElementById('new-subtask-text').value;
      state.adding = null;
      addSubtask(id, text);
      break;
    }
    case 'edit-subtask': {
      const itemId = el.dataset.itemId;
      const item = findItem(itemId);
      const st = item.subtasks.find(s => s.id === id);
      state.editing = { type: 'subtask', id, parentId: itemId, value: st.text };
      render();
      setTimeout(() => document.getElementById('inline-edit-subtask-' + id)?.focus(), 30);
      break;
    }
    case 'save-subtask-edit': {
      const itemId = el.dataset.itemId;
      const val = document.getElementById('inline-edit-subtask-' + id).value;
      state.editing = null;
      updateSubtaskText(itemId, id, val);
      break;
    }
    case 'delete-subtask': deleteSubtask(el.dataset.itemId, id); break;
    case 'move-subtask-up': moveSubtask(el.dataset.itemId, id, 'up'); break;
    case 'move-subtask-down': moveSubtask(el.dataset.itemId, id, 'down'); break;
  }
}

function handleChange(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const a = el.dataset.action;
  const id = el.dataset.id;
  if (a === 'change-prio') changeItemPriority(id, e.target.value);
  if (a === 'set-filter') { state.filter = e.target.value; render(); }
  if (a === 'set-prio-filter') { state.priorityFilter = e.target.value; render(); }
}

function handleInput(e) {
  const el = e.target;
  if (el.id === 'search-input') {
    state.search = el.value;
    const cursor = el.selectionStart;
    render();
    const newInput = document.getElementById('search-input');
    if (newInput) { newInput.focus(); newInput.setSelectionRange(cursor, cursor); }
    return;
  }
  const actionEl = el.closest('[data-action]');
  if (actionEl && actionEl.dataset.action === 'update-notes') {
    updateItemNotes(actionEl.dataset.id, el.value);
  }
}

function handleKeydown(e) {
  const el = e.target;
  if (e.key === 'Enter' && !e.shiftKey) {
    if (el.id === 'inline-edit-title') { document.querySelector('[data-action="save-section-edit"]')?.click(); e.preventDefault(); }
    if (el.id?.startsWith('inline-edit-subsection-')) {
      const id = el.id.replace('inline-edit-subsection-', '');
      document.querySelector(`[data-action="save-subsection-edit"][data-id="${id}"]`)?.click();
      e.preventDefault();
    }
    if (el.id?.startsWith('inline-edit-item-')) {
      const id = el.id.replace('inline-edit-item-', '');
      document.querySelector(`[data-action="save-item-edit"][data-id="${id}"]`)?.click();
      e.preventDefault();
    }
    if (el.id?.startsWith('inline-edit-subtask-')) {
      const id = el.id.replace('inline-edit-subtask-', '');
      document.querySelector(`[data-action="save-subtask-edit"][data-id="${id}"]`)?.click();
      e.preventDefault();
    }
    if (el.id === 'new-item-text') { document.querySelector('[data-action="confirm-add-item"]')?.click(); e.preventDefault(); }
    if (el.id === 'new-subsection-title') { document.querySelector('[data-action="confirm-add-subsection"]')?.click(); e.preventDefault(); }
    if (el.id === 'new-subtask-text') { document.querySelector('[data-action="confirm-add-subtask"]')?.click(); e.preventDefault(); }
  }
  if (e.key === 'Escape') {
    if (state.editing) { state.editing = null; render(); }
    else if (state.adding) { state.adding = null; render(); }
  }
}

// ==============================================
// Drag & Drop (tabs, subsections, items)
// ==============================================
function handleDragStart(e) {
  const draggable = e.target.closest('[data-drag-type]');
  if (!draggable) { return; }
  const type = draggable.dataset.dragType;
  const id = draggable.dataset.id;
  state.draggedType = type;
  state.draggedId = id;
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', id); } catch (err) {}
  draggable.classList.add('dragging');
}

function handleDragOver(e) {
  if (!state.draggedType || !state.draggedId) return;
  let target;
  if (state.draggedType === 'item') target = e.target.closest('.item[data-drag-type="item"]');
  else if (state.draggedType === 'subsection') target = e.target.closest('.subsection[data-drag-type="subsection"]');
  else if (state.draggedType === 'tab') target = e.target.closest('.tab[data-drag-type="tab"]');
  if (!target) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const id = target.dataset.id;
  if (id !== state.draggedId && state.dropTargetId !== id) {
    state.dropTargetId = id;
    document.querySelectorAll('.drop-target').forEach(x => x.classList.remove('drop-target'));
    target.classList.add('drop-target');
  }
}

function handleDrop(e) {
  if (!state.draggedType || !state.draggedId) return;
  let target;
  if (state.draggedType === 'item') target = e.target.closest('.item[data-drag-type="item"]');
  else if (state.draggedType === 'subsection') target = e.target.closest('.subsection[data-drag-type="subsection"]');
  else if (state.draggedType === 'tab') target = e.target.closest('.tab[data-drag-type="tab"]');
  if (!target) { handleDragEnd(); return; }
  e.preventDefault();
  const tId = target.dataset.id;
  const dId = state.draggedId;
  const type = state.draggedType;
  state.draggedType = null;
  state.draggedId = null;
  state.dropTargetId = null;
  if (type === 'item') dropReorderItem(dId, tId);
  else if (type === 'subsection') dropReorderSubsection(dId, tId);
  else if (type === 'tab') dropReorderTab(dId, tId);
}

function handleDragEnd() {
  // Clear state but don't trigger re-render if a drop already happened
  const wasDragging = state.draggedType !== null;
  state.draggedType = null;
  state.draggedId = null;
  state.dropTargetId = null;
  document.querySelectorAll('.dragging, .drop-target').forEach(x => {
    x.classList.remove('dragging'); x.classList.remove('drop-target');
  });
  // Prevent tab click after drag (slight delay)
  if (wasDragging) {
    setTimeout(() => {}, 0); // noop, just ensure sequence
  }
}

// ==============================================
// Init
// ==============================================
(async function init() {
  let loaded = await loadData();
  if (!loaded) {
    loaded = JSON.parse(JSON.stringify(DEFAULT_DATA));
    await saveData(loaded);
  }
  state.data = loaded;

  const app = document.getElementById('app');
  app.addEventListener('click', handleClick);
  app.addEventListener('change', handleChange);
  app.addEventListener('input', handleInput);
  app.addEventListener('keydown', handleKeydown);
  app.addEventListener('dragstart', handleDragStart);
  app.addEventListener('dragover', handleDragOver);
  app.addEventListener('drop', handleDrop);
  app.addEventListener('dragend', handleDragEnd);

  render();
})();
</script>
</body>
