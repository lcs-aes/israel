// ==============================================
// Helpers
// ==============================================
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeUrl(url) {
  if (!url) return '';
  url = url.trim();
  if (!url) return '';
  if (/^(https?:|mailto:|tel:|ftp:|file:)/i.test(url)) return url;
  return 'https://' + url;
}
function parsePrice(str) {
  if (str === null || str === undefined) return 0;
  str = String(str).trim();
  if (!str) return 0;
  str = str.replace(/[€$£¥\s]/g, '');
  if (str.includes(',') && str.includes('.')) {
    str = str.replace(/\./g, '').replace(',', '.');
  } else if (str.includes(',')) {
    str = str.replace(',', '.');
  }
  const n = parseFloat(str);
  return isNaN(n) ? 0 : Math.max(0, n);
}
function formatPrice(n) {
  if (!n || n === 0) return '';
  const hasDecimal = n % 1 !== 0;
  return new Intl.NumberFormat('fr-FR', {
    style: 'currency', currency: 'EUR',
    minimumFractionDigits: hasDecimal ? 2 : 0,
    maximumFractionDigits: 2
  }).format(n);
}
function currentSection() {
  return state.data.sections.find(s => s.id === state.currentSectionId) || state.data.sections[0];
}
function findItemContainer(itemId) {
  const sec = currentSection();
  if (sec.items.find(i => i.id === itemId)) return sec.items;
  for (const sub of sec.subsections) {
    if (sub.items.find(i => i.id === itemId)) return sub.items;
  }
  return null;
}
function findItem(itemId) {
  const c = findItemContainer(itemId);
  return c ? c.find(i => i.id === itemId) : null;
}
function itemEffectiveDone(item) {
  if (item.subtasks && item.subtasks.length > 0) return item.subtasks.every(st => st.done);
  return item.done;
}
function itemProgress(item) {
  if (!item.subtasks || item.subtasks.length === 0) return null;
  const done = item.subtasks.filter(st => st.done).length;
  return { done, total: item.subtasks.length };
}

// Totals
function computeItemTotal(item) {
  let total = parseFloat(item.price) || 0;
  if (item.subtasks) item.subtasks.forEach(st => { total += parseFloat(st.price) || 0; });
  return total;
}
function computeSubsectionTotal(sub) {
  return sub.items.reduce((a, i) => a + computeItemTotal(i), 0);
}
function computeSectionTotal(sec) {
  return sec.items.reduce((a, i) => a + computeItemTotal(i), 0)
       + sec.subsections.reduce((a, s) => a + computeSubsectionTotal(s), 0);
}
function computeGlobalTotal() {
  return state.data.sections.reduce((a, s) => a + computeSectionTotal(s), 0);
}

function countItems(sec) {
  let total = 0, done = 0;
  const allItems = [...sec.items, ...sec.subsections.flatMap(s => s.items)];
  allItems.forEach(item => {
    if (item.subtasks && item.subtasks.length > 0) {
      total += item.subtasks.length;
      done += item.subtasks.filter(st => st.done).length;
    } else {
      total += 1;
      if (item.done) done += 1;
    }
  });
  return { done, total };
}
function sectionStats(sec) {
  const { done, total } = countItems(sec);
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function globalStats() {
  let done = 0, total = 0;
  state.data.sections.forEach(s => { const c = countItems(s); done += c.done; total += c.total; });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}
function matchSearch(item, q) {
  if (!q) return true;
  q = q.toLowerCase();
  if (item.text.toLowerCase().includes(q)) return true;
  if ((item.notes||'').toLowerCase().includes(q)) return true;
  if ((item.link||'').toLowerCase().includes(q)) return true;
  if (item.location && item.location.name && item.location.name.toLowerCase().includes(q)) return true;
  if (item.subtasks && item.subtasks.some(st => st.text.toLowerCase().includes(q) || (st.location && st.location.name && st.location.name.toLowerCase().includes(q)))) return true;
  return false;
}
function locationMatchesFilter(loc, filter) {
  if (!filter) return true;
  return !!(loc && loc.name === filter);
}

// ==============================================
// Helpers dates d'échéance et périssables
// ==============================================
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function parseISO(s) {
  if (!s || typeof s !== 'string') return null;
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  const d = new Date(+m[1], +m[2] - 1, +m[3]);
  return isNaN(d.getTime()) ? null : d;
}
function daysUntil(isoDate) {
  const d = parseISO(isoDate);
  if (!d) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  d.setHours(0, 0, 0, 0);
  return Math.round((d - today) / 86400000);
}
function formatDate(isoDate) {
  const d = parseISO(isoDate);
  if (!d) return '';
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined });
}
function addMonthsISO(isoDate, months) {
  const d = parseISO(isoDate);
  if (!d || !months) return '';
  const targetMonth = d.getMonth() + months;
  const originalDay = d.getDate();
  d.setDate(1); // évite le rollover
  d.setMonth(targetMonth);
  // Restaure le jour, en clampant au dernier jour du mois cible si nécessaire
  const lastDayOfTargetMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  d.setDate(Math.min(originalDay, lastDayOfTargetMonth));
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
// Statut d'une échéance : { kind: 'overdue'|'urgent'|'soon'|'later'|'none', days, label, color }
function deadlineStatus(isoDate) {
  if (!isoDate) return { kind: 'none' };
  const days = daysUntil(isoDate);
  if (days === null) return { kind: 'none' };
  if (days < 0) return { kind: 'overdue', days, label: 'En retard de ' + Math.abs(days) + 'j', color: 'var(--crit-fg)' };
  if (days === 0) return { kind: 'urgent', days, label: "Aujourd'hui", color: 'var(--crit-fg)' };
  if (days <= 3) return { kind: 'urgent', days, label: 'Dans ' + days + 'j', color: 'var(--crit-fg)' };
  if (days <= 14) return { kind: 'soon', days, label: 'Dans ' + days + 'j', color: 'var(--high-fg)' };
  if (days <= 60) return { kind: 'later', days, label: formatDate(isoDate), color: 'var(--med-fg)' };
  return { kind: 'far', days, label: formatDate(isoDate), color: 'var(--ink-soft)' };
}
// Calcule la prochaine échéance d'un item périssable depuis sa dernière rotation
function perishableNextDate(item) {
  if (!item.perishable || !item.perishable.intervalMonths) return '';
  const last = item.perishable.lastRotation;
  if (!last) return ''; // pas encore de rotation initiale
  return addMonthsISO(last, item.perishable.intervalMonths);
}
// Statut périssable : combine perishable + deadline calculée
function perishableStatus(item) {
  if (!item.perishable) return { kind: 'none' };
  const next = perishableNextDate(item);
  if (!next) return { kind: 'never-rotated' }; // jamais initialisé
  return deadlineStatus(next);
}
// Échéance "effective" d'une tâche : deadline manuelle prioritaire,
// sinon échéance dérivée du périssable
function effectiveDeadline(item) {
  if (item.deadline) return item.deadline;
  if (item.perishable) return perishableNextDate(item);
  return '';
}
function itemMatchesLocationFilter(item) {
  if (!state.locationFilter) return true;
  if (locationMatchesFilter(item.location, state.locationFilter)) return true;
  if (item.subtasks && item.subtasks.some(st => locationMatchesFilter(st.location, state.locationFilter))) return true;
  return false;
}
function visibleSubtasks(item) {
  if (!state.locationFilter) return item.subtasks || [];
  // If parent matches the filter, show all subtasks (parent IS this location)
  if (locationMatchesFilter(item.location, state.locationFilter)) return item.subtasks || [];
  // Otherwise show only matching subtasks
  return (item.subtasks || []).filter(st => locationMatchesFilter(st.location, state.locationFilter));
}
function getAllLocations() {
  const map = new Map(); // name -> color
  if (!state.data) return [];
  state.data.sections.forEach(sec => {
    const proc = (item) => {
      if (item.location && item.location.name) {
        if (!map.has(item.location.name)) map.set(item.location.name, item.location.color);
      }
      if (item.subtasks) item.subtasks.forEach(st => {
        if (st.location && st.location.name) {
          if (!map.has(st.location.name)) map.set(st.location.name, st.location.color);
        }
      });
    };
    sec.items.forEach(proc);
    sec.subsections.forEach(sub => sub.items.forEach(proc));
  });
  return Array.from(map.entries())
    .map(([name, color]) => ({ name, color: color || COLOR_PALETTE[0] }))
    .sort((a, b) => a.name.localeCompare(b.name, 'fr'));
}
function countLocationMatches(locName) {
  if (!locName) return 0;
  let count = 0;
  state.data.sections.forEach(sec => {
    const proc = (item) => {
      if (item.location && item.location.name === locName) count++;
      if (item.subtasks) item.subtasks.forEach(st => {
        if (st.location && st.location.name === locName) count++;
      });
    };
    sec.items.forEach(proc);
    sec.subsections.forEach(sub => sub.items.forEach(proc));
  });
  return count;
}

// Calcule le total budgétaire d'un lieu : somme des prix des items et sous-tâches
// dont la location correspond. Pour un item parent qui a sa propre location ET des sous-tâches,
// on additionne le prix de l'item ET les sous-tâches correspondant au filtre, en évitant
// le double-comptage avec computeItemTotal qui agrège déjà les sous-tâches.
function computeLocationStats(locName) {
  const stats = {
    totalAll: 0,        // Tout le budget rattaché à ce lieu
    totalTodo: 0,       // Budget restant à dépenser (tâches non faites)
    totalDone: 0,       // Budget déjà engagé (tâches cochées)
    countAll: 0,        // Nombre total d'occurrences
    countTodo: 0,
    countDone: 0,
    countWithPrice: 0,  // Nombre d'occurrences ayant un prix renseigné
  };
  if (!locName || !state.data) return stats;

  const matchesThisLoc = (loc) => loc && loc.name === locName;

  state.data.sections.forEach(sec => {
    const proc = (item) => {
      // Cas A : le parent matche → on compte le parent (prix propre uniquement, pas les sous-tâches
      // qui pourraient être ailleurs)
      if (matchesThisLoc(item.location)) {
        stats.countAll++;
        const done = itemEffectiveDone(item);
        if (done) stats.countDone++; else stats.countTodo++;
        const ownPrice = (item.price && item.price > 0) ? item.price : 0;
        if (ownPrice > 0) {
          stats.countWithPrice++;
          stats.totalAll += ownPrice;
          if (done) stats.totalDone += ownPrice;
          else stats.totalTodo += ownPrice;
        }
      }
      // Cas B : sous-tâches qui matchent (même si le parent ne matche pas)
      if (item.subtasks) item.subtasks.forEach(st => {
        if (matchesThisLoc(st.location)) {
          stats.countAll++;
          const stDone = !!st.done;
          if (stDone) stats.countDone++; else stats.countTodo++;
          const stPrice = (st.price && st.price > 0) ? st.price : 0;
          if (stPrice > 0) {
            stats.countWithPrice++;
            stats.totalAll += stPrice;
            if (stDone) stats.totalDone += stPrice;
            else stats.totalTodo += stPrice;
          }
        }
      });
    };
    sec.items.forEach(proc);
    sec.subsections.forEach(sub => sub.items.forEach(proc));
  });
  return stats;
}
function matchFilter(item) {
  const done = itemEffectiveDone(item);
  if (state.filter === 'todo' && done) return false;
  if (state.filter === 'done' && !done) return false;
  if (state.priorityFilter !== 'all' && item.priority !== state.priorityFilter) return false;
  if (state.locationFilter && !itemMatchesLocationFilter(item)) return false;
  return true;
}
function filterItems(items) { return items.filter(i => matchFilter(i) && matchSearch(i, state.search)); }

// ==============================================
// Undo / Redo
// ==============================================
// Pile d'historique des états locaux (max UNDO_LIMIT entrées).
// Chaque entrée contient : { snapshot: deep clone des sections, label: description, ts: timestamp }
// Une mutation locale push dans undoStack et clear redoStack.
// Ctrl+Z (ou bouton ↶) : pop undoStack, push current dans redoStack, restaure.
// Ctrl+Shift+Z / Ctrl+Y : pop redoStack, push current dans undoStack, restaure.
// Les actions venant de la sync distante n'alimentent PAS la pile undo (volontairement).
const UNDO_LIMIT = 20;
const undoStack = [];
const redoStack = [];

function pushUndoSnapshot(label) {
  try {
    if (!state.data) return;
    const snap = JSON.parse(JSON.stringify(state.data));
    undoStack.push({ snapshot: snap, label: label || 'Modification', ts: Date.now() });
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    // Toute nouvelle action invalide la pile redo
    redoStack.length = 0;
    updateUndoIndicator();
  } catch(e) { console.warn('[undo] snapshot failed:', e); }
}

function performUndo() {
  if (undoStack.length === 0) {
    showToast('Rien à annuler');
    return;
  }
  const entry = undoStack.pop();
  // Push état actuel dans redo pour permettre le redo
  try {
    const current = JSON.parse(JSON.stringify(state.data));
    redoStack.push({ snapshot: current, label: entry.label, ts: Date.now() });
    if (redoStack.length > UNDO_LIMIT) redoStack.shift();
  } catch(e) { console.warn('[undo] capture current for redo failed:', e); }
  // Restaurer
  state.data = entry.snapshot;
  scheduleSave();
  render();
  updateUndoIndicator();
  showToast('Annulé : ' + entry.label);
}

function performRedo() {
  if (redoStack.length === 0) {
    showToast('Rien à rétablir');
    return;
  }
  const entry = redoStack.pop();
  try {
    const current = JSON.parse(JSON.stringify(state.data));
    undoStack.push({ snapshot: current, label: entry.label, ts: Date.now() });
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  } catch(e) { console.warn('[redo] capture current for undo failed:', e); }
  state.data = entry.snapshot;
  scheduleSave();
  render();
  updateUndoIndicator();
  showToast('Rétabli : ' + entry.label);
}

function updateUndoIndicator() {
  const btn = document.getElementById('undo-btn');
  if (!btn) return;
  const can = undoStack.length > 0;
  btn.disabled = !can;
  btn.style.opacity = can ? '0.85' : '0.3';
  btn.style.cursor = can ? 'pointer' : 'not-allowed';
  if (can) {
    const last = undoStack[undoStack.length - 1];
    btn.title = 'Annuler : ' + last.label + ' (Ctrl+Z)';
    btn.setAttribute('aria-label', 'Annuler la dernière action : ' + last.label);
  } else {
    btn.title = 'Rien à annuler';
    btn.setAttribute('aria-label', 'Rien à annuler');
  }
}

// ==============================================
// Mutations
// ==============================================
// `mutate` accepte maintenant un label optionnel décrivant l'action,
// utilisé pour le toast undo/redo. Compat. arrière : les anciens appels
// sans label utilisent un libellé générique.
function mutate(fn, label) {
  pushUndoSnapshot(label || 'Modification');
  fn(state.data);
  scheduleSave();
  render();
  updateUndoIndicator();
}

// =================================================================
// Mutation légère — pour les actions atomiques fréquentes (toggle, change-prio).
// Identique à mutate() mais sans appel à render(). L'appelant doit ensuite
// patcher le DOM ciblé via les fonctions patchXxx ci-dessous, ET appeler
// updateGlobalProgress() pour rafraîchir la barre globale et le pourcentage section.
// Bénéfice : pas de full re-render (qui fait clignoter l'écran et dégrade les perfs sur mobile).
// Risque résiduel : si une action a des effets secondaires non prévus (filtre actif qui
// devrait masquer la tâche par exemple), le DOM peut devenir incohérent. Dans ce cas,
// fallback sur mutate() classique.
// =================================================================
function lightMutate(fn, label) {
  pushUndoSnapshot(label || 'Modification');
  fn(state.data);
  scheduleSave();
  updateUndoIndicator();
}

// Recalcule et met à jour la barre de progression globale + le pourcentage de la section courante.
// Appelé après une action atomique pour refléter le changement sans full render.
function updateGlobalProgress() {
  if (!state.data) return;
  // Barre globale
  const g = globalStats();
  const pctEl = document.querySelector('.progress-row .progress-value');
  const fillEl = document.querySelector('.progress-fill');
  const countEl = document.querySelector('.progress-count > span:first-child');
  if (pctEl) pctEl.innerHTML = g.pct + '<span class="pct-sign">%</span>';
  if (fillEl) fillEl.style.width = g.pct + '%';
  if (countEl) countEl.textContent = g.done + ' / ' + g.total + ' tâches terminées';

  // Pourcentage section courante (en-tête de section)
  const sec = currentSection();
  if (sec) {
    const s = sectionStats(sec);
    const sectPct = document.querySelector('.section-stats .pct');
    const sectCount = document.querySelector('.section-stats > div:nth-child(2)');
    if (sectPct) sectPct.innerHTML = s.pct + '<span style="font-size:12px;opacity:0.5;font-family:\'DM Sans\',sans-serif;">%</span>';
    if (sectCount) sectCount.textContent = s.done + ' / ' + s.total;
    // Compteur sur l'onglet de la section (la classe est 'count' dans renderTabs)
    const tab = document.querySelector('.tab[data-id="' + sec.id + '"] .count');
    if (tab) tab.textContent = s.done + '/' + s.total;
  }

  // Tooltip progression par section : recalcule la mini-barre de la section courante
  if (sec) {
    const s = sectionStats(sec);
    const tooltipRow = document.querySelector('.progress-tooltip-row[data-section-id="' + sec.id + '"]');
    if (tooltipRow) {
      const fill = tooltipRow.querySelector('.progress-tooltip-mini-fill');
      const pctText = tooltipRow.querySelector('.progress-tooltip-pct');
      if (fill) fill.style.width = s.pct + '%';
      if (pctText) pctText.textContent = s.done + '/' + s.total;
    }
  }
}

// Patch DOM d'une checkbox de tâche (item ou sous-tâche) sans full render
function patchItemCheckbox(itemId) {
  const i = findItem(itemId); if (!i) return;
  const itemEl = document.querySelector('.item[data-id="' + itemId + '"]');
  if (!itemEl) return;
  const done = itemEffectiveDone(i);
  const checkBtn = itemEl.querySelector('.checkbox-btn');
  const textSpan = itemEl.querySelector('.item-text');
  // Mise à jour de l'icône
  if (checkBtn) {
    const hasSubtasks = i.subtasks && i.subtasks.length > 0;
    const progress = itemProgress(i);
    let iconHtml;
    if (hasSubtasks) {
      iconHtml = done ? ICO.checkFull : (progress.done > 0 ? ICO.checkPartial : ICO.circle);
    } else {
      iconHtml = i.done ? ICO.checkFull : ICO.circle;
    }
    checkBtn.innerHTML = iconHtml;
    checkBtn.setAttribute('aria-checked', String(done));
    checkBtn.setAttribute('aria-label', (done ? 'Marquer comme non fait' : 'Marquer comme fait') + ' : ' + i.text);
  }
  // Texte barré ou non
  if (textSpan) {
    textSpan.classList.toggle('done', done);
  }
  // Badge progression sous-tâches (X/Y)
  if (i.subtasks && i.subtasks.length > 0) {
    const badge = itemEl.querySelector('.subtask-badge');
    if (badge) {
      const progress = itemProgress(i);
      // On ne change que le texte de progression, en préservant le chevron
      const chevron = badge.querySelector('svg');
      const chevronHtml = chevron ? chevron.outerHTML : '';
      badge.innerHTML = chevronHtml + ' ' + progress.done + '/' + progress.total;
      badge.classList.toggle('all-done', done);
    }
  }
  // Cacher les badges deadline et perishable si done
  if (done) {
    itemEl.querySelectorAll('.deadline-pill, .deadline-init').forEach(el => el.style.display = 'none');
  } else {
    itemEl.querySelectorAll('.deadline-pill, .deadline-init').forEach(el => el.style.display = '');
  }
}

// Patch DOM d'une checkbox de sous-tâche
function patchSubtaskCheckbox(itemId, subId) {
  const i = findItem(itemId); if (!i) return;
  const st = i.subtasks.find(x => x.id === subId); if (!st) return;
  const itemEl = document.querySelector('.item[data-id="' + itemId + '"]');
  if (!itemEl) return;
  // Trouver la sous-tâche par bouton avec data-id correspondant
  const stBtn = itemEl.querySelector('.subtask-checkbox[data-id="' + subId + '"]');
  if (stBtn) {
    stBtn.innerHTML = st.done ? ICO.checkSm : ICO.circleSm;
    stBtn.setAttribute('aria-checked', String(!!st.done));
    stBtn.setAttribute('aria-label', (st.done ? 'Marquer comme non fait' : 'Marquer comme fait') + ' : ' + st.text);
    // Texte barré
    const textSpan = stBtn.parentElement.querySelector('.subtask-text');
    if (textSpan) textSpan.classList.toggle('done', !!st.done);
  }
  // Le statut "done" du parent peut avoir changé : repatcher la checkbox du parent aussi
  patchItemCheckbox(itemId);
}

// Patch DOM d'un changement de priorité d'une tâche
function patchItemPriority(itemId) {
  const i = findItem(itemId); if (!i) return;
  const itemEl = document.querySelector('.item[data-id="' + itemId + '"]');
  if (!itemEl) return;
  const prio = i.priority || 'medium';
  const dotColors = { critical: 'var(--crit-dot)', high: 'var(--high-dot)', medium: 'var(--med-dot)', low: 'var(--low-dot)' };
  // Barre de couleur à gauche
  const bar = itemEl.querySelector('.item-prio-bar');
  if (bar) bar.style.background = dotColors[prio];
  // Select de priorité (classe)
  const select = itemEl.querySelector('.prio-select');
  if (select) {
    select.className = 'prio-select prio-' + prio;
    select.value = prio;
  }
}

// Patch DOM d'un toggle plier/déplier sous-section
function patchSubsectionCollapsed(subId) {
  const sec = currentSection(); if (!sec) return;
  const sub = sec.subsections.find(s => s.id === subId); if (!sub) return;
  const subEl = document.querySelector('.subsection[data-id="' + subId + '"]');
  if (!subEl) return;
  subEl.classList.toggle('collapsed', sub.collapsed);
  // L'icône chevron du bouton toggle
  const toggleBtn = subEl.querySelector('.subsection-toggle');
  if (toggleBtn) {
    toggleBtn.innerHTML = sub.collapsed ? ICO.chevronR : ICO.chevronD;
    toggleBtn.setAttribute('title', sub.collapsed ? 'Déplier' : 'Replier');
  }
}

function toggleItemDone(id) {
  // Si un filtre est actif qui pourrait masquer/afficher cette tâche après toggle,
  // on retombe sur un full render pour éviter une incohérence visuelle.
  const filterCouldHide = state.filter !== 'all' || state.search;
  if (filterCouldHide) {
    mutate(() => {
      const i = findItem(id); if (!i) return;
      if (i.subtasks && i.subtasks.length > 0) {
        const allDone = i.subtasks.every(st => st.done);
        i.subtasks.forEach(st => st.done = !allDone);
      } else i.done = !i.done;
    }, 'Cocher/décocher tâche');
    return;
  }
  // Render léger : on patch juste les éléments DOM concernés
  lightMutate(() => {
    const i = findItem(id); if (!i) return;
    if (i.subtasks && i.subtasks.length > 0) {
      const allDone = i.subtasks.every(st => st.done);
      i.subtasks.forEach(st => st.done = !allDone);
    } else i.done = !i.done;
  }, 'Cocher/décocher tâche');
  patchItemCheckbox(id);
  // Si la tâche a des sous-tâches, leurs checkboxes ont aussi changé
  const i = findItem(id);
  if (i && i.subtasks && i.subtasks.length > 0) {
    i.subtasks.forEach(st => patchSubtaskCheckbox(id, st.id));
  }
  updateGlobalProgress();
}
function changeItemPriority(id, p) {
  // Si filtre par priorité actif, full render pour gérer apparition/disparition
  if (state.priorityFilter && state.priorityFilter !== 'all') {
    mutate(() => { const i = findItem(id); if (i) i.priority = p; }, 'Changement de priorité');
    return;
  }
  lightMutate(() => { const i = findItem(id); if (i) i.priority = p; }, 'Changement de priorité');
  patchItemPriority(id);
}
function updateItemText(id, t) { mutate(() => { const i = findItem(id); if (i && t.trim()) i.text = t.trim(); }, 'Modification du texte'); }
function updateItemNotes(id, n) { const i = findItem(id); if (i) { i.notes = n; scheduleSave(); } }
function updateItemLink(id, l) { mutate(() => { const i = findItem(id); if (i) i.link = normalizeUrl(l); }, 'Modification du lien'); }
function updateItemPrice(id, p) { mutate(() => { const i = findItem(id); if (i) i.price = parsePrice(p); }, 'Modification du prix'); }
// === Échéance et périssables ===
function updateItemDeadline(id, isoDate) {
  mutate(() => {
    const i = findItem(id); if (!i) return;
    i.deadline = (typeof isoDate === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(isoDate)) ? isoDate : '';
  }, isoDate ? 'Ajout d\'une échéance' : 'Retrait d\'échéance');
}
function updateSubtaskDeadline(iid, sid, isoDate) {
  mutate(() => {
    const i = findItem(iid); if (!i) return;
    const st = i.subtasks.find(x => x.id === sid); if (!st) return;
    st.deadline = (typeof isoDate === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(isoDate)) ? isoDate : '';
  }, isoDate ? 'Ajout d\'une échéance (sous-tâche)' : 'Retrait d\'échéance (sous-tâche)');
}
function updateItemPerishable(id, intervalMonths, lastRotation) {
  mutate(() => {
    const i = findItem(id); if (!i) return;
    if (!intervalMonths || intervalMonths <= 0) {
      i.perishable = null;
    } else {
      i.perishable = {
        intervalMonths: parseInt(intervalMonths, 10),
        lastRotation: (typeof lastRotation === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(lastRotation)) ? lastRotation : ''
      };
    }
  }, intervalMonths > 0 ? 'Configuration périssable' : 'Suppression suivi périssable');
}
// Action utilisateur : "j'ai effectué la rotation aujourd'hui"
function markPerishableRotated(id) {
  mutate(() => {
    const i = findItem(id); if (!i || !i.perishable) return;
    i.perishable.lastRotation = todayISO();
  }, 'Rotation périssable enregistrée');
  showToast('Rotation enregistrée. Prochaine échéance dans ' + (findItem(id).perishable.intervalMonths) + ' mois.');
}
function updateItemLocation(id, name, color) {
  mutate(() => {
    const i = findItem(id); if (!i) return;
    if (!name || !name.trim()) i.location = null;
    else i.location = { name: name.trim(), color: color || COLOR_PALETTE[0] };
  }, name && name.trim() ? 'Modification du lieu' : 'Retrait du lieu');
}
async function deleteItem(id) {
  const i = findItem(id); if (!i) return;
  const hasSubtasks = (i.subtasks || []).length > 0;
  // Confirmation systématique (option a) : la sécurité prime sur la rapidité.
  // L'undo (Ctrl+Z / bouton ↶) reste là si on accepte par erreur.
  const message = hasSubtasks
    ? 'Supprimer « ' + i.text + ' » ?\n\nCette tâche contient ' + i.subtasks.length + ' sous-tâche' + (i.subtasks.length > 1 ? 's' : '') + ' qui seront aussi supprimées.'
    : 'Supprimer « ' + i.text + ' » ?';

// =================================================================
// Modale réutilisable (alternative aux prompt/alert/confirm natifs)
// =================================================================
function openCustomModal({ title, body, actions, onClose }) {
  const existing = document.getElementById('custom-modal');
  if (existing) existing.remove();
  const previouslyFocused = document.activeElement;
  const modal = document.createElement('div');
  modal.id = 'custom-modal';
  modal.className = 'custom-modal-overlay';
  modal.setAttribute('role', 'dialog');
  modal.setAttribute('aria-modal', 'true');
  modal.setAttribute('aria-labelledby', 'custom-modal-title');
  modal.innerHTML = `
    <div class="custom-modal-box">
      <h2 class="custom-modal-title" id="custom-modal-title">${title}</h2>
      <div class="custom-modal-body">${body}</div>
      <div class="custom-modal-actions">${(actions || []).map((a, idx) =>
        `<button class="${a.className || (idx === actions.length - 1 ? 'btn-primary' : 'btn-ghost')}" data-modal-action="${idx}">${escapeHtml(a.label)}</button>`
      ).join('')}</div>
    </div>`;
  document.body.appendChild(modal);

  let isClosing = false;
  const close = () => {
    if (isClosing) return; isClosing = true;
    document.removeEventListener('keydown', handleKey);
    modal.remove();
    if (previouslyFocused && typeof previouslyFocused.focus === 'function') {
      try { previouslyFocused.focus(); } catch(e) { console.warn('[a11y] restore focus custom modal failed:', e); }
    }
    if (typeof onClose === 'function') onClose();
  };
  const handleKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); close(); return; }
    if (e.key === 'Tab') {
      const focusables = modal.querySelectorAll('button, input, select, textarea, [tabindex="0"]');
      if (focusables.length === 0) return;
      const first = focusables[0], last = focusables[focusables.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  };
  document.addEventListener('keydown', handleKey);
  modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
  modal.querySelectorAll('[data-modal-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.modalAction, 10);
      const action = (actions || [])[idx];
      if (action && typeof action.onClick === 'function') {
        const result = action.onClick(modal);
        if (result === false) return; // l'action peut bloquer la fermeture
      }
      close();
    });
  });
  // Focus initial sur le 1er input/select, sinon le 1er bouton
  setTimeout(() => {
    const firstField = modal.querySelector('input, select, textarea');
    if (firstField) firstField.focus();
    else { const b = modal.querySelector('button'); if (b) b.focus(); }
  }, 50);
  // Annoncer l'ouverture aux lecteurs d'écran (le titre seul ne suffit pas toujours)
  announceToScreenReader('Boîte de dialogue ouverte : ' + (title || 'sans titre'));
  return { close, modal };
}

// Helpers asynchrones — remplacent alert/confirm/prompt natifs
// =================================================================

// Boîte d'information simple (1 bouton OK), retourne une promesse résolue à la fermeture
function alertDialog(message, opts) {
  opts = opts || {};
  return new Promise((resolve) => {
    openCustomModal({
      title: opts.title || 'Information',
      body: '<p style="font-size:14px; line-height:1.55; white-space:pre-wrap;">' + escapeHtml(message) + '</p>',
      actions: [
        { label: opts.okLabel || 'OK', className: 'btn-primary', onClick: () => {} },
      ],
      onClose: () => resolve(),
    });
  });
}

// Boîte de confirmation : retourne true si OK, false si Annuler/Esc/clic dehors
function confirmDialog(message, opts) {
  opts = opts || {};
  return new Promise((resolve) => {
    let answered = false;
    openCustomModal({
      title: opts.title || 'Confirmation',
      body: '<p style="font-size:14px; line-height:1.55; white-space:pre-wrap;">' + escapeHtml(message) + '</p>',
      actions: [
        { label: opts.cancelLabel || 'Annuler', className: 'btn-ghost', onClick: () => { answered = true; resolve(false); } },
        { label: opts.okLabel || 'Confirmer', className: opts.danger ? 'btn-danger-primary' : 'btn-primary', onClick: () => { answered = true; resolve(true); } },
      ],
      onClose: () => { if (!answered) resolve(false); },
    });
  });
}

// Boîte de saisie : retourne la string saisie, ou null si Annuler/Esc/clic dehors
function promptDialog(message, defaultValue, opts) {
  opts = opts || {};
  return new Promise((resolve) => {
    let answered = false;
    const inputId = 'prompt-input-' + Math.random().toString(36).slice(2, 8);
    const inputType = opts.inputType || 'text';
    const placeholder = opts.placeholder || '';
    const helper = opts.helper ? '<p style="font-size:12px; opacity:0.65; margin-top:8px; line-height:1.5;">' + escapeHtml(opts.helper) + '</p>' : '';
    // inputmode adapte le clavier virtuel mobile (numérique pour prix, url pour liens, etc.)
    let inputModeAttr = '';
    if (opts.inputMode) inputModeAttr = ' inputmode="' + opts.inputMode + '"';
    else if (inputType === 'url') inputModeAttr = ' inputmode="url"';
    else if (inputType === 'email') inputModeAttr = ' inputmode="email"';
    else if (inputType === 'tel') inputModeAttr = ' inputmode="tel"';
    else if (inputType === 'number') inputModeAttr = ' inputmode="decimal"';
    // autocomplete="off" par défaut pour éviter les suggestions du navigateur sur les saisies courtes
    const autocomplete = opts.autocomplete || 'off';
    // enterkeyhint : améliore l'expérience clavier mobile (la touche Entrée affiche "Enregistrer")
    const enterHint = opts.enterKeyHint || 'done';
    const body =
      '<p style="font-size:14px; line-height:1.55; margin-bottom:12px;">' + escapeHtml(message) + '</p>'
      + '<input type="' + inputType + '" id="' + inputId + '" value="' + escapeHtml(defaultValue || '') + '" placeholder="' + escapeHtml(placeholder) + '"'
      + inputModeAttr + ' autocomplete="' + autocomplete + '" enterkeyhint="' + enterHint + '"'
      + ' style="width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:6px; font-size:16px; background:var(--surface); outline:none;" />'
      + helper;
    // Note : font-size:16px sur mobile évite le zoom auto iOS quand le champ prend le focus
    const submit = (m) => {
      const v = m.querySelector('#' + inputId);
      const value = v ? v.value : '';
      answered = true;
      resolve(value);
    };
    const { modal } = openCustomModal({
      title: opts.title || 'Saisie',
      body,
      actions: [
        { label: opts.cancelLabel || 'Annuler', className: 'btn-ghost', onClick: () => { answered = true; resolve(null); } },
        { label: opts.okLabel || 'Enregistrer', className: 'btn-primary', onClick: submit },
      ],
      onClose: () => { if (!answered) resolve(null); },
    });
    // Validation à l'Entrée : déclenche le bouton "OK" (qui fermera proprement la modale)
    setTimeout(() => {
      const input = modal.querySelector('#' + inputId);
      if (input) {
        input.focus();
        input.select();
        // Sur mobile, scroll l'input dans la zone visible quand le clavier virtuel s'ouvre
        // (le clavier réduit la fenêtre, sans ça l'input peut être caché)
        try { input.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch(e) { console.warn('[mobile] scrollIntoView failed:', e); }
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const okBtn = modal.querySelector('[data-modal-action="1"]');
            if (okBtn) okBtn.click();
          }
        });
      }
    }, 60);
  });
}

  body += '<button type="button" class="quick-date-btn" data-days="30">Dans 1 mois</button>';

  body += '<button type="button" class="quick-date-btn" data-days="180">Dans 6 mois</button>';

function manageItemPerishable(id) {
  const i = findItem(id); if (!i) return;
  const p = i.perishable || { intervalMonths: 6, lastRotation: '' };
  const next = i.perishable ? perishableNextDate(i) : '';

  let body = '<p style="font-size:13px; opacity:0.75; margin-bottom:14px; line-height:1.5;">';
  body += 'Marquer cette tâche comme périssable permet de suivre les rotations régulières (eau, piles, médicaments, masques NBC, etc.). L\'échéance se calcule automatiquement depuis la dernière rotation.';
  body += '</p>';
  body += '<label style="display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.65; margin-bottom:6px;">Intervalle de rotation</label>';
  body += '<select id="modal-perish-interval" style="width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:6px; font-size:14px; background:var(--surface); margin-bottom:14px;">';
  body += '<option value="0">— Pas périssable (retirer le suivi) —</option>';
  [1, 3, 6, 12, 18, 24, 36, 60].forEach(m => {
    const sel = (i.perishable && p.intervalMonths === m) ? ' selected' : '';
    const label = m === 1 ? '1 mois' : m < 12 ? m + ' mois' : (m / 12) + ' an' + (m / 12 > 1 ? 's' : '');
    body += '<option value="' + m + '"' + sel + '>Tous les ' + label + '</option>';
  });
  body += '</select>';
  body += '<label style="display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.65; margin-bottom:6px;">Date de la dernière rotation</label>';
  body += '<input type="date" id="modal-perish-last" value="' + (p.lastRotation || '') + '" max="' + todayISO() + '" style="width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:6px; font-size:14px; background:var(--surface);" />';
  body += '<div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;">';
  body += '<button type="button" class="quick-date-btn" data-perish-set="today">Aujourd\'hui</button>';
  body += '<button type="button" class="quick-date-btn" data-perish-set="clear">Effacer</button>';
  body += '</div>';

  if (next) {
    body += '<div style="margin-top:14px; padding:10px 12px; background:rgba(194,65,12,0.08); border-radius:6px; font-size:13px; line-height:1.5;">';
    body += '📅 Prochaine rotation prévue : <strong>' + formatDate(next) + '</strong>';
    body += '</div>';
  }

  const modal = openCustomModal({
    title: 'Périssable — ' + escapeHtml(i.text.slice(0, 60) + (i.text.length > 60 ? '…' : '')),
    body,
    actions: [
      { label: 'J\'ai fait la rotation ✓', className: 'btn-ghost', onClick: () => {
        const sel = modal.modal.querySelector('#modal-perish-interval');
        const interval = parseInt(sel.value, 10);
        if (interval > 0) {
          updateItemPerishable(id, interval, todayISO());
          showToast('Rotation enregistrée à aujourd\'hui.');
        } else {
          showToast('Choisis d\'abord un intervalle.');
          return false;
        }
      } },
      { label: 'Annuler', className: 'btn-ghost', onClick: () => {} },
      { label: 'Enregistrer', className: 'btn-primary', onClick: (m) => {
        const interval = parseInt(m.querySelector('#modal-perish-interval').value, 10);
        const last = m.querySelector('#modal-perish-last').value;
        updateItemPerishable(id, interval, last);
        if (interval > 0) showToast(last ? 'Périssable configuré, prochaine rotation : ' + formatDate(addMonthsISO(last, interval)) : 'Périssable configuré (renseigne la dernière rotation pour activer le rappel).');
        else showToast('Suivi périssable retiré.');
      } },
    ],
  });
  modal.modal.querySelectorAll('[data-perish-set]').forEach(btn => {
    btn.addEventListener('click', () => {
      const inp = modal.modal.querySelector('#modal-perish-last');
      inp.value = btn.dataset.perishSet === 'today' ? todayISO() : '';
    });
  });

// ==============================================
// Image management
// ==============================================
function compressImage(file, maxWidth = 1400, quality = 0.78) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) {
      reject(new Error('Le fichier sélectionné n\'est pas une image.'));
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          let width = img.naturalWidth || img.width;
          let height = img.naturalHeight || img.height;
          if (width > maxWidth) {
            height = Math.round(height * (maxWidth / width));
            width = maxWidth;
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          // White background for transparent images (since we're encoding as JPEG)
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        } catch (err) { reject(err); }
      };
      img.onerror = () => reject(new Error('Impossible de charger l\'image.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Lecture du fichier échouée.'));
    reader.readAsDataURL(file);
  });
}

function pickImage(callback) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.style.display = 'none';
  document.body.appendChild(input);
  input.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    document.body.removeChild(input);
    if (!file) return;
    try {
      const dataUrl = await compressImage(file);
      // Estimate size: rough base64 → bytes
      const sizeKb = Math.round((dataUrl.length * 3 / 4) / 1024);
      if (sizeKb > 800) {
        const ok = await confirmDialog(
          'L\'image fait ' + sizeKb + ' Ko après compression. Cela peut alourdir le stockage. Continuer ?',
          { title: 'Image volumineuse', okLabel: 'Continuer' }
        );
        if (!ok) return;
      }
      callback(dataUrl);
    } catch (err) {
      alertDialog('Erreur : ' + (err.message || err), { title: 'Erreur' });
    }
  };
  input.click();
}

// Render
// ==============================================
function render() {
  const app = document.getElementById('app');
  const sec = currentSection();
  const g = globalStats();
  const s = sectionStats(sec);
  const gTotal = computeGlobalTotal();
  const sTotal = computeSectionTotal(sec);

  // Préservation du focus textarea notes : si l'utilisateur est en train d'éditer une note,
  // on capture son état avant render pour le restaurer après. Ça évite de perdre la frappe
  // quand un événement extérieur (sync entrante par ex.) déclenche un render pendant la saisie.
  let preservedNotes = null;
  const ae = document.activeElement;
  if (ae && ae.tagName === 'TEXTAREA' && ae.dataset.action === 'update-notes') {
    preservedNotes = {
      itemId: ae.dataset.id,
      value: ae.value,
      selStart: ae.selectionStart,
      selEnd: ae.selectionEnd,
    };
  }

  app.innerHTML = `
    ${renderHeader(g, gTotal)}
    ${renderTabs()}
    <main id="tabpanel-content" role="tabpanel" aria-labelledby="tab-aria-${escapeHtml(sec.id)}" tabindex="0">
      <div class="wrap">
        ${renderSectionHeader(sec, s, sTotal)}
        ${renderToolbar()}
        ${renderFilterBanner()}
        ${renderSectionBody(sec)}
        <div class="footer">
          <div class="quote">« Les voyages forment la jeunesse » — et les administrations aussi.</div>
        </div>
      </div>
    </main>
    ${renderContextMenu()}
    ${renderLightbox()}
  `;

  // Restaurer le focus textarea si on était en train d'éditer
  if (preservedNotes) {
    const newTa = document.querySelector('textarea[data-action="update-notes"][data-id="' + preservedNotes.itemId + '"]');
    if (newTa) {
      // Si la valeur a été modifiée à distance entre-temps, on garde la nouvelle (sync prime)
      // mais on tente de préserver la position du curseur si possible
      newTa.focus();
      try {
        const len = newTa.value.length;
        newTa.setSelectionRange(Math.min(preservedNotes.selStart, len), Math.min(preservedNotes.selEnd, len));
      } catch(e) { console.warn('[render] restore selection notes failed:', e); }
    }
  }
}
